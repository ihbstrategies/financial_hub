alue=f?(f.pagamento_offset==null?0:f.pagamento_offset):0;\n    onRegimeFonte();\n    abrir('modal-fonte');\n  };\n\n  window.salvarFonteUI = function(){\n    var dados={ nome:document.getElementById('fo-nome').value, nomeOriginal:document.getElementById('fo-original').value,\n      dono:document.getElementById('fo-dono').value, regime:document.getElementById('fo-regime').value,\n      retem_fonte:document.getElementById('fo-retem').value==='true',\n      aliquota_iss:num(document.getElementById('fo-iss').value), aliquota_federais:num(document.getElementById('fo-fed').value),\n      aliquota_retencao:num(document.getElementById('fo-ret').value), aliquota_pis_cofins:num(document.getElementById('fo-pc').value),\n      dia_pagamento:document.getElementById('fo-diapag').value, emissao_offset:document.getElementById('fo-emiss-off').value,\n      pagamento_offset:document.getElementById('fo-pag-off').value };\n    if(!dados.nome.trim()){ mostrarToast('Informe o nome.','aviso'); return; }\n    var btn=document.getElementById('btn-salvar-fonte'); btn.disabled=true; btn.innerHTML='<span class=\"spinner-sm\"></span>';\n    google.script.run.withSuccessHandler(function(res){ btn.disabled=false; btn.textContent='Salvar'; if(res&&res.status==='sucesso'){ mostrarToast(res.mensagem,'sucesso'); fecharModal('modal-fonte'); carregarFontes(); carregarOpcoes(); } else mostrarToast((res&&res.mensagem)||'Erro','erro'); })\n      .withFailureHandler(function(e){ btn.disabled=false; btn.textContent='Salvar'; mostrarToast('Erro: '+(e.message||e),'erro'); }).salvarFonte(dados);\n  };\n\n  /* ---- Exclusão ---- */\n  window.pedirDel = function(tipo,id){ _del={tipo:tipo,id:id}; document.getElementById('del-msg').innerHTML='Remover '+(tipo==='nf'?'este faturamento':'a fonte <strong>'+esc(id)+'</strong>')+'?'; abrir('modal-del'); };\n  window.confirmarDel = function(){\n    if(!_del) return;\n    var btn=document.getElementById('btn-del'); btn.disabled=true; btn.innerHTML='<span class=\"spinner-sm\"></span>';\n    var done=function(res){ btn.disabled=false; btn.textContent='Excluir'; if(res&&res.status==='sucesso'){ mostrarToast(res.mensagem,'sucesso'); fecharModal('modal-del'); if(_del.tipo==='nf') carregarNFs(); else { carregarFontes(); carregarOpcoes(); } } else mostrarToast((res&&res.mensagem)||'Erro','erro'); };\n    var fail=function(e){ btn.disabled=false; btn.textContent='Excluir'; mostrarToast('Erro: '+(e.message||e),'erro'); };\n    if(_del.tipo==='nf') google.script.run.withSuccessHandler(done).withFailureHandler(fail).excluirFaturamento(_del.id);\n    else google.script.run.withSuccessHandler(done).withFailureHandler(fail).excluirFonte(_del.id);\n  };\n\n  // boot: cabeçalhos clicáveis p/ ordenar + filtro no mês atual\n  document.querySelectorAll('#nf-head th[data-sort]').forEach(function(th){ th.onclick=function(){ ordenar(th.getAttribute('data-sort')); }; });\n  document.getElementById('ff-comp').value = mesAtual();\n  carregarOpcoes(carregarNFs);\n})();\n<\/script>\n","Caixa":"<!-- Caixa.html — Fluxo de caixa: tabela mensal + modal por dono/holding (por fonte). -->\n<div class=\"fade-in\">\n  <div class=\"section-head\"><h2>Fluxo de Caixa</h2></div>\n\n  <div class=\"tabs\">\n    <div class=\"tab ativa\" data-tab=\"fluxo\" onclick=\"trocarTab('fluxo')\"><i class=\"fas fa-hand-holding-dollar\"></i> Fluxo</div>\n    <div class=\"tab\" data-tab=\"ajustes\" onclick=\"trocarTab('ajustes')\"><i class=\"fas fa-sliders-h\"></i> Valores adicionais</div>\n    <div class=\"tab\" data-tab=\"real\" onclick=\"trocarTab('real')\"><i class=\"fas fa-building-columns\"></i> Fluxo real</div>\n  </div>\n\n  <!-- ===== FLUXO ===== -->\n  <div class=\"tab-content ativa\" id=\"tab-fluxo\">\n    <div class=\"flex-between mb-16\">\n      <span class=\"text-sec\" style=\"font-size:.85em\"><strong>A Pagar</strong> = tributos a quitar no mês (o que precisa ter em conta). Clique em <i class=\"fas fa-eye\"></i> para o fluxo detalhado por fonte.</span>\n      <button class=\"btn ghost sm\" id=\"btn-futuros\" onclick=\"toggleFuturos()\"><i class=\"fas fa-forward\"></i> Incluir valores futuros</button>\n    </div>\n    <div class=\"card\"><div style=\"overflow-x:auto\">\n      <table class=\"tracker cardify\">\n        <thead>\n          <tr>\n            <th rowspan=\"2\" style=\"vertical-align:bottom\">Mês</th>\n            <th colspan=\"2\" class=\"text-center\" style=\"border-left:1px solid var(--line)\">Tuto</th>\n            <th colspan=\"2\" class=\"text-center\" style=\"border-left:1px solid var(--line)\">Francesca</th>\n            <th colspan=\"4\" class=\"text-center\" style=\"border-left:1px solid var(--line)\">Holding</th>\n          </tr>\n          <tr>\n            <th class=\"num\" style=\"border-left:1px solid var(--line)\">Transferir</th><th class=\"text-center\">Ver</th>\n            <th class=\"num\" style=\"border-left:1px solid var(--line)\">Transferir</th><th class=\"text-center\">Ver</th>\n            <th class=\"num\" style=\"border-left:1px solid var(--line)\">A Pagar (mês)</th><th class=\"num\">A Transferir</th><th class=\"num\">Fica em conta</th><th class=\"text-center\">Ver</th>\n          </tr>\n        </thead>\n        <tbody id=\"body-caixa\"><tr><td colspan=\"9\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div></div>\n  </div>\n\n  <!-- ===== VALORES ADICIONAIS ===== -->\n  <div class=\"tab-content\" id=\"tab-ajustes\">\n    <div class=\"flex-between mb-16\">\n      <div class=\"text-sec\">Contador, Reserva, tributos negociados, adiantamentos... Deduz (ou soma) do A Transferir. Valor fixo ou %.</div>\n      <button class=\"btn sm\" onclick=\"abrirModalAjuste(null)\"><i class=\"fas fa-plus\"></i> Novo ajuste</button>\n    </div>\n    <div class=\"card\"><div style=\"overflow-x:auto\">\n      <table class=\"tracker\" id=\"tbl-ajustes\">\n        <thead><tr><th>Descrição</th><th>Categoria</th><th>Dono</th><th>Fonte</th><th>Valor</th><th>Efeito</th><th>Recorrência</th><th>Ativo</th><th class=\"text-center\">Ações</th></tr></thead>\n        <tbody id=\"body-ajustes\"><tr><td colspan=\"9\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div></div>\n  </div>\n\n  <!-- ===== FLUXO REAL ===== -->\n  <div class=\"tab-content\" id=\"tab-real\">\n    <div class=\"card card-pad\" style=\"margin-bottom:16px\">\n      <div style=\"margin-bottom:12px\">\n        <strong>Importar extrato mensal (PDF do Itaú PJ)</strong>\n        <div class=\"text-sec\" style=\"font-size:.83em;margin-top:3px\">O PDF é lido aqui no seu navegador; só o texto das linhas vai para o sistema. Analise antes, depois confirme a importação — reimportar um mês substitui o anterior.</div>\n      </div>\n      <div class=\"dz-zone\" id=\"ext-dz\" onclick=\"document.getElementById('ext-file').click()\">\n        <i class=\"fas fa-file-pdf\"></i>\n        <div><strong>Toque para escolher o PDF</strong> ou arraste o arquivo aqui</div>\n        <div class=\"text-sec\" id=\"ext-arquivo\" style=\"margin-top:6px;font-size:.85em\">nenhum arquivo selecionado</div>\n      </div>\n      <input type=\"file\" id=\"ext-file\" accept=\"application/pdf\" style=\"display:none\" onchange=\"extArquivoSelecionado(this.files)\">\n      <div class=\"flex-between\" style=\"margin-top:14px;gap:10px;flex-wrap:wrap\">\n        <span class=\"text-sec\" style=\"font-size:.8em\" id=\"ext-status\"></span>\n        <span style=\"display:flex;gap:8px\">\n          <button class=\"btn ghost\" id=\"ext-btn-analisar\" onclick=\"extAnalisar()\" disabled><i class=\"fas fa-magnifying-glass\"></i> Analisar</button>\n          <button class=\"btn\" id=\"ext-btn-importar\" onclick=\"extImportar()\" disabled><i class=\"fas fa-file-import\"></i> Importar mês</button>\n        </span>\n      </div>\n      <div id=\"ext-previa\" style=\"margin-top:14px\"></div>\n    </div>\n    <div id=\"ext-vis\"></div>\n  </div>\n</div>\n\n<!-- Modal fluxo detalhado (por fonte) -->\n<div class=\"modal-backdrop\" id=\"modal-fx\"><div class=\"modal modal-lg\">\n  <div class=\"modal-header\"><h3 id=\"fx-titulo\">Fluxo do mês</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-fx')\">&times;</button></div>\n  <div class=\"modal-body\" id=\"fx-body\"></div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-fx')\">Fechar</button></div>\n</div></div>\n\n<!-- Modal ajuste -->\n<div class=\"modal-backdrop\" id=\"modal-ajuste\"><div class=\"modal\">\n  <div class=\"modal-header\"><h3 id=\"aj-titulo\">Novo ajuste</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-ajuste')\">&times;</button></div>\n  <div class=\"modal-body\">\n    <input type=\"hidden\" id=\"aj-id\">\n    <div class=\"form-grid-2\">\n      <div class=\"form-group\"><label>Descrição <span class=\"req\">*</span></label><input class=\"form-control\" id=\"aj-desc\" placeholder=\"ex: Contador, Reserva, CREMESP\"></div>\n      <div class=\"form-group\"><label>Categoria</label><select class=\"form-control\" id=\"aj-categoria\"></select></div>\n    </div>\n    <div class=\"form-grid-2\">\n      <div class=\"form-group\"><label>Dono <span class=\"req\">*</span></label><select class=\"form-control\" id=\"aj-dono\" onchange=\"onDonoAjuste()\"><option>Tuto</option><option>Francesca</option></select></div>\n      <div class=\"form-group\"><label>Fonte</label><select class=\"form-control\" id=\"aj-fonte\"><option value=\"\">— (geral) —</option></select></div>\n    </div>\n    <div class=\"form-grid\">\n      <div class=\"form-group\"><label>Tipo</label><select class=\"form-control\" id=\"aj-tipo\" onchange=\"onTipoAjuste()\"><option value=\"valor\">Valor fixo (R$)</option><option value=\"percentual\">Percentual (%)</option></select></div>\n      <div class=\"form-group\"><label id=\"aj-lbl-valor\">Valor (R$)</label><input class=\"form-control\" id=\"aj-valor\" inputmode=\"decimal\" placeholder=\"0,00\"></div>\n      <div class=\"form-group\" id=\"aj-grp-base\"><label>Base do %</label><select class=\"form-control\" id=\"aj-base\"><option value=\"transferir\">A Transferir</option><option value=\"faturado\">Faturado</option></select></div>\n    </div>\n    <div class=\"form-grid\">\n      <div class=\"form-group\"><label>Efeito</label><select class=\"form-control\" id=\"aj-sinal\"><option value=\"saida\">Deduz (saída)</option><option value=\"entrada\">Soma (entrada)</option></select></div>\n      <div class=\"form-group\"><label>Recorrência</label><select class=\"form-control\" id=\"aj-rec\" onchange=\"onRecAjuste()\"><option value=\"mensal\">Mensal</option><option value=\"unica\">Única</option></select></div>\n      <div class=\"form-group\"><label id=\"aj-lbl-comp\">A partir de (opcional)</label><input type=\"month\" class=\"form-control\" id=\"aj-comp\"></div>\n    </div>\n    <div class=\"form-group\" id=\"aj-grp-meses\"><label>Período de recorrência <span class=\"text-sec\">(nº de meses; vazio = indefinido)</span></label><input class=\"form-control\" id=\"aj-meses\" inputmode=\"numeric\" placeholder=\"ex: 12\"></div>\n    <div class=\"form-group\"><label>Observações</label><input class=\"form-control\" id=\"aj-obs\"></div>\n    <label class=\"text-sec\" style=\"font-size:.85em\"><input type=\"checkbox\" id=\"aj-ativo\" checked> ativo</label>\n  </div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-ajuste')\">Cancelar</button><button class=\"btn\" id=\"btn-salvar-aj\" onclick=\"salvarAjusteUI()\">Salvar</button></div>\n</div></div>\n\n<!-- Modal excluir -->\n<div class=\"modal-backdrop\" id=\"modal-del\"><div class=\"modal modal-sm\">\n  <div class=\"modal-header danger\"><h3>Excluir</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-del')\">&times;</button></div>\n  <div class=\"modal-body\"><p id=\"del-msg\"></p></div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-del')\">Cancelar</button><button class=\"btn danger\" id=\"btn-del\" onclick=\"confirmarDel()\">Excluir</button></div>\n</div></div>\n\n<script>\n(function() {\n  var _linhas = [], _incluirFuturos = false, _ajustes = [], _delId = null, _ajFontes = [], _ajCategorias = [];\n\n  window.fecharModal = function(id){ document.getElementById(id).classList.remove('aberta'); };\n  function abrir(id){ document.getElementById(id).classList.add('aberta'); }\n  function fmt(n){ return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }\n  function esc(s){ return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c];}); }\n  function num(v){ if(v==null||v==='') return 0; v=String(v).replace(/[^\\d.,-]/g,''); if(v.indexOf(',')!==-1) v=v.replace(/\\./g,'').replace(',','.'); return parseFloat(v)||0; }\n  function cls(v){ return Number(v)<0 ? 'style=\"color:var(--risk-high)\"' : ''; }\n\n  window.trocarTab = function(t){\n    document.querySelectorAll('.tab[data-tab]').forEach(function(el){ el.classList.toggle('ativa', el.getAttribute('data-tab')===t); });\n    ['fluxo','ajustes','real'].forEach(function(x){ document.getElementById('tab-'+x).classList.toggle('ativa', x===t); });\n    if(t==='ajustes') carregarAjustes();\n    if(t==='real') carregarFluxoReal();\n  };\n\n  /* ---------- FLUXO (tabela) ---------- */\n  window.toggleFuturos = function(){\n    _incluirFuturos=!_incluirFuturos;\n    var b=document.getElementById('btn-futuros');\n    b.innerHTML = _incluirFuturos ? '<i class=\"fas fa-backward\"></i> Ocultar valores futuros' : '<i class=\"fas fa-forward\"></i> Incluir valores futuros';\n    carregarFluxo();\n  };\n\n  function carregarFluxo(){\n    document.getElementById('body-caixa').innerHTML='<tr><td colspan=\"9\"><div class=\"loader\"></div></td></tr>';\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso'){ document.getElementById('body-caixa').innerHTML='<tr><td colspan=\"9\"><div class=\"alerta alerta-erro\">'+((res&&res.mensagem)||'Erro')+'</div></td></tr>'; return; }\n      _linhas=(res.dados.linhas||[]).slice().reverse();   // mais recente primeiro\n      if(!_linhas.length){ document.getElementById('body-caixa').innerHTML='<tr><td colspan=\"9\"><div class=\"alerta alerta-info\">Sem movimentação no período.</div></td></tr>'; return; }\n      document.getElementById('body-caixa').innerHTML=_linhas.map(function(m,i){\n        var mesCel=esc(m.mes)+(m.futuro?' <span class=\"badge neutral\">futuro</span>':'');\n        function olho(quem){ var lbl=(quem==='total')?'Ver Holding':'Ver '+quem; return '<td class=\"text-center\" data-label=\"'+lbl+'\"><button class=\"btn ghost sm\" onclick=\"verFluxo('+i+',\\''+quem+'\\')\"><i class=\"fas fa-eye\"></i></button></td>'; }\n        return '<tr'+(m.futuro?' style=\"opacity:.72\"':'')+'>'+\n          '<td class=\"mono\" data-full>'+mesCel+'</td>'+\n          '<td class=\"num\" data-label=\"Tuto · Transferir\" style=\"border-left:1px solid var(--line)\" '+cls(m.Tuto.a_transferir)+'>'+fmt(m.Tuto.a_transferir)+'</td>'+olho('Tuto')+\n          '<td class=\"num\" data-label=\"Francesca · Transferir\" style=\"border-left:1px solid var(--line)\" '+cls(m.Francesca.a_transferir)+'>'+fmt(m.Francesca.a_transferir)+'</td>'+olho('Francesca')+\n          '<td class=\"num\" data-label=\"A Pagar (mês)\" style=\"border-left:1px solid var(--line);color:var(--risk-mid)\"><strong>'+fmt(m.total.pagar)+'</strong></td>'+\n          '<td class=\"num\" data-label=\"A Transferir\" '+cls(m.total.a_transferir)+'><strong>'+fmt(m.total.a_transferir)+'</strong></td>'+\n          '<td class=\"num\" data-label=\"Fica em conta\" '+cls(m.total.fechamento)+'>'+fmt(m.total.fechamento)+'</td>'+olho('total')+\n        '</tr>';\n      }).join('');\n    }).withFailureHandler(function(err){\n      document.getElementById('body-caixa').innerHTML='<tr><td colspan=\"9\"><div class=\"alerta alerta-erro\">Erro: '+(err&&err.message?err.message:err)+'</div></td></tr>';\n    }).obterFluxoCaixa({ incluirFuturos:_incluirFuturos });\n  }\n\n  /* ---------- modal fluxo detalhado por fonte ---------- */\n  window.verFluxo = function(i, quem){\n    var m=_linhas[i]; if(!m) return;\n    var p=m[quem]; var holding=(quem==='total');\n    var nome=holding?'Holding':quem;\n    document.getElementById('fx-titulo').textContent='Fluxo · '+nome+' · '+m.mes;\n\n    function lin(l,v,opt){ opt=opt||{}; var cor=opt.neg&&Number(v)<0?'var(--risk-high)':(opt.cor||''); return '<div class=\"flex-between\" style=\"padding:5px 0;border-bottom:1px solid var(--line)\"><span class=\"text-sec\">'+l+'</span><strong class=\"mono\"'+(cor?' style=\"color:'+cor+'\"':'')+'>'+(opt.txt||fmt(v))+'</strong></div>'; }\n    function subhdr(t){ return '<div style=\"margin:15px 0 6px;font-size:.72em;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-400);font-weight:700\">'+t+'</div>'; }\n\n    // tabela por fonte — Líquido (antes dos adicionais) → Deduções (adicionais da fonte) → A transferir por fonte\n    var fs=p.fontes||[];\n    var tot={bruto:0,retido:0,recebido:0,iss:0,pc:0,prov_trim:0,transferir:0,ded:0,atransf:0};\n    var temNaoTrib=false, temGeral=false;\n    var rows=fs.map(function(f){\n      var pj=(f.tributado!==undefined)?f.tributado:(String(f.regime).toUpperCase()==='PJ');\n      var dedNet=(Number(f.ajuste_saida)||0)-(Number(f.ajuste_entrada)||0);   // + = deduz, − = soma\n      var atrans=(f.transferir_final!=null)?Number(f.transferir_final):((Number(f.transferir)||0)-dedNet);\n      if(pj){ ['bruto','retido','recebido','iss','pc','prov_trim'].forEach(function(k){ tot[k]+=(Number(f[k])||0); });\n        tot.transferir+=(Number(f.transferir)||0); tot.ded+=dedNet; tot.atransf+=atrans; }\n      else temNaoTrib=true;\n      function c(v,ok,lbl){ return '<td class=\"num\" data-label=\"'+lbl+'\">'+(ok!==false?fmt(v):'<span class=\"text-sec\">—</span>')+'</td>'; }\n      var nomeF=(holding?'<span class=\"badge neutral\" style=\"margin-right:5px\">'+esc(f.dono)+'</span>':'')+\n        '<strong>'+esc(f.fonte)+'</strong> <span class=\"text-sec\">(dia '+(f.dia||'?')+(f.emissao?' · emissão '+esc(f.emissao):'')+')</span>'+\n        (pj?'':' <span class=\"badge neutral\">'+esc(f.regime)+'</span>');\n      // Deduções da fonte (com detalhe no hover)\n      var itens=f.ajustes_itens||[];\n      var dedCell;\n      if(pj&&(itens.length||dedNet!==0)){\n        var titulo=itens.map(function(a){return (a.sinal==='entrada'?'+ ':'− ')+a.descricao+': '+fmt(a.valor);}).join(' · ');\n        var sin=dedNet>=0?'− ':'+ ', cor=dedNet>0?'var(--risk-high)':(dedNet<0?'var(--risk-low)':'');\n        dedCell='<td class=\"num\" data-label=\"Deduções\" title=\"'+esc(titulo)+'\"'+(cor?' style=\"color:'+cor+'\"':'')+'>'+sin+fmt(Math.abs(dedNet))+'</td>';\n      } else dedCell='<td class=\"num\" data-label=\"Deduções\"><span class=\"text-sec\">—</span></td>';\n      var liqCell = pj ? '<td class=\"num\" data-label=\"Líquido\">'+fmt(f.transferir)+'</td>' : '<td class=\"num\" data-label=\"Líquido\"><span class=\"text-sec\">—</span></td>';\n      var atransCell = pj ? '<td class=\"num\" data-label=\"A transferir\"><strong>'+fmt(atrans)+'</strong></td>' : '<td class=\"num\" data-label=\"A transferir\"><span class=\"text-sec\">fora*</span></td>';\n      return '<tr'+(pj?'':' style=\"opacity:.6\"')+'><td data-full>'+nomeF+'</td>'+c(f.bruto,true,'Bruto')+c(f.retido,pj,'Retenções')+c(f.recebido,true,'Recebido')+c(f.iss,pj,'ISS')+\n        (pj&&f.pc>0?c(f.pc,true,'PIS/COFINS'):'<td class=\"num\" data-label=\"PIS/COFINS\"><span class=\"text-sec\">—</span></td>')+\n        c(f.prov_trim,pj,'Prov. trim.')+liqCell+dedCell+atransCell+'</tr>';\n    }).join('');\n    // ajustes gerais (sem fonte) — aplicados fora da tabela, no total do dono\n    (p.ajustes_lista||[]).forEach(function(a){ if(!a.fonte) temGeral=true; });\n    var tabela = fs.length ?\n      '<div style=\"overflow-x:auto\"><table class=\"tracker cardify\" style=\"font-size:12px\">'+\n      '<thead><tr><th>Fonte</th><th class=\"num\">Bruto</th><th class=\"num\">Retenções</th><th class=\"num\">Recebido</th><th class=\"num\">ISS</th><th class=\"num\">PIS/COFINS</th><th class=\"num\">Prov. trim.</th><th class=\"num\">Líquido</th><th class=\"num\">Deduções</th><th class=\"num\">A transferir</th></tr></thead>'+\n      '<tbody>'+rows+\n      '<tr class=\"row-total\"><td data-full>Total (tributadas)</td><td class=\"num\" data-label=\"Bruto\">'+fmt(tot.bruto)+'</td><td class=\"num\" data-label=\"Retenções\">'+fmt(tot.retido)+'</td><td class=\"num\" data-label=\"Recebido\">'+fmt(tot.recebido)+'</td><td class=\"num\" data-label=\"ISS\">'+fmt(tot.iss)+'</td><td class=\"num\" data-label=\"PIS/COFINS\">'+fmt(tot.pc)+'</td><td class=\"num\" data-label=\"Prov. trim.\">'+fmt(tot.prov_trim)+'</td><td class=\"num\" data-label=\"Líquido\">'+fmt(tot.transferir)+'</td><td class=\"num\" data-label=\"Deduções\">'+(tot.ded>=0?'− ':'+ ')+fmt(Math.abs(tot.ded))+'</td><td class=\"num\" data-label=\"A transferir\"><strong>'+fmt(tot.atransf)+'</strong></td></tr>'+\n      '</tbody></table></div>'+\n      '<div class=\"text-sec\" style=\"font-size:.78em;margin-top:6px\">ISS, PIS/COFINS e Prov. trimestral ficam em conta (provisão do mês: <strong class=\"mono\">'+fmt(p.provisionar)+'</strong>). <strong>A transferir</strong> por fonte = Líquido − Deduções (valores adicionais daquela fonte) — cada fonte transfere na sua data.'+\n      (temGeral?' Valores adicionais <em>gerais</em> (sem fonte) são aplicados abaixo, no total.':'')+\n      (temNaoTrib?' <br>* Fontes não tributadas (CLT/Lucros) não compõem o A Transferir por enquanto.':'')+'</div>'\n      : '<div class=\"alerta alerta-info\">Sem recebimentos neste mês.</div>';\n\n    var h='<div class=\"flex-between mb-16\"><div><div class=\"kpi-label\">'+nome+' · '+esc(m.mes)+'</div>'+\n      '<div class=\"serif\" style=\"font-size:1.7em;line-height:1;margin-top:3px\">'+fmt(p.a_transferir)+'</div>'+\n      '<div class=\"text-sec\" style=\"font-size:.76em\">a transferir no mês</div></div>'+\n      (holding?'<div class=\"text-right\"><div class=\"kpi-label\">a pagar no mês</div><div class=\"mono\" style=\"font-weight:700;font-size:1.1em;color:var(--risk-mid)\">'+fmt(p.pagar)+'</div><div class=\"text-sec\" style=\"font-size:.72em\">manter em conta</div></div>':'')+\n      '</div>';\n    h+=subhdr('Fluxo por fonte')+tabela;\n\n    // valores adicionais — waterfall: subtotal líquido − deduções (+ entradas) = A Transferir\n    h+=subhdr('A Transferir (líquido das fontes − valores adicionais)');\n    h+=lin('Subtotal líquido das fontes', p.transferir_fontes);\n    if(p.ajustes_lista&&p.ajustes_lista.length){\n      p.ajustes_lista.forEach(function(a){\n        var sinal=a.sinal==='entrada'?'+ ':'− ';\n        var cor=a.sinal==='entrada'?'var(--risk-low)':'var(--risk-high)';\n        var onde=a.fonte?esc(a.fonte):'geral';\n        var lbl=(holding&&a.dono?'<span class=\"badge neutral\" style=\"margin-right:5px\">'+esc(a.dono)+'</span>':'')+'↳ '+esc(a.descricao)+' <span class=\"text-sec\">('+onde+')</span>'+(a.perc?' <span class=\"badge neutral\">%</span>':'');\n        h+=lin(lbl, a.valor, {txt:sinal+fmt(a.valor), cor:cor});\n      });\n    } else h+='<div class=\"text-sec\" style=\"font-size:.85em;padding:4px 0\">— sem valores adicionais neste mês —</div>';\n    h+=lin('<strong>A Transferir (final)</strong>', p.a_transferir, {neg:true});\n\n    if(holding){\n      h+=subhdr('A Pagar no mês (tributos a quitar — manter em conta)');\n      h+=lin('ISS (emissões mês ant.)', p.iss_ant)+lin('PIS/COFINS (mês ant.)', p.pc_ant)+lin('IRPJ/CSLL (fechamento do trimestre)', p.federal_trim)+\n         lin('<strong>Total a pagar</strong>', p.pagar, {cor:'var(--risk-mid)'});\n      h+=subhdr('Fechamento do mês');\n      h+=lin('Recebido', p.recebido)+\n         lin('(−) Tributos pagos', p.pagar, {txt:'− '+fmt(p.pagar)})+\n         lin('(−) Transferido', p.a_transferir, {txt:'− '+fmt(p.a_transferir)})+\n         lin('<strong>(=) Fica em conta</strong>', p.fechamento, {neg:true, cor:(p.fechamento<0?'var(--risk-high)':'var(--risk-low)')});\n    }\n    document.getElementById('fx-body').innerHTML=h;\n    abrir('modal-fx');\n  };\n\n  /* ---------- VALORES ADICIONAIS (CRUD) ---------- */\n  function carregarOpcoesAj(cb){\n    google.script.run.withSuccessHandler(function(res){\n      if(res&&res.status==='sucesso'){\n        _ajFontes=res.dados.fontes||[]; _ajCategorias=res.dados.categorias||[];\n        document.getElementById('aj-categoria').innerHTML='<option value=\"\">—</option>'+_ajCategorias.map(function(c){return '<option>'+esc(c)+'</option>';}).join('');\n        filtrarFontesAjuste();\n      }\n      if(cb) cb();\n    }).withFailureHandler(function(err){ mostrarToast('Erro nas opções: '+(err&&err.message?err.message:err),'erro'); if(cb) cb(); }).obterOpcoesAjustes();\n  }\n\n  function filtrarFontesAjuste(){\n    var dono=document.getElementById('aj-dono').value;\n    var atual=document.getElementById('aj-fonte').value;\n    var fs=_ajFontes.filter(function(f){ return !dono || String(f.dono).toLowerCase()===String(dono).toLowerCase(); });\n    document.getElementById('aj-fonte').innerHTML='<option value=\"\">— (geral) —</option>'+fs.map(function(f){return '<option>'+esc(f.nome)+'</option>';}).join('');\n    if(fs.some(function(f){return f.nome===atual;})) document.getElementById('aj-fonte').value=atual;\n  }\n  window.onDonoAjuste = function(){ filtrarFontesAjuste(); };\n\n  function carregarAjustes(){\n    document.getElementById('body-ajustes').innerHTML='<tr><td colspan=\"9\"><div class=\"loader\"></div></td></tr>';\n    carregarOpcoesAj();\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso'){ document.getElementById('body-ajustes').innerHTML='<tr><td colspan=\"9\"><div class=\"alerta alerta-erro\">'+((res&&res.mensagem)||'Erro')+'</div></td></tr>'; return; }\n      _ajustes=res.dados.ajustes;\n      if(!_ajustes.length){ document.getElementById('body-ajustes').i fas fa-magnifying-glass\"></i> Analisar';\n      mostrarToast('Erro: '+(e&&e.message?e.message:e),'erro');\n    }).importarExtrato({ paginas:_extPaginas, arquivo:_extNome, preview:true });\n  };\n\n  window.extImportar = function(){\n    if(!_extPaginas||!_extPrevia){ mostrarToast('Analise o extrato antes de importar.','aviso'); return; }\n    if(!extOnline()){ mostrarToast('A importação de extrato exige conexão.','aviso'); return; }\n    var btn=document.getElementById('ext-btn-importar');\n    btn.disabled=true; btn.innerHTML='<span class=\"spinner-sm\"></span> Importando…';\n    google.script.run.withSuccessHandler(function(res){\n      btn.innerHTML='<i class=\"fas fa-file-import\"></i> Importar mês';\n      if(!res||res.status!=='sucesso'){ btn.disabled=false; mostrarToast((res&&res.mensagem)||'Erro na importação','erro'); return; }\n      mostrarToast(res.mensagem||'Extrato importado.','sucesso');\n      var mesImportado=res.dados&&res.dados.resumo?res.dados.resumo.mes:'';\n      _extPrevia=null; _extPaginas=null;\n      document.getElementById('ext-previa').innerHTML='';\n      document.getElementById('ext-arquivo').textContent='nenhum arquivo selecionado';\n      document.getElementById('ext-file').value='';\n      document.getElementById('ext-btn-analisar').disabled=true;\n      extStatus('');\n      carregarFluxoReal(mesImportado);\n    }).withFailureHandler(function(e){\n      btn.disabled=false; btn.innerHTML='<i class=\"fas fa-file-import\"></i> Importar mês';\n      mostrarToast('Erro: '+(e&&e.message?e.message:e),'erro');\n    }).importarExtrato({ paginas:_extPaginas, arquivo:_extNome, preview:false });\n  };\n\n  function extBadgeClasse(t){\n    if(t.interna) return '<span class=\"badge neutral\">CDB</span>';\n    var mapa={ fonte:['low', t.fonte||'fonte'], transferencia:['neutral','transf. '+(t.fonte||'')], tributo:['high','tributo'],\n               contador:['mid','contador'], tarifa:['mid','tarifa'], rendimento:['low','rendimento'], outra:['neutral','outros'] };\n    var b=mapa[t.classe]||mapa.outra;\n    return '<span class=\"badge '+b[0]+'\">'+esc(b[1])+'</span>';\n  }\n\n  function extKpi(rotulo,valor,extra,classe){\n    return '<div class=\"kpi'+(classe?' '+classe:'')+'\"><div class=\"kpi-label\">'+rotulo+'</div><div class=\"kpi-value\" style=\"font-size:24px\">'+valor+'</div>'+(extra?'<div class=\"kpi-foot\">'+extra+'</div>':'')+'</div>';\n  }\n\n  function extRenderVis(){\n    var d=_extDados, alvo=document.getElementById('ext-vis');\n    if(!d||!(d.meses||[]).length){ alvo.innerHTML='<div class=\"card card-pad\"><div class=\"alerta alerta-info\">Nenhum extrato importado ainda. Envie o PDF do extrato mensal acima.</div></div>'; return; }\n    var meta=d.meta||{}, cmp=d.comparacao||{};\n    var h='<div class=\"card card-pad\">';\n    h+='<div class=\"flex-between mb-16\" style=\"flex-wrap:wrap;gap:10px\"><div style=\"display:flex;align-items:center;gap:10px\"><strong>Fluxo real</strong>'+\n       '<select class=\"form-control\" style=\"width:auto;padding:6px 10px\" onchange=\"carregarFluxoReal(this.value)\">'+\n       d.meses.map(function(m){ return '<option value=\"'+esc(m)+'\"'+(m===d.mes?' selected':'')+'>'+fmtMes(m)+'</option>'; }).join('')+'</select>'+\n       (meta.reconcilia?'<span class=\"badge low\">✓ reconciliado</span>':'<span class=\"badge mid\">⚠ com avisos</span>')+'</div>'+\n       '<span class=\"text-sec\" style=\"font-size:.78em\">'+esc(meta.arquivo||'')+(meta.qtd?' · '+meta.qtd+' transações':'')+'</span></div>';\n    // KPIs\n    h+='<div class=\"kpi-row mb-16\">'+\n       extKpi('Saldo inicial → final', fmt(meta.saldo_final), 'começou em '+fmt(meta.saldo_inicial))+\n       extKpi('Entradas', fmt(meta.entradas), 'créditos do mês (sem CDB)', 'r-low')+\n       extKpi('Saídas', fmt(meta.saidas), 'débitos do mês (sem CDB)', 'r-high')+\n       extKpi('Resultado do mês', fmt(meta.resultado), 'Δ saldo da conta', Number(meta.resultado)<0?'r-high':'r-low')+\n       '</div>';\n    if(meta.avisos&&meta.avisos.length){ h+='<div class=\"alerta alerta-aviso\" style=\"margin-bottom:14px\"><strong>Avisos da importação:</strong><br>'+meta.avisos.map(esc).join('<br>')+'</div>'; }\n    // Real × Projetado\n    h+='<div style=\"margin:2px 0 6px;font-size:.72em;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-400);font-weight:700\">Real × Projetado (Fluxo de Caixa)</div>';\n    if(cmp.tem_projecao){\n      function linhaCmp(rotulo,real,proj,bomSePositivo){\n        var delta=Math.round((real-proj)*100)/100;\n        var bom=bomSePositivo?delta>=0:delta<=0;\n        var cor=delta===0?'':(bom?'var(--risk-low)':'var(--risk-high)');\n        return '<tr><td data-full>'+rotulo+'</td>'+\n          '<td class=\"num\" data-label=\"Real\">'+fmt(real)+'</td>'+\n          '<td class=\"num\" data-label=\"Projetado\">'+fmt(proj)+'</td>'+\n          '<td class=\"num\" data-label=\"Δ (real − proj.)\"'+(cor?' style=\"color:'+cor+'\"':'')+'>'+(delta>0?'+ ':(delta<0?'− ':''))+fmt(Math.abs(delta))+'</td></tr>';\n      }\n      h+='<div style=\"overflow-x:auto\"><table class=\"tracker cardify\" style=\"font-size:12.5px\">'+\n         '<thead><tr><th>Indicador</th><th class=\"num\">Real</th><th class=\"num\">Projetado</th><th class=\"num\">Δ (real − proj.)</th></tr></thead><tbody>'+\n         linhaCmp('Recebido das fontes', cmp.recebido_real, cmp.recebido_proj, true)+\n         linhaCmp('Tributos pagos', cmp.tributos_real, cmp.pagar_proj, false)+\n         linhaCmp('Transferido aos sócios', cmp.transf_real, cmp.transferir_proj, false)+\n         linhaCmp('Resultado do mês (Δ saldo × fica em conta)', cmp.resultado_real, cmp.fechamento_proj, true)+\n         '</tbody></table></div>';\n    } else {\n      h+='<div class=\"alerta alerta-info\">Sem projeção no Fluxo de Caixa para '+fmtMes(d.mes)+' — a comparação aparece quando houver NFs do mês.</div>';\n    }\n    // transações\n    var trans=(d.transacoes||[]), internas=trans.filter(function(t){return t.interna;}).length;\n    h+='<div class=\"flex-between\" style=\"margin:18px 0 6px\"><div style=\"font-size:.72em;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-400);font-weight:700\">Transações do extrato</div>'+\n       (internas?'<label class=\"text-sec\" style=\"font-size:.8em;cursor:pointer\"><input type=\"checkbox\" '+(_extInternas?'checked':'')+' onchange=\"extToggleInternas(this.checked)\"> mostrar movimentos internos (CDB) · '+internas+'</label>':'')+'</div>';\n    var vis=trans.filter(function(t){ return _extInternas||!t.interna; });\n    if(vis.length){\n      h+='<div style=\"overflow-x:auto\"><table class=\"tracker cardify\" style=\"font-size:12.5px\">'+\n         '<thead><tr><th style=\"width:64px\">Data</th><th>Descrição</th><th class=\"num\">Valor</th></tr></thead><tbody>'+\n         vis.map(function(t){\n           var cred=t.tipo==='credito';\n           return '<tr'+(t.interna?' style=\"opacity:.55\"':'')+'>'+\n             '<td class=\"mono\" data-label=\"Data\">'+fmtData(t.data)+'</td>'+\n             '<td data-full>'+esc(t.descricao)+' '+extBadgeClasse(t)+'</td>'+\n             '<td class=\"num mono\" data-label=\"Valor\" style=\"color:'+(cred?'var(--risk-low)':'var(--risk-high)')+'\">'+(cred?'+ ':'− ')+fmt(t.valor)+'</td></tr>';\n         }).join('')+\n         '</tbody></table></div>';\n    } else {\n      h+='<div class=\"alerta alerta-info\">Sem transações neste mês.</div>';\n    }\n    h+='</div>';\n    alvo.innerHTML=h;\n  }\n\n  window.extToggleInternas = function(v){ _extInternas=!!v; extRenderVis(); };\n\n  window.carregarFluxoReal = function(mes){\n    var alvo=document.getElementById('ext-vis');\n    if(!alvo) return;\n    alvo.innerHTML='<div class=\"card card-pad\"><div class=\"loader\"></div></div>';\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso'){ alvo.innerHTML='<div class=\"card card-pad\"><div class=\"alerta alerta-erro\">'+((res&&res.mensagem)||'Erro ao carregar o fluxo real')+'</div></div>'; return; }\n      _extDados=res.dados;\n      extRenderVis();\n      if(_extPrevia) extRenderPrevia(_extPrevia);   // atualiza o aviso de \"mês já importado\"\n    }).withFailureHandler(function(e){\n      alvo.innerHTML='<div class=\"card card-pad\"><div class=\"alerta alerta-erro\">Erro: '+(e&&e.message?e.message:e)+'</div></div>';\n    }).obterFluxoReal(mes?{mes:mes}:{});\n  };\n\n  carregarFluxo();\n})();\n<\/script>\n","Lancamentos":"<!-- Lancamentos.html — Lista, filtros e CRUD de lançamentos. navegarPara('Lancamentos'). -->\n<div class=\"fade-in\">\n  <div class=\"section-head\">\n    <h2>Lançamentos</h2>\n    <div class=\"flex gap-8\">\n      <button class=\"btn ghost sm\" onclick=\"abrirImport()\"><i class=\"fas fa-file-import\"></i> Importar fatura</button>\n      <button class=\"btn sm\" onclick=\"abrirModalLanc(null)\"><i class=\"fas fa-plus\"></i> Novo lançamento</button>\n    </div>\n  </div>\n\n  <!-- Filtros -->\n  <div class=\"card card-pad mb-16\">\n    <div class=\"form-grid\">\n      <div class=\"form-group mb-0\">\n        <label>Mês (fatura)</label>\n        <select class=\"form-control\" id=\"f-mes\" onchange=\"aplicarFiltros()\"><option value=\"\">Todos</option></select>\n      </div>\n      <div class=\"form-group mb-0\">\n        <label>Cartão</label>\n        <select class=\"form-control\" id=\"f-cartao\" onchange=\"aplicarFiltros()\"><option value=\"\">Todos</option></select>\n      </div>\n      <div class=\"form-group mb-0\">\n        <label>Categoria</label>\n        <select class=\"form-control\" id=\"f-categoria\" onchange=\"aplicarFiltros()\"><option value=\"\">Todas</option></select>\n      </div>\n      <div class=\"form-group mb-0\">\n        <label>Buscar descrição</label>\n        <input class=\"form-control\" id=\"f-busca\" placeholder=\"ex: drogasil\" oninput=\"debounceFiltro()\">\n      </div>\n    </div>\n  </div>\n\n  <div class=\"flex-between mb-16\">\n    <div class=\"text-sec\" id=\"lanc-resumo\">carregando…</div>\n    <button class=\"btn ghost sm\" onclick=\"aplicarFiltros()\"><i class=\"fas fa-rotate\"></i> Atualizar</button>\n  </div>\n\n  <div class=\"card\">\n    <div class=\"tabela-wrap\" style=\"overflow-x:auto\">\n      <table class=\"tracker cardify\" id=\"tbl-lanc\">\n        <thead>\n          <tr>\n            <th>Data</th><th>Descrição</th><th>Categoria</th><th>Cartão</th>\n            <th>Parc.</th><th class=\"num\">Valor</th><th class=\"text-center\">Ações</th>\n          </tr>\n        </thead>\n        <tbody id=\"body-lanc\"><tr><td colspan=\"7\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div>\n  </div>\n</div>\n\n<!-- Modal criar/editar -->\n<div class=\"modal-backdrop\" id=\"modal-lanc\">\n  <div class=\"modal\">\n    <div class=\"modal-header\">\n      <h3 id=\"modal-lanc-titulo\">Novo lançamento</h3>\n      <button class=\"modal-close\" onclick=\"fecharModal('modal-lanc')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <input type=\"hidden\" id=\"l-id\">\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\">\n          <label>Data</label>\n          <input type=\"date\" class=\"form-control\" id=\"l-data\">\n        </div>\n        <div class=\"form-group\">\n          <label>Valor (R$) <span class=\"req\">*</span></label>\n          <input class=\"form-control\" id=\"l-valor\" placeholder=\"0,00\" inputmode=\"decimal\">\n        </div>\n      </div>\n      <div class=\"form-group\">\n        <label>Descrição <span class=\"req\">*</span></label>\n        <input class=\"form-control\" id=\"l-descricao\" placeholder=\"ex: Drogasil\">\n      </div>\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\">\n          <label>Categoria</label>\n          <select class=\"form-control\" id=\"l-categoria\"><option value=\"\">— (auto pela descrição) —</option></select>\n        </div>\n        <div class=\"form-group\">\n          <label>Cartão</label>\n          <select class=\"form-control\" id=\"l-cartao\"><option value=\"\">—</option></select>\n        </div>\n      </div>\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\">\n          <label>Parcela</label>\n          <input class=\"form-control\" id=\"l-parcela\" placeholder=\"ex: 1/3\">\n        </div>\n        <div class=\"form-group\">\n          <label>Mês da fatura</label>\n          <input class=\"form-control\" id=\"l-fatura\" placeholder=\"aaaa-mm\">\n        </div>\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn ghost\" onclick=\"fecharModal('modal-lanc')\">Cancelar</button>\n      <button class=\"btn\" id=\"btn-salvar-lanc\" onclick=\"salvarLanc()\">Salvar</button>\n    </div>\n  </div>\n</div>\n\n<!-- Modal confirmar exclusão -->\n<div class=\"modal-backdrop\" id=\"modal-excluir\">\n  <div class=\"modal modal-sm\">\n    <div class=\"modal-header danger\">\n      <h3>Excluir lançamento</h3>\n      <button class=\"modal-close\" onclick=\"fecharModal('modal-excluir')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <p>Remover <strong id=\"excluir-desc\"></strong>? Esta ação não pode ser desfeita.</p>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn ghost\" onclick=\"fecharModal('modal-excluir')\">Cancelar</button>\n      <button class=\"btn danger\" id=\"btn-confirma-excluir\" onclick=\"confirmarExclusao()\">Excluir</button>\n    </div>\n  </div>\n</div>\n\n<script>\n(function() {\n  var _lista = [];      // cache da lista atual\n  var _opcoes = { categorias: [], cartoes: [], meses: [] };\n  var _excluirId = null;\n  var _filtroTimer = null;\n\n  window.fecharModal = function(id) { document.getElementById(id).classList.remove('aberta'); };\n  function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }\n\n  function fmtBRL(n) { return (Number(n) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }\n  function esc(s) { return String(s == null ? '' : s).replace(/[&<>\"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]; }); }\n\n  function carregarOpcoes(cb) {\n    google.script.run.withSuccessHandler(function(res) {\n      if (res && res.status === 'sucesso') {\n        _opcoes = res.dados;\n        preencherSelect('f-mes', _opcoes.meses.map(function(m){return {v:m,t:m};}), 'Todos');\n        preencherSelect('f-cartao', _opcoes.cartoes.map(function(c){return {v:c,t:c};}), 'Todos');\n        preencherSelectCategorias('f-categoria', true);\n        preencherSelect('l-cartao', _opcoes.cartoes.map(function(c){return {v:c,t:c};}), '—');\n        preencherSelectCategorias('l-categoria', false);\n      }\n      if (cb) cb();\n    }).obterOpcoesLancamentos();\n  }\n\n  function preencherSelect(id, itens, labelVazio) {\n    var sel = document.getElementById(id);\n    var atual = sel.value;\n    var html = '<option value=\"\">' + labelVazio + '</option>';\n    itens.forEach(function(it){ html += '<option value=\"' + esc(it.v) + '\">' + esc(it.t) + '</option>'; });\n    sel.innerHTML = html; sel.value = atual;\n  }\n\n  function preencherSelectCategorias(id, comTodas) {\n    var sel = document.getElementById(id);\n    var atual = sel.value;\n    var grupos = {};\n    _opcoes.categorias.forEach(function(c){ (grupos[c.grupo] = grupos[c.grupo] || []).push(c.categoria); });\n    var html = comTodas ? '<option value=\"\">Todas</option>' : '<option value=\"\">— (auto pela descrição) —</option>';\n    Object.keys(grupos).forEach(function(g){\n      html += '<optgroup label=\"' + esc(g) + '\">';\n      grupos[g].forEach(function(cat){ html += '<option value=\"' + esc(cat) + '\">' + esc(cat) + '</option>'; });\n      html += '</optgroup>';\n    });\n    sel.innerHTML = html; sel.value = atual;\n  }\n\n  window.aplicarFiltros = function() {\n    var filtros = {\n      mes: document.getElementById('f-mes').value,\n      cartao: document.getElementById('f-cartao').value,\n      categoria: document.getElementById('f-categoria').value,\n      busca: document.getElementById('f-busca').value\n    };\n    document.getElementById('body-lanc').innerHTML = '<tr><td colspan=\"7\"><div class=\"loader\"></div></td></tr>';\n    google.script.run.withSuccessHandler(function(res){\n      if (!res || res.status !== 'sucesso') {\n        document.getElementById('body-lanc').innerHTML = '<tr><td colspan=\"7\"><div class=\"alerta alerta-erro\">' + ((res&&res.mensagem)||'Erro.') + '</div></td></tr>';\n        return;\n      }\n      _lista = res.dados.lancamentos;\n      renderLista();\n      document.getElementById('lanc-resumo').innerHTML = res.dados.qtd + ' lançamento(s) · total <strong class=\"mono\">' + fmtBRL(res.dados.total) + '</strong>';\n    }).withFailureHandler(function(err){\n      document.getElementById('body-lanc').innerHTML = '<tr><td colspan=\"7\"><div class=\"alerta alerta-erro\">Erro: ' + (err.message||err) + '</div></td></tr>';\n    }).listarLancamentos(filtros);\n  };\n\n  window.debounceFiltro = function() { clearTimeout(_filtroTimer); _filtroTimer = setTimeout(aplicarFiltros, 350); };\n\n  function renderLista() {\n    if (!_lista.length) {\n      document.getElementById('body-lanc').innerHTML = '<tr><td colspan=\"7\"><div class=\"alerta alerta-info\">Nenhum lançamento. Crie um manualmente ou importe uma fatura.</div></td></tr>';\n      return;\n    }\n    document.getElementById('body-lanc').innerHTML = _lista.map(function(l){\n      var cat = l.categoria ? esc(l.categoria) : '<span class=\"badge mid\">sem categoria</span>';\n      return '<tr>' +\n        '<td class=\"mono\" data-label=\"Data\">' + esc(l.dataStr) + '</td>' +\n        '<td class=\"veh\" data-full>' + esc(l.descricao) + '</td>' +\n        '<td data-label=\"Categoria\">' + cat + '</td>' +\n        '<td data-label=\"Cartão\">' + esc(l.cartao) + '</td>' +\n        '<td class=\"mono\" data-label=\"Parcela\">' + esc(l.parcela) + '</td>' +\n        '<td class=\"num\" data-label=\"Valor\">' + fmtBRL(l.valor) + '</td>' +\n        '<td class=\"text-center\" style=\"white-space:nowrap\">' +\n          '<button class=\"btn ghost sm\" onclick=\"abrirModalLanc(\\'' + l.id + '\\')\" title=\"Editar\"><i class=\"fas fa-pen\"></i></button> ' +\n          '<button class=\"btn ghost sm\" onclick=\"pedirExclusao(\\'' + l.id + '\\')\" title=\"Excluir\"><i class=\"fas fa-trash\"></i></button>' +\n        '</td>' +\n      '</tr>';\n    }).join('');\n  }\n\n  window.abrirModalLanc = function(id) {\n    document.getElementById('l-id').value = id || '';\n    document.getElementById('modal-lanc-titulo').textContent = id ? 'Editar lançamento' : 'Novo lançamento';\n    var l = id ? _lista.filter(function(x){ return String(x.id) === String(id); })[0] : null;\n    document.getElementById('l-data').value = l ? (l.dataISO || '') : '';\n    document.getElementById('l-valor').value = l ? String(l.valor).replace('.', ',') : '';\n    document.getElementById('l-descricao').value = l ? l.descricao : '';\n    document.getElementById('l-categoria').value = l ? (l.categoria || '') : '';\n    document.getElementById('l-cartao').value = l ? (l.cartao || '') : '';\n    document.getElementById('l-parcela').value = l ? (l.parcela || '') : '';\n    document.getElementById('l-fatura').value = l ? (l.fatura_mes || '') : '';\n    abrirModal('modal-lanc');\n  };\n\n  window.salvarLanc = function() {\n    var dados = {\n      data: document.getElementById('l-data').value,\n      valor: document.getElementById('l-valor').value,\n      descricao: document.getElementById('l-descricao').value,\n      categoria: document.getElementById('l-categoria').value,\n      cartao: document.getElementById('l-cartao').value,\n      parcela: document.getElementById('l-parcela').value,\n      fatura_mes: document.getElementById('l-fatura').value\n    };\n    if (!dados.descricao.trim()) { mostrarToast('Informe a descrição.', 'aviso'); return; }\n    var id = document.getElementById('l-id').value;\n    var btn = document.getElementById('btn-salvar-lanc');\n    btn.disabled = true; btn.innerHTML = '<span class=\"spinner-sm\"></span> Salvando…';\n\n    var handler = function(res){\n      btn.disabled = false; btn.textContent = 'Salvar';\n      if (res && res.status === 'sucesso') {\n        mostrarToast(res.mensagem, 'sucesso');\n        fecharModal('modal-lanc');\n        carregarOpcoes(aplicarFiltros);\n      } else {\n        mostrarToast((res && res.mensagem) || 'Erro ao salvar.', 'erro');\n      }\n    };\n    var falha = function(err){ btn.disabled = false; btn.textContent = 'Salvar'; mostrarToast('Erro: ' + (err.message||err), 'erro'); };\n\n    if (id) google.script.run.withSuccessHandler(handler).withFailureHandler(falha).atualizarLancamento(id, dados);\n    else    google.script.run.withSuccessHandler(handler).withFailureHandler(falha).criarLancamento(dados);\n  };\n\n  window.pedirExclusao = function(id) {\n    _excluirId = id;\n    var l = _lista.filter(function(x){ return String(x.id) === String(id); })[0];\n    document.getElementById('excluir-desc').textContent = l ? (l.descricao + ' — ' + fmtBRL(l.valor)) : id;\n    abrirModal('modal-excluir');\n  };\n\n  window.confirmarExclusao = function() {\n    if (!_excluirId) return;\n    var btn = document.getElementById('btn-confirma-excluir');\n    btn.disabled = true; btn.innerHTML = '<span class=\"spinner-sm\"></span> Excluindo…';\n    google.script.run.withSuccessHandler(function(res){\n      btn.disabled = false; btn.textContent = 'Excluir';\n      if (res && res.status === 'sucesso') { mostrarToast(res.mensagem, 'sucesso'); fecharModal('modal-excluir'); aplicarFiltros(); }\n      else mostrarToast((res && res.mensagem) || 'Erro.', 'erro');\n    }).withFailureHandler(function(err){ btn.disabled = false; btn.textContent = 'Excluir'; mostrarToast('Erro: ' + (err.message||err), 'erro'); }).excluirLancamento(_excluirId);\n  };\n\n  window.abrirImport = function() { mostrarToast('Importação de fatura chega na próxima etapa (Fase 2b).', 'aviso'); };\n\n  // boot\n  carregarOpcoes(aplicarFiltros);\n})();\n<\/script>\n","Gestao":"<!-- Gestao.html — STUB (Fase 3). CRUD de Regras, Categorias, Cartões e Config. -->\n<div class=\"fade-in\">\n  <h1 style=\"font-size:1.4em;color:var(--azul-profundo)\" class=\"mb-16\">Gestão do sistema</h1>\n  <div class=\"card\">\n    <div class=\"alerta alerta-info\">\n      <strong>Em construção (Fase 3).</strong> Aqui vão entrar as abas de CRUD: <strong>Regras</strong> de categorização\n      (palavra-chave → categoria), <strong>Categorias</strong>, <strong>Cartões</strong> e configurações —\n      além do botão de recategorizar e \"aprender regra\".\n    </div>\n  </div>\n</div>\n"};</script>
<script>
(function(){
  var PAGES=window.__FH_PAGES||{};
  var READS={"obterFluxoCaixa":"fluxo","obterOpcoesAjustes":"ajOpcoes","listarAjustes":"ajustes","obterDashboardFaturamento":"dashboard","obterOpcoesFaturamento":"opcoesFat","listarFaturamento":"faturamento","listarFontes":"fontes","obterConsolidado":"consolidado","listarLancamentos":"lancamentos","obterOpcoesLancamentos":"opcoesLanc","obterFluxoReal":"fluxoReal"};
  var WRITES=["salvarAjuste","excluirAjuste","criarFaturamento","atualizarFaturamento","excluirFaturamento","salvarFonte","excluirFonte","criarLancamento","atualizarLancamento","excluirLancamento","importarExtrato"];
  var API=localStorage.getItem('fh_api')||"https://script.google.com/macros/s/AKfycbzSn3ND795zUz1JKPzxU_e2Tgkg9fYSSqbAhfcEaThWohIAxIiJ9HZLoQTK9HQX-TNM/exec";
  var TOKEN=localStorage.getItem('fh_token')||'';
  function on(){return navigator.onLine!==false;}
  function canNet(){return on()&&!!API&&!!TOKEN;}
  function cget(k,def){try{var v=localStorage.getItem('fh_c_'+k);return v?JSON.parse(v):def;}catch(e){return def;}}
  function cset(k,v){try{localStorage.setItem('fh_c_'+k,JSON.stringify(v));}catch(e){}}
  function qs(f){var s='';if(f&&typeof f==='object'){for(var k in f){if(!Object.prototype.hasOwnProperty.call(f,k))continue;var v=f[k];if(v===undefined||v===null||v==='')continue;if(v===true)v='1';if(v===false)continue;s+='&'+encodeURIComponent(k)+'='+encodeURIComponent(v);}}return s;}
  function getJSON(api,f){return fetch(API+'?api='+api+'&token='+encodeURIComponent(TOKEN)+qs(f),{method:'GET'}).then(function(r){return r.json();});}
  function postJSON(action,data){return fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({token:TOKEN,action:action,data:data})}).then(function(r){return r.json();});}
  function ckey(api,f){return api+'|'+JSON.stringify(f||{});}
  function pend(){return cget('pending',[]);}
  function setPend(p){cset('pending',p);}
  function queue(action,data){var p=pend();p.push({action:action,data:data,ts:Date.now()});setPend(p);badge();}
  function badge(){var n=pend().length;var el=document.getElementById('fhSync');if(!el)return;if(!on()){el.style.display='flex';el.textContent='● offline'+(n?(' · '+n+' p/ enviar'):'');}else if(n){el.style.display='flex';el.textContent='↑ enviando '+n+'…';}else{el.style.display='none';}}
  function flush(){
    if(!canNet())return Promise.resolve(false);
    var p=pend();if(!p.length)return Promise.resolve(true);
    return p.reduce(function(ch,item,idx){return ch.then(function(){return postJSON(item.action,item.data).then(function(res){if(res&&(res.status==='sucesso'||res.ok)){var pp=pend();pp.splice(pp.indexOf(item)>-1?pp.indexOf(item):idx,1);setPend(pp);}});});},Promise.resolve()).then(function(){badge();return true;},function(){badge();return false;});
  }
  window.addEventListener('online',function(){badge();flush();});
  window.addEventListener('offline',badge);

  // monta o objeto RUN dinamicamente
  var RUN={
    carregarConteudoDaPagina:function(nome){return Promise.resolve(PAGES[nome]||'<div class="alerta alerta-erro">Página não encontrada: '+nome+'</div>');},
    obterPerfilDoUsuario:function(){return Promise.resolve(cget('perfil',{nome:'Financial Hub',autenticado:true}));}
  };
  Object.keys(READS).forEach(function(fn){var api=READS[fn];RUN[fn]=function(f){
    if(canNet())return getJSON(api,f).then(function(d){if(d&&!d.error){cset(ckey(api,f),d);}return (d&&d.error)?{status:'erro',mensagem:d.error}:d;}).catch(function(){return cget(ckey(api,f),{status:'erro',mensagem:'offline sem cache'});});
    return Promise.resolve(cget(ckey(api,f),{status:'erro',mensagem:'offline — sem dados em cache ainda'}));
  };});
  WRITES.forEach(function(fn){RUN[fn]=function(){
    // atualizarFaturamento(id,dados)/atualizarLancamento(id,dados) chegam com 2 args:
    // empacota {id,dados} (o WebApi desempacota); demais writes usam o 1º arg direto.
    var a=arguments;
    var data=(a.length>1)?{id:a[0],dados:a[1]}:a[0];
    if(canNet())return postJSON(fn,data).then(function(res){flush();return res;}).catch(function(){queue(fn,data);return {status:'sucesso',mensagem:'salvo offline — sincroniza ao reconectar'};});
    queue(fn,data);return Promise.resolve({status:'sucesso',mensagem:'salvo offline — sincroniza ao reconectar'});
  };});

  function mk(){var ok=null,er=null;var a={withSuccessHandler:function(f){ok=f;return a;},withFailureHandler:function(f){er=f;return a;}};
    Object.keys(RUN).forEach(function(n){a[n]=function(){var ar=arguments;Promise.resolve().then(function(){return RUN[n].apply(null,ar);}).then(function(r){if(ok)ok(r);},function(e){if(er)er(e&&e.message?e:{message:String(e)});});return a;};});return a;}
  window.google={script:{get run(){return mk();}}};

  // setup (URL + token) — uma vez
  function setup(){var g=document.getElementById('fhSetup');if(!g)return;var ai=document.getElementById('fh_api');if(ai)ai.value=API;g.style.display=(TOKEN&&API?'none':'flex');
    var go=document.getElementById('fh_go');if(go)go.onclick=function(){var ap=(document.getElementById('fh_api').value||'').trim(),tk=(document.getElementById('fh_tok').value||'').trim();if(!ap){document.getElementById('fh_err').textContent='Cole a URL do /exec.';return;}if(!tk){document.getElementById('fh_err').textContent='Cole o token.';return;}API=ap;TOKEN=tk;try{localStorage.setItem('fh_api',ap);localStorage.setItem('fh_token',tk);}catch(e){}g.style.display='none';flush();if(window.navegarPara)window.navegarPara('Dashboard');};}
  function boot(){badge();setup();if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});flush();}
  if(document.readyState!=='loading')boot();else document.addEventListener('DOMContentLoaded',boot);
  window.__fhReset=function(){['fh_token','fh_api'].forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});location.reload();};
})();
</script>

  <div class="topbar-mobile">
    <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <span class="titulo" id="titulo-mobile">Dashboard</span>
  </div>
  <div class="mobile-overlay" onclick="toggleSidebar(false)"></div>

  <div class="wrapper">
    <aside class="sidebar">
      <div class="sidebar-brand"><i class="fas fa-wallet"></i> M&M Financeiro</div>
      <nav class="sidebar-nav" id="nav">
        <div class="nav-item ativo" data-pagina="Dashboard" onclick="navegarPara('Dashboard')"><i class="fas fa-chart-pie"></i> Dashboard</div>
        <div class="nav-item" data-pagina="FinanceiroTributos" onclick="navegarPara('FinanceiroTributos')"><i class="fas fa-building-columns"></i> Financeiro e Tributos</div>
        <div class="nav-item" data-pagina="Lancamentos" onclick="navegarPara('Lancamentos')"><i class="fas fa-receipt"></i> Lançamentos</div>
        <div class="nav-item" data-pagina="Gestao" onclick="navegarPara('Gestao')"><i class="fas fa-sliders-h"></i> Gestão</div>
        <div class="nav-item disabled" title="Em breve — será integrado ao sistema"><i class="fas fa-chart-line"></i> Investimentos <span class="nav-badge">em breve</span></div>
      </nav>
      <div class="sidebar-footer">
        <div class="nome">Financial Hub</div>
        <div></div>
        <div style="opacity:.55;font-size:.78em;margin-top:4px">build 2026-07-13.c</div>
      </div>
    </aside>

    <main class="main-content">
      <div class="content-inner">
        <div id="conteudo"><div class="loader"></div></div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <script>
    var _navToken = 0;

    // Capturador global: qualquer exceção JS vira um toast PERSISTENTE com a
    // localização completa (arquivo:linha:coluna) — toque no toast para fechar.
    window.addEventListener('error', function(e){
      try {
        var src = e.filename ? e.filename.split('/').pop().split('?')[0] : 'inline';
        var st = (e.error && e.error.stack) ? ' · ' + String(e.error.stack).split('\n')[0].slice(0, 120) : '';
        mostrarToast('Erro no app: ' + (e.message || 'desconhecido') + ' — ' + src + ':' + (e.lineno || '?') + ':' + (e.colno || '?') + st, 'erro', true);
      } catch (x) {}
    });
    window.addEventListener('unhandledrejection', function(e){
      try {
        var r = e.reason || {};
        var st = r.stack ? ' · ' + String(r.stack).split('\n')[0].slice(0, 120) : '';
        mostrarToast('Erro assíncrono: ' + (r.message || r) + st, 'erro', true);
      } catch (x) {}
    });

    function navegarPara(nomePagina) {
      // marca item ativo
      var itens = document.querySelectorAll('.nav-item[data-pagina]');
      for (var i = 0; i < itens.length; i++) {
        itens[i].classList.toggle('ativo', itens[i].getAttribute('data-pagina') === nomePagina);
      }
      document.getElementById('titulo-mobile').textContent = nomePagina;
      toggleSidebar(false);

      var alvo = document.getElementById('conteudo');
      alvo.innerHTML = '<div class="loader"></div>';
      var token = ++_navToken;

      google.script.run
        .withSuccessHandler(function(html) {
          if (token !== _navToken) return;        // resposta obsoleta
          alvo.innerHTML = html;
          executarScriptsInjetados(alvo);
        })
        .withFailureHandler(function(err) {
          if (token !== _navToken) return;
          alvo.innerHTML = '<div class="alerta alerta-erro">Erro ao carregar: ' + (err && err.message ? err.message : err) + '</div>';
        })
        .carregarConteudoDaPagina(nomePagina);
    }

    // Reexecuta <script> injetados via innerHTML (não rodam sozinhos)
    function executarScriptsInjetados(container) {
      var scripts = container.querySelectorAll('script');
      for (var i = 0; i < scripts.length; i++) {
        var s = document.createElement('script');
        if (scripts[i].src) s.src = scripts[i].src; else s.textContent = scripts[i].textContent;
        document.body.appendChild(s);
        scripts[i].parentNode.removeChild(scripts[i]);
      }
    }

    function toggleSidebar(forcar) {
      var aberta = (typeof forcar === 'boolean') ? forcar : !document.body.classList.contains('sidebar-aberta');
      document.body.classList.toggle('sidebar-aberta', aberta);
    }

    // Toast global reutilizável pelas páginas.
    // persistente=true: fica na tela (até 60s) e fecha ao TOQUE — usado pelos erros,
    // para dar tempo de ler/printar a localização no celular.
    function mostrarToast(mensagem, tipo, persistente) {
      tipo = tipo || 'sucesso';
      var c = document.getElementById('toast-container');
      var t = document.createElement('div');
      t.className = 'toast ' + tipo;
      var icone = tipo === 'erro' ? 'fa-circle-xmark' : (tipo === 'aviso' ? 'fa-triangle-exclamation' : 'fa-circle-check');
      t.innerHTML = '<i class="fas ' + icone + '"></i><span>' + mensagem + '</span>' + (persistente ? '<span style="margin-left:auto;opacity:.55;font-size:.85em">toque p/ fechar</span>' : '');
      t.style.cursor = 'pointer';
      t.onclick = function(){ t.remove(); };
      c.appendChild(t);
      setTimeout(function(){ t.remove(); }, persistente ? 60000 : 4000);
    }

    // carga inicial
    navegarPara('Dashboard');
  </script>

</body>
</html>
