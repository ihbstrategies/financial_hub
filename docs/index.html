ion value=\"false\">Não</option><option value=\"true\">Sim (6,15%)</option></select></div>\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\"><label>Alíquota ISS</label><input class=\"form-control\" id=\"fo-iss\" placeholder=\"0,02\"></div>\n        <div class=\"form-group\"><label>Alíquota Federais</label><input class=\"form-control\" id=\"fo-fed\" placeholder=\"0,1133\"></div>\n      </div>\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\"><label>Alíquota Retenção</label><input class=\"form-control\" id=\"fo-ret\" placeholder=\"0,0615\"></div>\n        <div class=\"form-group\"><label>Alíquota PIS/COFINS</label><input class=\"form-control\" id=\"fo-pc\" placeholder=\"0,0365\"></div>\n      </div>\n    </div>\n    <div id=\"fo-nota-pj\" class=\"alerta alerta-info\" style=\"display:none\">Regime sem tributação na pessoa — lança o valor recebido direto.</div>\n  </div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-fonte')\">Cancelar</button><button class=\"btn\" id=\"btn-salvar-fonte\" onclick=\"salvarFonteUI()\">Salvar</button></div>\n</div></div>\n\n<!-- Modal excluir -->\n<div class=\"modal-backdrop\" id=\"modal-del\"><div class=\"modal modal-sm\">\n  <div class=\"modal-header danger\"><h3>Excluir</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-del')\">&times;</button></div>\n  <div class=\"modal-body\"><p id=\"del-msg\"></p></div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-del')\">Cancelar</button><button class=\"btn danger\" id=\"btn-del\" onclick=\"confirmarDel()\">Excluir</button></div>\n</div></div>\n\n<script>\n(function() {\n  var _fontes = [], _nfs = [], _fontesMap = {}, _del = null;\n  var _sortField = 'fonte', _sortDir = 1;\n  var NUMERICOS = { valor_bruto:1, iss:1, federais:1, retido:1, a_recolher:1, provisionar:1, a_receber:1, liquido:1 };\n\n  window.fecharModal = function(id){ document.getElementById(id).classList.remove('aberta'); };\n  function abrir(id){ document.getElementById(id).classList.add('aberta'); }\n  function fmt(n){ return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }\n  function esc(s){ return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c];}); }\n  function num(v){ if(v==null||v==='') return 0; v=String(v).replace(/[^\\d.,-]/g,''); if(v.indexOf(',')!==-1) v=v.replace(/\\./g,'').replace(',','.'); return parseFloat(v)||0; }\n  function r2(n){ return Math.round((Number(n)||0)*100)/100; }\n  function pct(n){ return (Number(n)*100).toFixed(2)+'%'; }\n  function isPJ(f){ return f && String(f.regime).toUpperCase()==='PJ'; }\n\n  function mesAtual(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }\n  function shiftMes(ym, delta){ if(!ym) ym=mesAtual(); var p=ym.split('-'); var d=new Date(Number(p[0]), Number(p[1])-1+delta, 1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }\n\n  window.trocarTab = function(t){\n    document.querySelectorAll('.tab[data-tab]').forEach(function(el){ el.classList.toggle('ativa', el.getAttribute('data-tab')===t); });\n    ['nf','cons','fontes'].forEach(function(x){ document.getElementById('tab-'+x).classList.toggle('ativa', x===t); });\n    if(t==='cons') carregarConsolidado();\n    if(t==='fontes') carregarFontes();\n  };\n\n  window.navMes = function(delta){\n    document.getElementById('ff-todos').checked=false;\n    document.getElementById('ff-comp').value = shiftMes(document.getElementById('ff-comp').value, delta);\n    carregarNFs();\n  };\n\n  window.onDonoFiltro = function(){ filtrarFontesPorDono(); carregarNFs(); };\n  function filtrarFontesPorDono(){\n    var _fd=document.getElementById('ff-dono'), _ff=document.getElementById('ff-fonte');\n    if(!_fd||!_ff) return;                              // callback tardio: página já trocou\n    var dono=_fd.value;\n    var atual=_ff.value;\n    var lista=_fontes.filter(function(f){ return !dono || normalizeDono(f.dono)===normalizeDono(dono); });\n    document.getElementById('ff-fonte').innerHTML='<option value=\"\">Todas</option>'+lista.map(function(f){return '<option>'+esc(f.nome)+'</option>';}).join('');\n    // mantém seleção se ainda válida\n    if(lista.some(function(f){return f.nome===atual;})) document.getElementById('ff-fonte').value=atual;\n  }\n  function normalizeDono(s){ return String(s||'').trim().toLowerCase(); }\n\n  function carregarOpcoes(cb){\n    google.script.run.withSuccessHandler(function(res){\n      if(res&&res.status==='sucesso'){\n        _fontes=res.dados.fontes; _fontesMap={}; _fontes.forEach(function(f){_fontesMap[f.nome]=f;});\n        filtrarFontesPorDono();\n        document.getElementById('n-fonte').innerHTML='<option value=\"\">— selecione —</option>'+_fontes.map(function(f){return '<option>'+esc(f.nome)+'</option>';}).join('');\n      }\n      if(cb) cb();\n    }).obterOpcoesFaturamento();\n  }\n\n  /* ---- NFs ---- */\n  window.carregarNFs = function(){\n    var todos=document.getElementById('ff-todos').checked;\n    var filtros={ competencia: todos?'':document.getElementById('ff-comp').value, dono:document.getElementById('ff-dono').value, fonte:document.getElementById('ff-fonte').value };\n    document.getElementById('body-nf').innerHTML='<tr><td colspan=\"13\"><div class=\"loader\"></div></td></tr>';\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso'){ document.getElementById('body-nf').innerHTML='<tr><td colspan=\"13\"><div class=\"alerta alerta-erro\">'+((res&&res.mensagem)||'Erro')+'</div></td></tr>'; return; }\n      _nfs=res.dados.itens; renderNFs();\n      var t=res.dados.totais;\n      document.getElementById('nf-resumo').innerHTML=res.dados.qtd+' NF(s) · Bruto <strong class=\"mono\">'+fmt(t.bruto)+'</strong> · Recebido <strong class=\"mono\">'+fmt(t.a_receber)+'</strong> · A Recolher <strong class=\"mono\">'+fmt(t.a_recolher)+'</strong> · Provisionar <strong class=\"mono\">'+fmt(t.provisionar)+'</strong> · Líquido <strong class=\"mono\">'+fmt(t.liquido)+'</strong>';\n    }).listarFaturamento(filtros);\n  };\n\n  function renderNFs(){\n    var body=document.getElementById('body-nf');\n    if(!_nfs.length){ body.innerHTML='<tr><td colspan=\"13\"><div class=\"alerta alerta-info\">Nenhum lançamento neste mês. Use as setas para navegar ou clique em \"Lançar faturamento\".</div></td></tr>'; atualizarSetasSort(); return; }\n    var lista=_nfs.slice().sort(function(a,b){\n      var va=a[_sortField], vb=b[_sortField];\n      if(NUMERICOS[_sortField]){ va=Number(va)||0; vb=Number(vb)||0; return (va-vb)*_sortDir; }\n      va=String(va||''); vb=String(vb||''); return va.localeCompare(vb)*_sortDir;\n    });\n    body.innerHTML=lista.map(function(n){\n      var pj=String(n.regime).toUpperCase()==='PJ';\n      var reg = pj ? '' : ' <span class=\"badge neutral\">'+esc(n.regime)+'</span>';\n      var tax=function(v){ return pj ? fmt(v) : '—'; };\n      return '<tr>'+\n        '<td class=\"mono\" data-label=\"Emissão\">'+esc(n.emissao||n.competencia)+'</td><td class=\"veh\" data-full>'+esc(n.fonte)+reg+'</td><td data-label=\"Dono\">'+esc(n.dono)+'</td><td class=\"mono\" data-label=\"NF\">'+esc(n.nf)+'</td>'+\n        '<td class=\"num\" data-label=\"Bruto\">'+fmt(n.valor_bruto)+'</td><td class=\"num\" data-label=\"ISS\">'+tax(n.iss)+'</td><td class=\"num\" data-label=\"Federais\">'+tax(n.federais)+'</td>'+\n        '<td class=\"num\" data-label=\"Retenções\">'+tax(n.retido)+'</td><td class=\"num\" data-label=\"A Recolher\">'+tax(n.a_recolher)+'</td><td class=\"num\" data-label=\"Provisionar\">'+tax(n.provisionar)+'</td>'+\n        '<td class=\"num\" data-label=\"Recebido\">'+fmt(n.a_receber)+'</td><td class=\"num\" data-label=\"Líquido\">'+fmt(n.liquido)+'</td>'+\n        '<td class=\"text-center\" style=\"white-space:nowrap\">'+\n          '<button class=\"btn ghost sm\" onclick=\"abrirVer(\\''+n.id+'\\')\" title=\"Ver\"><i class=\"fas fa-eye\"></i></button> '+\n          '<button class=\"btn ghost sm\" onclick=\"abrirModalNF(\\''+n.id+'\\')\" title=\"Editar\"><i class=\"fas fa-pen\"></i></button> '+\n          '<button class=\"btn ghost sm\" onclick=\"pedirDel(\\'nf\\',\\''+n.id+'\\')\" title=\"Excluir\"><i class=\"fas fa-trash\"></i></button>'+\n        '</td></tr>';\n    }).join('');\n    atualizarSetasSort();\n  }\n\n  window.ordenar = function(campo){ if(_sortField===campo) _sortDir=-_sortDir; else { _sortField=campo; _sortDir=1; } renderNFs(); };\n  function atualizarSetasSort(){\n    document.querySelectorAll('#nf-head th[data-sort]').forEach(function(th){\n      var c=th.getAttribute('data-sort'); var base=th.getAttribute('data-label')||th.textContent.replace(/[▲▼]/g,'').trim();\n      th.setAttribute('data-label', base);\n      th.innerHTML = base + (c===_sortField ? (_sortDir>0?' ▲':' ▼') : '');\n      th.style.cursor='pointer';\n    });\n  }\n\n  /* ---- Ver (detalhe) ---- */\n  window.abrirVer = function(id){\n    var n=_nfs.filter(function(x){return String(x.id)===String(id);})[0]; if(!n) return;\n    var pj=String(n.regime).toUpperCase()==='PJ';\n    function row(l,v,opt){ opt=opt||{}; return '<div class=\"flex-between\" style=\"padding:6px 0;border-bottom:1px solid var(--line)\"><span class=\"text-sec\"'+(opt.sub?' style=\"padding-left:16px\"':'')+'>'+(opt.sub?'↳ ':'')+l+'</span><strong class=\"mono\"'+(opt.cor?' style=\"color:'+opt.cor+'\"':'')+'>'+v+'</strong></div>'; }\n    function mini(l,v,cor){ return '<div style=\"flex:1;text-align:center;padding:12px 8px;background:#fff;border:1px solid var(--line);border-radius:10px\"><div class=\"serif\" style=\"font-size:1.35em;line-height:1;color:'+(cor||'var(--ink-900)')+'\">'+v+'</div><div class=\"kpi-label\" style=\"margin-top:5px\">'+l+'</div></div>'; }\n    function chip(l,v){ return '<div style=\"text-align:center\"><div class=\"kpi-label\">'+l+'</div><div class=\"mono\" style=\"font-weight:700;margin-top:2px\">'+(v||'—')+'</div></div>'; }\n\n    var h = '<div class=\"flex-between mb-16\"><div><div class=\"serif\" style=\"font-size:1.4em\">'+esc(n.fonte)+'</div><div class=\"text-sec\">'+esc(n.dono)+' · NF '+esc(n.nf||'—')+'</div></div><span class=\"badge '+(pj?'low':'neutral')+'\">'+esc(n.regime)+'</span></div>';\n    h += '<div class=\"flex gap-8 mb-16\">'+mini('Bruto', fmt(n.valor_bruto))+mini('Recebido', fmt(n.a_receber), 'var(--il-blue)')+mini('Líquido', fmt(n.liquido), 'var(--risk-low)')+'</div>';\n    h += '<div class=\"card card-pad mb-16\" style=\"background:var(--blue-50);border:none\"><div style=\"display:flex;justify-content:space-around;align-items:center;gap:8px;flex-wrap:wrap\">'+\n      chip('Competência', esc(n.competencia))+'<i class=\"fas fa-arrow-right text-sec\" style=\"font-size:.8em\"></i>'+\n      chip('Emissão', esc(n.emissao))+'<i class=\"fas fa-arrow-right text-sec\" style=\"font-size:.8em\"></i>'+\n      chip('Pagamento', esc(n.mes_pagamento)+(n.dia_pagamento?' · dia '+esc(n.dia_pagamento):''))+'</div></div>';\n    if(pj){\n      h += '<div class=\"card card-pad\" style=\"background:var(--blue-50);border:none\">'+\n        '<div class=\"kpi-label mb-16\" style=\"color:var(--il-blue)\">Tributos</div>'+\n        row('ISS', fmt(n.iss))+row('Impostos Federais', fmt(n.federais))+\n        row('PIS/COFINS (mensal)', fmt(n.pis_cofins), {sub:true})+row('IRPJ/CSLL (trimestral)', fmt(n.irpj_csll), {sub:true})+\n        row('Retenções', fmt(n.retido))+\n        row('A Recolher', fmt(n.a_recolher), {cor:'var(--risk-mid)'})+row('Provisionar', fmt(n.provisionar))+'</div>';\n    }\n    if(n.obs) h += '<div class=\"mt-16 text-sec\"><i class=\"fas fa-note-sticky\"></i> '+esc(n.obs)+'</div>';\n    document.getElementById('ver-body').innerHTML=h;\n    document.getElementById('ver-editar').onclick=function(){ fecharModal('modal-ver'); abrirModalNF(id); };\n    abrir('modal-ver');\n  };\n\n  /* ---- Modal criar/editar ---- */\n  window.onFonteChange = function(){\n    var f=_fontesMap[document.getElementById('n-fonte').value];\n    document.getElementById('n-dono').value = f? f.dono : '';\n    document.getElementById('n-regime').value = f? f.regime : '';\n    var pj = isPJ(f);\n    document.getElementById('bloco-pj').style.display = pj?'block':'none';\n    document.getElementById('lbl-bruto').innerHTML = pj ? 'Valor bruto (R$) <span class=\"req\">*</span>' : 'Valor recebido (R$) <span class=\"req\">*</span>';\n    prefillPagamento();\n    calcPreview();\n  };\n\n  // Preenche emissão/pagamento pela agenda da fonte:\n  //   emissão = competência + emissao_offset · pagamento = emissão + pagamento_offset\n  window.prefillPagamento = function(){\n    var f=_fontesMap[document.getElementById('n-fonte').value];\n    var comp=document.getElementById('n-comp').value;\n    if(!f) return;\n    if(comp){\n      var emissao=shiftMes(comp, Number(f.emissao_offset||0));\n      document.getElementById('n-emissao').value=emissao;\n      document.getElementById('n-mespag').value=shiftMes(emissao, Number(f.pagamento_offset||0));\n    }\n    document.getElementById('n-diapag').value = (f.dia_pagamento===''||f.dia_pagamento==null)?'':f.dia_pagamento;\n  };\n\n  // Se o usuário editar a emissão à mão, recalcula o mês de pagamento\n  window.onEmissaoChange = function(){\n    var f=_fontesMap[document.getElementById('n-fonte').value];\n    var em=document.getElementById('n-emissao').value;\n    if(f&&em) document.getElementById('n-mespag').value=shiftMes(em, Number(f.pagamento_offset||0));\n  };\n\n  window.calcPreview = function(){\n    var f=_fontesMap[document.getElementById('n-fonte').value];\n    if(!isPJ(f)) return;\n    var bruto=num(document.getElementById('n-bruto').value);\n    var iss=r2(bruto*f.aliquota_iss);\n    var fed=r2(bruto*f.aliquota_federais);\n    var pc=r2(bruto*f.aliquota_pis_cofins), irpj=r2(fed-pc);\n    var retido=f.retem_fonte?r2(bruto*f.aliquota_retencao):0;\n    var aRecolher=r2(iss+fed-retido), prov=r2(aRecolher-iss), aReceber=r2(bruto-retido), liq=r2(bruto-(iss+fed));\n    document.getElementById('pv-iss').textContent=fmt(iss);\n    document.getElementById('pv-federais').textContent=fmt(fed);\n    document.getElementById('pv-retido').textContent=fmt(retido);\n    document.getElementById('pv-pc').textContent=fmt(pc);\n    document.getElementById('pv-irpj').textContent=fmt(irpj);\n    document.getElementById('pv-receber').textContent=fmt(aReceber);\n    document.getElementById('pv-recolher').textContent=fmt(aRecolher);\n    document.getElementById('pv-prov').textContent=fmt(prov);\n    document.getElementById('pv-liquido').textContent=fmt(liq);\n  };\n\n  window.abrirModalNF = function(id){\n    document.getElementById('n-id').value=id||'';\n    document.getElementById('modal-nf-titulo').textContent=id?'Editar faturamento':'Lançar faturamento';\n    var n=id?_nfs.filter(function(x){return String(x.id)===String(id);})[0]:null;\n    document.getElementById('n-comp').value=n?n.competencia:(document.getElementById('ff-comp').value||mesAtual());\n    document.getElementById('n-fonte').value=n?n.fonte:'';\n    document.getElementById('n-nf').value=n?n.nf:'';\n    document.getElementById('n-bruto').value=n?String(n.valor_bruto).replace('.',','):'';\n    document.getElementById('n-obs').value=n?n.obs:'';\n    onFonteChange();\n    if(n){ document.getElementById('n-emissao').value=n.emissao||''; document.getElementById('n-mespag').value=n.mes_pagamento||''; document.getElementById('n-diapag').value=(n.dia_pagamento===''||n.dia_pagamento==null)?'':n.dia_pagamento; }\n    abrir('modal-nf');\n  };\n\n  window.salvarNF = function(){\n    var dados={ competencia:document.getElementById('n-comp').value, fonte:document.getElementById('n-fonte').value,\n      nf:document.getElementById('n-nf').value, valor_bruto:document.getElementById('n-bruto').value,\n      emissao:document.getElementById('n-emissao').value, mes_pagamento:document.getElementById('n-mespag').value,\n      dia_pagamento:document.getElementById('n-diapag').value, obs:document.getElementById('n-obs').value };\n    if(!dados.fonte){ mostrarToast('Selecione a fonte.','aviso'); return; }\n    if(!dados.competencia){ mostrarToast('Informe a competência.','aviso'); return; }\n    var id=document.getElementById('n-id').value;\n    var btn=document.getElementById('btn-salvar-nf'); btn.disabled=true; btn.innerHTML='<span class=\"spinner-sm\"></span> Salvando…';\n    var ok=function(res){ btn.disabled=false; btn.textContent='Salvar'; if(res&&res.status==='sucesso'){ mostrarToast(res.mensagem,'sucesso'); fecharModal('modal-nf'); document.getElementById('ff-todos').checked=false; if(dados.competencia) document.getElementById('ff-comp').value=dados.competencia; carregarOpcoes(carregarNFs); } else mostrarToast((res&&res.mensagem)||'Erro','erro'); };\n    var fail=function(e){ btn.disabled=false; btn.textContent='Salvar'; mostrarToast('Erro: '+(e.message||e),'erro'); };\n    if(id) google.script.run.withSuccessHandler(ok).withFailureHandler(fail).atualizarFaturamento(id,dados);\n    else   google.script.run.withSuccessHandler(ok).withFailureHandler(fail).criarFaturamento(dados);\n  };\n\n  /* ---- Consolidado ---- */\n  function carregarConsolidado(){\n    document.getElementById('body-cons').innerHTML='<tr><td colspan=\"10\"><div class=\"loader\"></div></td></tr>';\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso'){ document.getElementById('body-cons').innerHTML='<tr><td colspan=\"10\"><div class=\"alerta alerta-erro\">'+((res&&res.mensagem)||'Erro')+'</div></td></tr>'; return; }\n      var L=res.dados.linhas;\n      if(!L.length){ document.getElementById('body-cons').innerHTML='<tr><td colspan=\"10\"><div class=\"alerta alerta-info\">Sem faturamento lançado ainda.</div></td></tr>'; return; }\n      document.getElementById('body-cons').innerHTML=L.map(function(m){\n        function c(o){ return '<td class=\"num\" style=\"border-left:1px solid var(--line)\">'+fmt(o.receita)+'</td><td class=\"num\">'+fmt(o.impostos)+'</td><td class=\"num\">'+fmt(o.liquido)+'</td>'; }\n        return '<tr><td class=\"mono\">'+esc(m.competencia)+'</td>'+c(m.Tuto)+c(m.Francesca)+c(m.total)+'</tr>';\n      }).join('');\n    }).obterConsolidado({});\n  }\n\n  /* ---- Fontes ---- */\n  function carregarFontes(){\n    document.getElementById('body-fontes').innerHTML='<tr><td colspan=\"7\"><div class=\"loader\"></div></td></tr>';\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso') return;\n      _fontes=res.dados.fontes; _fontesMap={}; _fontes.forEach(function(f){_fontesMap[f.nome]=f;});\n      document.getElementById('body-fontes').innerHTML=_fontes.map(function(f){\n        var pj=isPJ(f);\n        var reg=pj?'<span class=\"badge low\">PJ</span>':'<span class=\"badge neutral\">'+esc(f.regime)+'</span>';\n        var ret=pj?(f.retem_fonte?'<span class=\"badge low\">Sim</span>':'<span class=\"badge\">Não</span>'):'—';\n        return '<tr><td class=\"veh\">'+esc(f.nome)+'</td><td>'+esc(f.dono)+'</td><td>'+reg+'</td><td>'+ret+'</td>'+\n          '<td class=\"num\">'+(pj?pct(f.aliquota_iss):'—')+'</td><td class=\"num\">'+(pj?pct(f.aliquota_federais):'—')+'</td>'+\n          '<td class=\"text-center\" style=\"white-space:nowrap\"><button class=\"btn ghost sm\" onclick=\"abrirModalFonte(\\''+esc(f.nome)+'\\')\"><i class=\"fas fa-pen\"></i></button> <button class=\"btn ghost sm\" onclick=\"pedirDel(\\'fonte\\',\\''+esc(f.nome)+'\\')\"><i class=\"fas fa-trash\"></i></button></td></tr>';\n      }).join('');\n    }).listarFontes();\n  }\n\n  window.onRegimeFonte = function(){\n    var pj=document.getElementById('fo-regime').value==='PJ';\n    document.getElementById('fo-bloco-pj').style.display=pj?'block':'none';\n    document.getElementById('fo-nota-pj').style.display=pj?'none':'block';\n  };\n\n  window.abrirModalFonte = function(nome){\n    var f=nome?_fontesMap[nome]:null;\n    document.getElementById('modal-fonte-titulo').textContent=nome?'Editar fonte':'Nova fonte';\n    document.getElementById('fo-original').value=nome||'';\n    document.getElementById('fo-nome').value=f?f.nome:'';\n    document.getElementById('fo-dono').value=f?f.dono:'Tuto';\n    document.getElementById('fo-regime').value=f?f.regime:'PJ';\n    document.getElementById('fo-retem').value=f&&f.retem_fonte?'true':'false';\n    document.getElementById('fo-iss').value=f?String(f.aliquota_iss).replace('.',','):'0,02';\n    document.getElementById('fo-fed').value=f?String(f.aliquota_federais).replace('.',','):'0,1133';\n    document.getElementById('fo-ret').value=f?String(f.aliquota_retencao).replace('.',','):'0,0615';\n    document.getElementById('fo-pc').value=f?String(f.aliquota_pis_cofins).replace('.',','):'0,0365';\n    document.getElementById('fo-diapag').value=f&&f.dia_pagamento!==''?f.dia_pagamento:'';\n    document.getElementById('fo-emiss-off').value=f?(f.emissao_offset==null?0:f.emissao_offset):0;\n    document.getElementById('fo-pag-off').value=f?(f.pagamento_offset==null?0:f.pagamento_offset):0;\n    onRegimeFonte();\n    abrir('modal-fonte');\n  };\n\n  window.salvarFonteUI = function(){\n    var dados={ nome:document.getElementById('fo-nome').value, nomeOriginal:document.getElementById('fo-original').value,\n      dono:document.getElementById('fo-dono').value, regime:document.getElementById('fo-regime').value,\n      retem_fonte:document.getElementById('fo-retem').value==='true',\n      aliquota_iss:num(document.getElementById('fo-iss').value), aliquota_federais:num(document.getElementById('fo-fed').value),\n      aliquota_retencao:num(document.getElementById('fo-ret').value), aliquota_pis_cofins:num(document.getElementById('fo-pc').value),\n      dia_pagamento:document.getElementById('fo-diapag').value, emissao_offset:document.getElementById('fo-emiss-off').value,\n      pagamento_offset:document.getElementById('fo-pag-off').value };\n    if(!dados.nome.trim()){ mostrarToast('Informe o nome.','aviso'); return; }\n    var btn=document.getElementById('btn-salvar-fonte'); btn.disabled=true; btn.innerHTML='<span class=\"spinner-sm\"></span>';\n    google.script.run.withSuccessHandler(function(res){ btn.disabled=false; btn.textContent='Salvar'; if(res&&res.status==='sucesso'){ mostrarToast(res.mensagem,'sucesso'); fecharModal('modal-fonte'); carregarFontes(); carregarOpcoes(); } else mostrarToast((res&&res.mensagem)||'Erro','erro'); })\n      .withFailureHandler(function(e){ btn.disabled=false; btn.textContent='Salvar'; mostrarToast('Erro: '+(e.message||e),'erro'); }).salvarFonte(dados);\n  };\n\n  /* ---- Exclusão ---- */\n  window.pedirDel = function(tipo,id){ _del={tipo:tipo,id:id}; document.getElementById('del-msg').innerHTML='Remover '+(tipo==='nf'?'este faturamento':'a fonte <strong>'+esc(id)+'</strong>')+'?'; abrir('modal-del'); };\n  window.confirmarDel = function(){\n    if(!_del) return;\n    var btn=document.getElementById('btn-del'); btn.disabled=true; btn.innerHTML='<span class=\"spinner-sm\"></span>';\n    var done=function(res){ btn.disabled=false; btn.textContent='Excluir'; if(res&&res.status==='sucesso'){ mostrarToast(res.mensagem,'sucesso'); fecharModal('modal-del'); if(_del.tipo==='nf') carregarNFs(); else { carregarFontes(); carregarOpcoes(); } } else mostrarToast((res&&res.mensagem)||'Erro','erro'); };\n    var fail=function(e){ btn.disabled=false; btn.textContent='Excluir'; mostrarToast('Erro: '+(e.message||e),'erro'); };\n    if(_del.tipo==='nf') google.script.run.withSuccessHandler(done).withFailureHandler(fail).excluirFaturamento(_del.id);\n    else google.script.run.withSuccessHandler(done).withFailureHandler(fail).excluirFonte(_del.id);\n  };\n\n  // boot: cabeçalhos clicáveis p/ ordenar + filtro no mês atual\n  document.querySelectorAll('#nf-head th[data-sort]').forEach(function(th){ th.onclick=function(){ ordenar(th.getAttribute('data-sort')); }; });\n  document.getElementById('ff-comp').value = mesAtual();\n  carregarOpcoes(carregarNFs);\n})();\n<\/script>\n","Caixa":"<!-- Caixa.html — Fluxo de caixa: tabela mensal + modal por dono/holding (por fonte). -->\n<div class=\"fade-in\">\n  <div class=\"section-head\"><h2>Fluxo de Caixa</h2></div>\n\n  <div class=\"tabs\">\n    <div class=\"tab ativa\" data-tab=\"fluxo\" onclick=\"trocarTab('fluxo')\"><i class=\"fas fa-hand-holding-dollar\"></i> Fluxo</div>\n    <div class=\"tab\" data-tab=\"ajustes\" onclick=\"trocarTab('ajustes')\"><i class=\"fas fa-sliders-h\"></i> Valores adicionais</div>\n    <div class=\"tab\" data-tab=\"real\" onclick=\"trocarTab('real')\"><i class=\"fas fa-building-columns\"></i> Fluxo real</div>\n  </div>\n\n  <!-- ===== FLUXO ===== -->\n  <div class=\"tab-content ativa\" id=\"tab-fluxo\">\n    <div class=\"flex-between mb-16\">\n      <span class=\"text-sec\" style=\"font-size:.85em\"><strong>A Pagar</strong> = tributos a quitar no mês (o que precisa ter em conta). Clique em <i class=\"fas fa-eye\"></i> para o fluxo detalhado por fonte.</span>\n      <button class=\"btn ghost sm\" id=\"btn-futuros\" onclick=\"toggleFuturos()\"><i class=\"fas fa-forward\"></i> Incluir valores futuros</button>\n    </div>\n    <div class=\"card\"><div style=\"overflow-x:auto\">\n      <table class=\"tracker cardify\">\n        <thead>\n          <tr>\n            <th rowspan=\"2\" style=\"vertical-align:bottom\">Mês</th>\n            <th colspan=\"2\" class=\"text-center\" style=\"border-left:1px solid var(--line)\">Tuto</th>\n            <th colspan=\"2\" class=\"text-center\" style=\"border-left:1px solid var(--line)\">Francesca</th>\n            <th colspan=\"4\" class=\"text-center\" style=\"border-left:1px solid var(--line)\">Holding</th>\n          </tr>\n          <tr>\n            <th class=\"num\" style=\"border-left:1px solid var(--line)\">Transferir</th><th class=\"text-center\">Ver</th>\n            <th class=\"num\" style=\"border-left:1px solid var(--line)\">Transferir</th><th class=\"text-center\">Ver</th>\n            <th class=\"num\" style=\"border-left:1px solid var(--line)\">A Pagar (mês)</th><th class=\"num\">A Transferir</th><th class=\"num\">Fica em conta</th><th class=\"text-center\">Ver</th>\n          </tr>\n        </thead>\n        <tbody id=\"body-caixa\"><tr><td colspan=\"9\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div></div>\n  </div>\n\n  <!-- ===== VALORES ADICIONAIS ===== -->\n  <div class=\"tab-content\" id=\"tab-ajustes\">\n    <div class=\"flex-between mb-16\">\n      <div class=\"text-sec\">Contador, Reserva, tributos negociados, adiantamentos... Deduz (ou soma) do A Transferir. Valor fixo ou %.</div>\n      <button class=\"btn sm\" onclick=\"abrirModalAjuste(null)\"><i class=\"fas fa-plus\"></i> Novo ajuste</button>\n    </div>\n    <div class=\"card\"><div style=\"overflow-x:auto\">\n      <table class=\"tracker\" id=\"tbl-ajustes\">\n        <thead><tr><th>Descrição</th><th>Categoria</th><th>Dono</th><th>Fonte</th><th>Valor</th><th>Efeito</th><th>Recorrência</th><th>Ativo</th><th class=\"text-center\">Ações</th></tr></thead>\n        <tbody id=\"body-ajustes\"><tr><td colspan=\"9\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div></div>\n  </div>\n\n  <!-- ===== FLUXO REAL ===== -->\n  <div class=\"tab-content\" id=\"tab-real\">\n    <div class=\"flex-between mb-16\" style=\"flex-wrap:wrap;gap:10px\">\n      <span class=\"text-sec\" style=\"font-size:.85em\">Importe o extrato mensal do banco (PDF) e compare o realizado com o projetado.</span>\n      <button class=\"btn sm\" onclick=\"abrirModalImport()\"><i class=\"fas fa-file-import\"></i> Importar extrato</button>\n    </div>\n    <div id=\"ext-vis\"></div>\n  </div>\n</div>\n\n<!-- Modal importar extrato -->\n<div class=\"modal-backdrop\" id=\"modal-import\"><div class=\"modal\">\n  <div class=\"modal-header\"><h3>Importar extrato mensal</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-import')\">&times;</button></div>\n  <div class=\"modal-body\">\n    <div class=\"text-sec\" style=\"font-size:.85em;margin-bottom:12px\">PDF do extrato mensal (Itaú PJ). O arquivo é lido aqui no seu navegador; só o texto das linhas vai para o sistema. Analise antes de confirmar — reimportar um mês <strong>substitui</strong> o anterior.</div>\n    <div class=\"dz-zone\" id=\"ext-dz\" onclick=\"document.getElementById('ext-file').click()\">\n      <i class=\"fas fa-file-pdf\"></i>\n      <div><strong>Toque para escolher o PDF</strong> ou arraste o arquivo aqui</div>\n      <div class=\"text-sec\" id=\"ext-arquivo\" style=\"margin-top:6px;font-size:.85em\">nenhum arquivo selecionado</div>\n    </div>\n    <input type=\"file\" id=\"ext-file\" accept=\"application/pdf\" style=\"display:none\" onchange=\"extArquivoSelecionado(this.files)\">\n    <div class=\"text-sec\" style=\"font-size:.8em;margin-top:10px\" id=\"ext-status\"></div>\n    <div id=\"ext-previa\" style=\"margin-top:14px\"></div>\n  </div>\n  <div class=\"modal-footer\">\n    <button class=\"btn ghost\" onclick=\"fecharModal('modal-import')\">Fechar</button>\n    <button class=\"btn ghost\" id=\"ext-btn-analisar\" onclick=\"extAnalisar()\" disabled><i class=\"fas fa-magnifying-glass\"></i> Analisar</button>\n    <button class=\"btn\" id=\"ext-btn-importar\" onclick=\"extImportar()\" disabled><i class=\"fas fa-file-import\"></i> Importar mês</button>\n  </div>\n</div></div>\n\n<!-- Modal fluxo detalhado (por fonte) -->\n<div class=\"modal-backdrop\" id=\"modal-fx\"><div class=\"modal modal-lg\">\n  <div class=\"modal-header\"><h3 id=\"fx-titulo\">Fluxo do mês</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-fx')\">&times;</button></div>\n  <div class=\"modal-body\" id=\"fx-body\"></div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-fx')\">Fechar</button></div>\n</div></div>\n\n<!-- Modal ajuste -->\n<div class=\"modal-backdrop\" id=\"modal-ajuste\"><div class=\"modal\">\n  <div class=\"modal-header\"><h3 id=\"aj-titulo\">Novo ajuste</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-ajuste')\">&times;</button></div>\n  <div class=\"modal-body\">\n    <input type=\"hidden\" id=\"aj-id\">\n    <div class=\"form-grid-2\">\n      <div class=\"form-group\"><label>Descrição <span class=\"req\">*</span></label><input class=\"form-control\" id=\"aj-desc\" placeholder=\"ex: Contador, Reserva, CREMESP\"></div>\n      <div class=\"form-group\"><label>Categoria</label><select class=\"form-control\" id=\"aj-categoria\"></select></div>\n    </div>\n    <div class=\"form-grid-2\">\n      <div class=\"form-group\"><label>Dono <span class=\"req\">*</span></label><select class=\"form-control\" id=\"aj-dono\" onchange=\"onDonoAjuste()\"><option>Tuto</option><option>Francesca</option></select></div>\n      <div class=\"form-group\"><label>Fonte</label><select class=\"form-control\" id=\"aj-fonte\"><option value=\"\">— (geral) —</option></select></div>\n    </div>\n    <div class=\"form-grid\">\n      <div class=\"form-group\"><label>Tipo</label><select class=\"form-control\" id=\"aj-tipo\" onchange=\"onTipoAjuste()\"><option value=\"valor\">Valor fixo (R$)</option><option value=\"percentual\">Percentual (%)</option></select></div>\n      <div class=\"form-group\"><label id=\"aj-lbl-valor\">Valor (R$)</label><input class=\"form-control\" id=\"aj-valor\" inputmode=\"decimal\" placeholder=\"0,00\"></div>\n      <div class=\"form-group\" id=\"aj-grp-base\"><label>Base do %</label><select class=\"form-control\" id=\"aj-base\"><option value=\"transferir\">A Transferir</option><option value=\"faturado\">Faturado</option></select></div>\n    </div>\n    <div class=\"form-grid\">\n      <div class=\"form-group\"><label>Efeito</label><select class=\"form-control\" id=\"aj-sinal\"><option value=\"saida\">Deduz (saída)</option><option value=\"entrada\">Soma (entrada)</option></select></div>\n      <div class=\"form-group\"><label>Recorrência</label><select class=\"form-control\" id=\"aj-rec\" onchange=\"onRecAjuste()\"><option value=\"mensal\">Mensal</option><option value=\"unica\">Única</option></select></div>\n      <div class=\"form-group\"><label id=\"aj-lbl-comp\">A partir de (opcional)</label><input type=\"month\" class=\"form-control\" id=\"aj-comp\"></div>\n    </div>\n    <div class=\"form-group\" id=\"aj-grp-meses\"><label>Período de recorrência <span class=\"text-sec\">(nº de meses; vazio = indefinido)</span></label><input class=\"form-control\" id=\"aj-meses\" inputmode=\"numeric\" placeholder=\"ex: 12\"></div>\n    <div class=\"form-group\"><label>Observações</label><input class=\"form-control\" id=\"aj-obs\"></div>\n    <label class=\"text-sec\" style=\"font-size:.85em\"><input type=\"checkbox\" id=\"aj-ativo\" checked> ativo</label>\n  </div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-ajuste')\">Cancelar</button><button class=\"btn\" id=\"btn-salvar-aj\" onclick=\"salvarAjusteUI()\">Salvar</button></div>\n</div></div>\n\n<!-- Modal excluir -->\n<div class=\"modal-backdrop\" id=\"modal-del\"><div class=\"modal modal-sm\">\n  <div class=\"modal-header danger\"><h3>Excluir</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-del')\">&times;</button></div>\n  <div class=\"modal-body\"><p id=\"del-msg\"></p></div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-del')\">Cancelar</button><button class=\"btn danger\" id=\"btn-del\" onclick=\"confirmarDel()\">Excluir</button></div>\n</div></div>\n\n<script>\n(function() {\n  var _linhas = [], _incluirFuturos = false, _ajustes = [], _delId = null, _ajFontes = [], _ajCategorias = [];\n\n  window.fecharModal = function(id){ document.getElementById(id).classList.remove('aberta'); };\n  function abrir(id){ document.getElementById(id).classList.add('aberta'); }\n  function fmt(n){ return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }\n  function esc(s){ return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c];}); }\n  function num(v){ if(v==null||v==='') return 0; v=String(v).replace(/[^\\d.,-]/g,''); if(v.indexOf(',')!==-1) v=v.replace(/\\./g,'').replace(',','.'); return parseFloat(v)||0; }\n  function cls(v){ return Number(v)<0 ? 'style=\"color:var(--risk-high)\"' : ''; }\n\n  window.trocarTab = function(t){\n    document.querySelectorAll('.tab[data-tab]').forEach(function(el){ el.classList.toggle('ativa', el.getAttribute('data-tab')===t); });\n    ['fluxo','ajustes','real'].forEach(function(x){ document.getElementById('tab-'+x).classList.toggle('ativa', x===t); });\n    if(t==='ajustes') carregarAjustes();\n    if(t==='real') carregarFluxoReal();\n  };\n\n  /* ---------- FLUXO (tabela) ---------- */\n  window.toggleFuturos = function(){\n    _incluirFuturos=!_incluirFuturos;\n    var b=document.getElementById('btn-futuros');\n    b.innerHTML = _incluirFuturos ? '<i class=\"fas fa-backward\"></i> Ocultar valores futuros' : '<i class=\"fas fa-forward\"></i> Incluir valores futuros';\n    carregarFluxo();\n  };\n\n  function carregarFluxo(){\n    document.getElementById('body-caixa').innerHTML='<tr><td colspan=\"9\"><div class=\"loader\"></div></td></tr>';\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso'){ document.getElementById('body-caixa').innerHTML='<tr><td colspan=\"9\"><div class=\"alerta alerta-erro\">'+((res&&res.mensagem)||'Erro')+'</div></td></tr>'; return; }\n      _linhas=(res.dados.linhas||[]).slice().reverse();   // mais recente primeiro\n      if(!_linhas.length){ document.getElementById('body-caixa').innerHTML='<tr><td colspan=\"9\"><div class=\"alerta alerta-info\">Sem movimentação no período.</div></td></tr>'; return; }\n      document.getElementById('body-caixa').innerHTML=_linhas.map(function(m,i){\n        var mesCel=esc(m.mes)+(m.futuro?' <span class=\"badge neutral\">futuro</span>':'');\n        function olho(quem){ var lbl=(quem==='total')?'Ver Holding':'Ver '+quem; return '<td class=\"text-center\" data-label=\"'+lbl+'\"><button class=\"btn ghost sm\" onclick=\"verFluxo('+i+',\\''+quem+'\\')\"><i class=\"fas fa-eye\"></i></button></td>'; }\n        return '<tr'+(m.futuro?' style=\"opacity:.72\"':'')+'>'+\n          '<td class=\"mono\" data-full>'+mesCel+'</td>'+\n          '<td class=\"num\" data-label=\"Tuto · Transferir\" style=\"border-left:1px solid var(--line)\" '+cls(m.Tuto.a_transferir)+'>'+fmt(m.Tuto.a_transferir)+'</td>'+olho('Tuto')+\n          '<td class=\"num\" data-label=\"Francesca · Transferir\" style=\"border-left:1px solid var(--line)\" '+cls(m.Francesca.a_transferir)+'>'+fmt(m.Francesca.a_transferir)+'</td>'+olho('Francesca')+\n          '<td class=\"num\" data-label=\"A Pagar (mês)\" style=\"border-left:1px solid var(--line);color:var(--risk-mid)\"><strong>'+fmt(m.total.pagar)+'</strong></td>'+\n          '<td class=\"num\" data-label=\"A Transferir\" '+cls(m.total.a_transferir)+'><strong>'+fmt(m.total.a_transferir)+'</strong></td>'+\n          '<td class=\"num\" data-label=\"Fica em conta\" '+cls(m.total.fechamento)+'>'+fmt(m.total.fechamento)+'</td>'+olho('total')+\n        '</tr>';\n      }).join('');\n    }).withFailureHandler(function(err){\n      document.getElementById('body-caixa').innerHTML='<tr><td colspan=\"9\"><div class=\"alerta alerta-erro\">Erro: '+(err&&err.message?err.message:err)+'</div></td></tr>';\n    }).obterFluxoCaixa({ incluirFuturos:_incluirFuturos });\n  }\n\n  /* ---------- modal fluxo detalhado por fonte ---------- */\n  window.verFluxo = function(i, quem){\n    var m=_linhas[i]; if(!m) return;\n    var p=m[quem]; var holding=(quem==='total');\n    var nome=holding?'Holding':quem;\n    document.getElementById('fx-titulo').textContent='Fluxo · '+nome+' · '+m.mes;\n\n    function lin(l,v,opt){ opt=opt||{}; var cor=opt.neg&&Number(v)<0?'var(--risk-high)':(opt.cor||''); return '<div class=\"flex-between\" style=\"padding:5px 0;border-bottom:1px solid var(--line)\"><span class=\"text-sec\">'+l+'</span><strong class=\"mono\"'+(cor?' style=\"color:'+cor+'\"':'')+'>'+(opt.txt||fmt(v))+'</strong></div>'; }\n    function subhdr(t){ return '<div style=\"margin:15px 0 6px;font-size:.72em;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-400);font-weight:700\">'+t+'</div>'; }\n\n    // tabela por fonte — Líquido (antes dos adicionais) → Deduções (adicionais da fonte) → A transferir por fonte\n    var fs=p.fontes||[];\n    var tot={bruto:0,retido:0,recebido:0,iss:0,pc:0,prov_trim:0,transferir:0,ded:0,atransf:0};\n    var temNaoTrib=false, temGeral=false;\n    var rows=fs.map(function(f){\n      var pj=(f.tributado!==undefined)?f.tributado:(String(f.regime).toUpperCase()==='PJ');\n      var dedNet=(Number(f.ajuste_saida)||0)-(Number(f.ajuste_entrada)||0);   // + = deduz, − = soma\n      var atrans=(f.transferir_final!=null)?Number(f.transferir_final):((Number(f.transferir)||0)-dedNet);\n      if(pj){ ['bruto','retido','recebido','iss','pc','prov_trim'].forEach(function(k){ tot[k]+=(Number(f[k])||0); });\n        tot.transferir+=(Number(f.transferir)||0); tot.ded+=dedNet; tot.atransf+=atrans; }\n      else temNaoTrib=true;\n      function c(v,ok,lbl){ return '<td class=\"num\" data-label=\"'+lbl+'\">'+(ok!==false?fmt(v):'<span class=\"text-sec\">—</span>')+'</td>'; }\n      var nomeF=(holding?'<span class=\"badge neutral\" style=\"margin-right:5px\">'+esc(f.dono)+'</span>':'')+\n        '<strong>'+esc(f.fonte)+'</strong> <span class=\"text-sec\">(dia '+(f.dia||'?')+(f.emissao?' · emissão '+esc(f.emissao):'')+')</span>'+\n        (pj?'':' <span class=\"badge neutral\">'+esc(f.regime)+'</span>');\n      // Deduções da fonte (com detalhe no hover)\n      var itens=f.ajustes_itens||[];\n      var dedCell;\n      if(pj&&(itens.length||dedNet!==0)){\n        var titulo=itens.map(function(a){return (a.sinal==='entrada'?'+ ':'− ')+a.descricao+': '+fmt(a.valor);}).join(' · ');\n        var sin=dedNet>=0?'− ':'+ ', cor=dedNet>0?'var(--risk-high)':(dedNet<0?'var(--risk-low)':'');\n        dedCell='<td class=\"num\" data-label=\"Deduções\" title=\"'+esc(titulo)+'\"'+(cor?' style=\"color:'+cor+'\"':'')+'>'+sin+fmt(Math.abs(dedNet))+'</td>';\n      } else dedCell='<td class=\"num\" data-label=\"Deduções\"><span class=\"text-sec\">—</span></td>';\n      var liqCell = pj ? '<td class=\"num\" data-label=\"Líquido\">'+fmt(f.transferir)+'</td>' : '<td class=\"num\" data-label=\"Líquido\"><span class=\"text-sec\">—</span></td>';\n      var atransCell = pj ? '<td class=\"num\" data-label=\"A transferir\"><strong>'+fmt(atrans)+'</strong></td>' : '<td class=\"num\" data-label=\"A transferir\"><span class=\"text-sec\">fora*</span></td>';\n      return '<tr'+(pj?'':' style=\"opacity:.6\"')+'><td data-full>'+nomeF+'</td>'+c(f.bruto,true,'Bruto')+c(f.retido,pj,'Retenções')+c(f.recebido,true,'Recebido')+c(f.iss,pj,'ISS')+\n        (pj&&f.pc>0?c(f.pc,true,'PIS/COFINS'):'<td class=\"num\" data-label=\"PIS/COFINS\"><span class=\"text-sec\">—</span></td>')+\n        c(f.prov_trim,pj,'Prov. trim.')+liqCell+dedCell+atransCell+'</tr>';\n    }).join('');\n    // ajustes gerais (sem fonte) — aplicados fora da tabela, no total do dono\n    (p.ajustes_lista||[]).forEach(function(a){ if(!a.fonte) temGeral=true; });\n    var tabela = fs.length ?\n      '<div style=\"overflow-x:auto\"><table class=\"tracker cardify\" style=\"font-size:12px\">'+\n      '<thead><tr><th>Fonte</th><th class=\"num\">Bruto</th><th class=\"num\">Retenções</th><th class=\"num\">Recebido</th><th class=\"num\">ISS</th><th class=\"num\">PIS/COFINS</th><th class=\"num\">Prov. trim.</th><th class=\"num\">Líquido</th><th class=\"num\">Deduções</th><th class=\"num\">A transferir</th></tr></thead>'+\n      '<tbody>'+rows+\n      '<tr class=\"row-total\"><td data-full>Total (tributadas)</td><td class=\"num\" data-label=\"Bruto\">'+fmt(tot.bruto)+'</td><td class=\"num\" data-label=\"Retenções\">'+fmt(tot.retido)+'</td><td class=\"num\" data-label=\"Recebido\">'+fmt(tot.recebido)+'</td><td class=\"num\" data-label=\"ISS\">'+fmt(tot.iss)+'</td><td class=\"num\" data-label=\"PIS/COFINS\">'+fmt(tot.pc)+'</td><td class=\"num\" data-label=\"Prov. trim.\">'+fmt(tot.prov_trim)+'</td><td class=\"num\" data-label=\"Líquido\">'+fmt(tot.transferir)+'</td><td class=\"num\" data-label=\"Deduções\">'+(tot.ded>=0?'− ':'+ ')+fmt(Math.abs(tot.ded))+'</td><td class=\"num\" data-label=\"A transferir\"><strong>'+fmt(tot.atransf)+'</strong></td></tr>'+\n      '</tbody></table></div>'+\n      '<div class=\"text-sec\" style=\"font-size:.78em;margin-top:6px\">ISS, PIS/COFINS e Prov. trimestral ficam em conta (provisão do mês: <strong class=\"mono\">'+fmt(p.provisionar)+'</strong>). <strong>A transferir</strong> por fonte = Líquido − Deduções (valores adicionais daquela fonte) — cada fonte transfere na sua data.'+\n      (temGeral?' Valores adicionais <em>gerais</em> (sem fonte) são aplicados abaixo, no total.':'')+\n      (temNaoTrib?' <br>* Fontes não tributadas (CLT/Lucros) não compõem o A Transferir por enquanto.':'')+'</div>'\n      : '<div class=\"alerta alerta-info\">Sem recebimentos neste mês.</div>';\n\n    var h='<div class=\"flex-between mb-16\"><div><div class=\"kpi-label\">'+nome+' · '+esc(m.mes)+'</div>'+\n      '<div class=\"serif\" style=\"font-size:1.7em;line-height:1;margin-top:3px\">'+fmt(p.a_transferir)+'</div>'+\n      '<div class=\"text-sec\" style=\"font-size:.76em\">a transferir no mês</div></div>'+\n      (holding?'<div class=\"text-right\"><div class=\"kpi-label\">a pagar no mês</div><div class=\"mono\" style=\"font-weight:700;font-size:1.1em;color:var(--risk-mid)\">'+fmt(p.pagar)+'</div><div class=\"text-sec\" style=\"font-size:.72em\">manter em conta</div></div>':'')+\n      '</div>';\n    h+=subhdr('Fluxo por fonte')+tabela;\n\n    // valores adicionais — waterfall: subtotal líquido − deduções (+ entradas) = A Transferir\n    h+=subhdr('A Tr r'); }); });\n    ['dragleave','drop'].forEach(function(ev){ dz.addEventListener(ev,function(e){ e.preventDefault(); dz.classList.remove('dz-over'); }); });\n    dz.addEventListener('drop',function(e){ if(e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files.length) extArquivoSelecionado(e.dataTransfer.files); });\n  })();\n\n  function extLinha(l,v,opt){ opt=opt||{}; return '<div class=\"flex-between\" style=\"padding:5px 0;border-bottom:1px solid var(--line)\"><span class=\"text-sec\">'+l+'</span><strong class=\"mono\"'+(opt.cor?' style=\"color:'+opt.cor+'\"':'')+'>'+(opt.txt!==undefined?opt.txt:fmt(v))+'</strong></div>'; }\n\n  function extRenderPrevia(r){\n    var okEnt=r.totais_impressos&&r.totais_impressos.entradas!=null&&Math.abs(r.entradas-r.totais_impressos.entradas)<=0.05;\n    var okSai=r.totais_impressos&&r.totais_impressos.saidas!=null&&Math.abs(r.saidas-r.totais_impressos.saidas)<=0.05;\n    var jaImportado=_extDados&&(_extDados.meses||[]).indexOf(r.mes)!==-1;\n    var h='<div class=\"card card-pad\" style=\"background:var(--blue-50);border:1px solid var(--blue-200)\">';\n    h+='<div class=\"flex-between mb-16\" style=\"flex-wrap:wrap;gap:8px\"><div><span class=\"badge neutral\">prévia</span> <strong style=\"margin-left:6px\">Extrato de '+fmtMes(r.mes)+'</strong></div>'+\n       (r.reconcilia?'<span class=\"badge low\">✓ reconciliado</span>':'<span class=\"badge mid\">⚠ com avisos</span>')+'</div>';\n    h+=extLinha('Saldo inicial → final', 0, {txt:(r.saldo_inicial!=null?fmt(r.saldo_inicial):'—')+' → '+(r.saldo_final!=null?fmt(r.saldo_final):'—')});\n    h+=extLinha('Entradas calculadas × impressas', 0, {txt:fmt(r.entradas)+' × '+(r.totais_impressos&&r.totais_impressos.entradas!=null?fmt(r.totais_impressos.entradas):'—')+(okEnt?' ✓':' ⚠'), cor:okEnt?'var(--risk-low)':'var(--risk-mid)'});\n    h+=extLinha('Saídas calculadas × impressas', 0, {txt:fmt(r.saidas)+' × '+(r.totais_impressos&&r.totais_impressos.saidas!=null?fmt(r.totais_impressos.saidas):'—')+(okSai?' ✓':' ⚠'), cor:okSai?'var(--risk-low)':'var(--risk-mid)'});\n    h+=extLinha('Resultado do mês (Δ saldo)', r.resultado, {cor:(Number(r.resultado)<0?'var(--risk-high)':'var(--risk-low)')});\n    h+=extLinha('Transações', 0, {txt:r.qtd+' ('+r.qtd_creditos+' créditos, '+r.qtd_debitos+' débitos, '+r.qtd_internas+' internas CDB)'});\n    if(r.avisos&&r.avisos.length){ h+='<div class=\"alerta alerta-aviso\" style=\"margin-top:10px\"><strong>Avisos:</strong><br>'+r.avisos.map(esc).join('<br>')+'</div>'; }\n    if(jaImportado){ h+='<div class=\"alerta alerta-info\" style=\"margin-top:10px\">Este mês já foi importado — importar de novo <strong>substitui</strong> os dados anteriores.</div>'; }\n    h+='</div>';\n    document.getElementById('ext-previa').innerHTML=h;\n  }\n\n  window.abrirModalImport = function(){\n    _extPaginas=null; _extPrevia=null; _extNome='';\n    var a=document.getElementById('ext-arquivo'); if(a) a.textContent='nenhum arquivo selecionado';\n    var f=document.getElementById('ext-file'); if(f) f.value='';\n    var pv=document.getElementById('ext-previa'); if(pv) pv.innerHTML='';\n    extStatus('');\n    var ba=document.getElementById('ext-btn-analisar'); if(ba) ba.disabled=true;\n    var bi=document.getElementById('ext-btn-importar'); if(bi) bi.disabled=true;\n    abrir('modal-import');\n  };\n\n  window.extAnalisar = function(){\n    if(!_extPaginas){ mostrarToast('Escolha o PDF primeiro.','aviso'); return; }\n    if(!extOnline()){ mostrarToast('A importação de extrato exige conexão.','aviso'); return; }\n    var btn=document.getElementById('ext-btn-analisar');\n    btn.disabled=true; btn.innerHTML='<span class=\"spinner-sm\"></span> Analisando…';\n    google.script.run.withSuccessHandler(function(res){\n      btn.disabled=false; btn.innerHTML='<i class=\"fas fa-magnifying-glass\"></i> Analisar';\n      if(!res||res.status!=='sucesso'){ mostrarToast((res&&res.mensagem)||'Erro na análise','erro'); return; }\n      _extPrevia=res.dados.resumo;\n      extRenderPrevia(_extPrevia);\n      document.getElementById('ext-btn-importar').disabled=false;\n    }).withFailureHandler(function(e){\n      btn.disabled=false; btn.innerHTML='<i class=\"fas fa-magnifying-glass\"></i> Analisar';\n      mostrarToast('Erro: '+(e&&e.message?e.message:e),'erro');\n    }).importarExtrato({ paginas:_extPaginas, arquivo:_extNome, preview:true });\n  };\n\n  window.extImportar = function(){\n    if(!_extPaginas||!_extPrevia){ mostrarToast('Analise o extrato antes de importar.','aviso'); return; }\n    if(!extOnline()){ mostrarToast('A importação de extrato exige conexão.','aviso'); return; }\n    var btn=document.getElementById('ext-btn-importar');\n    btn.disabled=true; btn.innerHTML='<span class=\"spinner-sm\"></span> Importando…';\n    google.script.run.withSuccessHandler(function(res){\n      btn.innerHTML='<i class=\"fas fa-file-import\"></i> Importar mês';\n      if(!res||res.status!=='sucesso'){ btn.disabled=false; mostrarToast((res&&res.mensagem)||'Erro na importação','erro'); return; }\n      mostrarToast(res.mensagem||'Extrato importado.','sucesso');\n      var mesImportado=res.dados&&res.dados.resumo?res.dados.resumo.mes:'';\n      _extPrevia=null; _extPaginas=null;\n      document.getElementById('ext-previa').innerHTML='';\n      document.getElementById('ext-arquivo').textContent='nenhum arquivo selecionado';\n      document.getElementById('ext-file').value='';\n      document.getElementById('ext-btn-analisar').disabled=true;\n      extStatus('');\n      fecharModal('modal-import');\n      carregarFluxoReal(mesImportado);\n    }).withFailureHandler(function(e){\n      btn.disabled=false; btn.innerHTML='<i class=\"fas fa-file-import\"></i> Importar mês';\n      mostrarToast('Erro: '+(e&&e.message?e.message:e),'erro');\n    }).importarExtrato({ paginas:_extPaginas, arquivo:_extNome, preview:false });\n  };\n\n  function extBadgeClasse(t){\n    if(t.interna) return '<span class=\"badge neutral\">CDB</span>';\n    var mapa={ fonte:['low', t.fonte||'fonte'], transferencia:['neutral','transf. '+(t.fonte||'')], tributo:['high','tributo'],\n               contador:['mid','contador'], tarifa:['mid','tarifa'], rendimento:['low','rendimento'], outra:['neutral','outros'] };\n    var b=mapa[t.classe]||mapa.outra;\n    return '<span class=\"badge '+b[0]+'\">'+esc(b[1])+'</span>';\n  }\n\n  function extKpi(rotulo,valor,extra,classe){\n    return '<div class=\"kpi'+(classe?' '+classe:'')+'\"><div class=\"kpi-label\">'+rotulo+'</div><div class=\"kpi-value\" style=\"font-size:24px\">'+valor+'</div>'+(extra?'<div class=\"kpi-foot\">'+extra+'</div>':'')+'</div>';\n  }\n\n  function extRenderVis(){\n    var d=_extDados, alvo=document.getElementById('ext-vis');\n    if(!d||!(d.meses||[]).length){ alvo.innerHTML='<div class=\"card card-pad\"><div class=\"alerta alerta-info\">Nenhum extrato importado ainda. Envie o PDF do extrato mensal acima.</div></div>'; return; }\n    var meta=d.meta||{}, cmp=d.comparacao||{};\n    var h='<div class=\"card card-pad\">';\n    h+='<div class=\"flex-between mb-16\" style=\"flex-wrap:wrap;gap:10px\"><div style=\"display:flex;align-items:center;gap:10px\"><strong>Fluxo real</strong>'+\n       '<select class=\"form-control\" style=\"width:auto;padding:6px 10px\" onchange=\"carregarFluxoReal(this.value)\">'+\n       d.meses.map(function(m){ return '<option value=\"'+esc(m)+'\"'+(m===d.mes?' selected':'')+'>'+fmtMes(m)+'</option>'; }).join('')+'</select>'+\n       (meta.reconcilia?'<span class=\"badge low\">✓ reconciliado</span>':'<span class=\"badge mid\">⚠ com avisos</span>')+'</div>'+\n       '<span class=\"text-sec\" style=\"font-size:.78em\">'+esc(meta.arquivo||'')+(meta.qtd?' · '+meta.qtd+' transações':'')+'</span></div>';\n    // KPIs\n    h+='<div class=\"kpi-row mb-16\">'+\n       extKpi('Saldo inicial → final', fmt(meta.saldo_final), 'começou em '+fmt(meta.saldo_inicial))+\n       extKpi('Entradas', fmt(meta.entradas), 'créditos do mês (sem CDB)', 'r-low')+\n       extKpi('Saídas', fmt(meta.saidas), 'débitos do mês (sem CDB)', 'r-high')+\n       extKpi('Resultado do mês', fmt(meta.resultado), 'Δ saldo da conta', Number(meta.resultado)<0?'r-high':'r-low')+\n       '</div>';\n    if(meta.avisos&&meta.avisos.length){ h+='<div class=\"alerta alerta-aviso\" style=\"margin-bottom:14px\"><strong>Avisos da importação:</strong><br>'+meta.avisos.map(esc).join('<br>')+'</div>'; }\n    // Real × Projetado\n    h+='<div style=\"margin:2px 0 6px;font-size:.72em;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-400);font-weight:700\">Real × Projetado (Fluxo de Caixa)</div>';\n    if(cmp.tem_projecao){\n      function linhaCmp(rotulo,real,proj,bomSePositivo){\n        var delta=Math.round((real-proj)*100)/100;\n        var bom=bomSePositivo?delta>=0:delta<=0;\n        var cor=delta===0?'':(bom?'var(--risk-low)':'var(--risk-high)');\n        return '<tr><td data-full>'+rotulo+'</td>'+\n          '<td class=\"num\" data-label=\"Real\">'+fmt(real)+'</td>'+\n          '<td class=\"num\" data-label=\"Projetado\">'+fmt(proj)+'</td>'+\n          '<td class=\"num\" data-label=\"Δ (real − proj.)\"'+(cor?' style=\"color:'+cor+'\"':'')+'>'+(delta>0?'+ ':(delta<0?'− ':''))+fmt(Math.abs(delta))+'</td></tr>';\n      }\n      h+='<div style=\"overflow-x:auto\"><table class=\"tracker cardify\" style=\"font-size:12.5px\">'+\n         '<thead><tr><th>Indicador</th><th class=\"num\">Real</th><th class=\"num\">Projetado</th><th class=\"num\">Δ (real − proj.)</th></tr></thead><tbody>'+\n         linhaCmp('Recebido das fontes', cmp.recebido_real, cmp.recebido_proj, true)+\n         linhaCmp('Tributos pagos', cmp.tributos_real, cmp.pagar_proj, false)+\n         linhaCmp('Transferido aos sócios', cmp.transf_real, cmp.transferir_proj, false)+\n         linhaCmp('Resultado do mês (Δ saldo × fica em conta)', cmp.resultado_real, cmp.fechamento_proj, true)+\n         '</tbody></table></div>';\n    } else {\n      h+='<div class=\"alerta alerta-info\">Sem projeção no Fluxo de Caixa para '+fmtMes(d.mes)+' — a comparação aparece quando houver NFs do mês.</div>';\n    }\n    // transações\n    var trans=(d.transacoes||[]), internas=trans.filter(function(t){return t.interna;}).length;\n    h+='<div class=\"flex-between\" style=\"margin:18px 0 6px\"><div style=\"font-size:.72em;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-400);font-weight:700\">Transações do extrato</div>'+\n       (internas?'<label class=\"text-sec\" style=\"font-size:.8em;cursor:pointer\"><input type=\"checkbox\" '+(_extInternas?'checked':'')+' onchange=\"extToggleInternas(this.checked)\"> mostrar movimentos internos (CDB) · '+internas+'</label>':'')+'</div>';\n    var vis=trans.filter(function(t){ return _extInternas||!t.interna; });\n    if(vis.length){\n      h+='<div style=\"overflow-x:auto\"><table class=\"tracker cardify\" style=\"font-size:12.5px\">'+\n         '<thead><tr><th style=\"width:64px\">Data</th><th>Descrição</th><th class=\"num\">Valor</th></tr></thead><tbody>'+\n         vis.map(function(t){\n           var cred=t.tipo==='credito';\n           return '<tr'+(t.interna?' style=\"opacity:.55\"':'')+'>'+\n             '<td class=\"mono\" data-label=\"Data\">'+fmtData(t.data)+'</td>'+\n             '<td data-full>'+esc(t.descricao)+' '+extBadgeClasse(t)+'</td>'+\n             '<td class=\"num mono\" data-label=\"Valor\" style=\"color:'+(cred?'var(--risk-low)':'var(--risk-high)')+'\">'+(cred?'+ ':'− ')+fmt(t.valor)+'</td></tr>';\n         }).join('')+\n         '</tbody></table></div>';\n    } else {\n      h+='<div class=\"alerta alerta-info\">Sem transações neste mês.</div>';\n    }\n    h+='</div>';\n    alvo.innerHTML=h;\n  }\n\n  window.extToggleInternas = function(v){ _extInternas=!!v; extRenderVis(); };\n\n  window.carregarFluxoReal = function(mes){\n    var alvo=document.getElementById('ext-vis');\n    if(!alvo) return;\n    alvo.innerHTML='<div class=\"card card-pad\"><div class=\"loader\"></div></div>';\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso'){ alvo.innerHTML='<div class=\"card card-pad\"><div class=\"alerta alerta-erro\">'+((res&&res.mensagem)||'Erro ao carregar o fluxo real')+'</div></div>'; return; }\n      _extDados=res.dados;\n      extRenderVis();\n      if(_extPrevia) extRenderPrevia(_extPrevia);   // atualiza o aviso de \"mês já importado\"\n    }).withFailureHandler(function(e){\n      alvo.innerHTML='<div class=\"card card-pad\"><div class=\"alerta alerta-erro\">Erro: '+(e&&e.message?e.message:e)+'</div></div>';\n    }).obterFluxoReal(mes?{mes:mes}:{});\n  };\n\n  carregarFluxo();\n})();\n<\/script>\n","Lancamentos":"<!-- Lancamentos.html — Lista, filtros e CRUD de lançamentos + reconciliação de cartões.\n     navegarPara('Lancamentos'). Abas: Lançamentos | Cartões. -->\n<div class=\"fade-in\">\n  <div class=\"section-head\">\n    <h2>Lançamentos</h2>\n    <div class=\"flex gap-8\">\n      <button class=\"btn ghost sm\" onclick=\"abrirImport()\"><i class=\"fas fa-file-import\"></i> Importar fatura</button>\n      <button class=\"btn sm\" onclick=\"abrirModalLanc(null)\"><i class=\"fas fa-plus\"></i> Novo lançamento</button>\n    </div>\n  </div>\n\n  <div class=\"tabs\">\n    <div class=\"tab ativa\" data-ltab=\"lista\" onclick=\"lancTab('lista')\"><i class=\"fas fa-list\"></i> Lançamentos</div>\n    <div class=\"tab\" data-ltab=\"cartoes\" onclick=\"lancTab('cartoes')\"><i class=\"fas fa-credit-card\"></i> Cartões</div>\n  </div>\n\n  <!-- ===== LISTA ===== -->\n  <div class=\"tab-content ativa\" id=\"ltab-lista\">\n  <!-- Filtros -->\n  <div class=\"card card-pad mb-16\">\n    <div class=\"form-grid\">\n      <div class=\"form-group mb-0\">\n        <label>Mês (fatura)</label>\n        <select class=\"form-control\" id=\"f-mes\" onchange=\"aplicarFiltros()\"><option value=\"\">Todos</option></select>\n      </div>\n      <div class=\"form-group mb-0\">\n        <label>Dono</label>\n        <select class=\"form-control\" id=\"f-dono\" onchange=\"aplicarFiltros()\"><option value=\"\">Todos</option><option>Tuto</option><option>Francesca</option></select>\n      </div>\n      <div class=\"form-group mb-0\">\n        <label>Natureza</label>\n        <select class=\"form-control\" id=\"f-natureza\" onchange=\"aplicarFiltros()\">\n          <option value=\"\">Todas</option>\n          <option value=\"despesa\">Despesa</option>\n          <option value=\"pagamento_fatura\">Pagamento de fatura</option>\n          <option value=\"transferencia\">Transferência</option>\n        </select>\n      </div>\n      <div class=\"form-group mb-0\">\n        <label>Forma de pagamento</label>\n        <select class=\"form-control\" id=\"f-forma\" onchange=\"aplicarFiltros()\"><option value=\"\">Todas</option></select>\n      </div>\n      <div class=\"form-group mb-0\">\n        <label>Categoria</label>\n        <select class=\"form-control\" id=\"f-categoria\" onchange=\"aplicarFiltros()\"><option value=\"\">Todas</option></select>\n      </div>\n      <div class=\"form-group mb-0\">\n        <label>Buscar descrição</label>\n        <input class=\"form-control\" id=\"f-busca\" placeholder=\"ex: drogasil\" oninput=\"debounceFiltro()\">\n      </div>\n    </div>\n  </div>\n\n  <div class=\"flex-between mb-16\">\n    <div class=\"text-sec\" id=\"lanc-resumo\">carregando…</div>\n    <button class=\"btn ghost sm\" onclick=\"aplicarFiltros()\"><i class=\"fas fa-rotate\"></i> Atualizar</button>\n  </div>\n\n  <div class=\"card\">\n    <div class=\"tabela-wrap\" style=\"overflow-x:auto\">\n      <table class=\"tracker cardify\" id=\"tbl-lanc\">\n        <thead>\n          <tr>\n            <th>Data</th><th>Descrição</th><th>Natureza</th><th>Categoria</th><th>Dono</th>\n            <th>Forma</th><th>Parc.</th><th class=\"num\">Valor</th><th class=\"text-center\">Ações</th>\n          </tr>\n        </thead>\n        <tbody id=\"body-lanc\"><tr><td colspan=\"9\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div>\n  </div>\n  </div><!-- /ltab-lista -->\n\n  <!-- ===== CARTÕES (cartão = conta a pagar) ===== -->\n  <div class=\"tab-content\" id=\"ltab-cartoes\">\n    <div class=\"card card-pad mb-16\">\n      <div class=\"text-sec\" style=\"font-size:.85em\">\n        As <strong>compras da fatura</strong> são as despesas; <strong>pagar a fatura</strong> só quita o cartão\n        (natureza \"Pagamento de fatura\") e não conta como gasto. Aqui a soma dos itens de cada fatura é\n        comparada com o pagamento lançado.\n      </div>\n      <div class=\"form-grid mt-16\">\n        <div class=\"form-group mb-0\">\n          <label>Dono</label>\n          <select class=\"form-control\" id=\"c-dono\" onchange=\"cartoesCarregar()\"><option value=\"\">Todos</option><option>Tuto</option><option>Francesca</option></select>\n        </div>\n        <div class=\"form-group mb-0\">\n          <label>De (mês)</label>\n          <input type=\"month\" class=\"form-control\" id=\"c-de\" onchange=\"cartoesCarregar()\">\n        </div>\n        <div class=\"form-group mb-0\">\n          <label>Até (mês)</label>\n          <input type=\"month\" class=\"form-control\" id=\"c-ate\" onchange=\"cartoesCarregar()\">\n        </div>\n      </div>\n    </div>\n\n    <div class=\"flex-between mb-16\">\n      <div class=\"text-sec\" id=\"cartoes-resumo\">—</div>\n      <button class=\"btn ghost sm\" onclick=\"cartoesCarregar()\"><i class=\"fas fa-rotate\"></i> Atualizar</button>\n    </div>\n\n    <div class=\"card\">\n      <div class=\"tabela-wrap\" style=\"overflow-x:auto\">\n        <table class=\"tracker cardify\" id=\"tbl-cartoes\">\n          <thead>\n            <tr>\n              <th>Cartão</th><th>Mês</th><th class=\"num\">Itens da fatura</th>\n              <th class=\"num\">Pagamento</th><th class=\"num\">Δ</th><th>Situação</th>\n            </tr>\n          </thead>\n          <tbody id=\"body-cartoes\"><tr><td colspan=\"6\"><div class=\"loader\"></div></td></tr></tbody>\n        </table>\n      </div>\n    </div>\n  </div><!-- /ltab-cartoes -->\n</div>\n\n<!-- Modal criar/editar -->\n<div class=\"modal-backdrop\" id=\"modal-lanc\">\n  <div class=\"modal\">\n    <div class=\"modal-header\">\n      <h3 id=\"modal-lanc-titulo\">Novo lançamento</h3>\n      <button class=\"modal-close\" onclick=\"fecharModal('modal-lanc')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <input type=\"hidden\" id=\"l-id\">\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\">\n          <label>Data</label>\n          <input type=\"date\" class=\"form-control\" id=\"l-data\">\n        </div>\n        <div class=\"form-group\">\n          <label>Valor (R$) <span class=\"req\">*</span></label>\n          <input class=\"form-control\" id=\"l-valor\" placeholder=\"0,00\" inputmode=\"decimal\">\n        </div>\n      </div>\n      <div class=\"form-group\">\n        <label>Descrição <span class=\"req\">*</span></label>\n        <input class=\"form-control\" id=\"l-descricao\" placeholder=\"ex: Drogasil\">\n      </div>\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\">\n          <label>Natureza <span class=\"req\">*</span></label>\n          <select class=\"form-control\" id=\"l-natureza\" onchange=\"naturezaTrocada()\">\n            <option value=\"despesa\">Despesa</option>\n            <option value=\"pagamento_fatura\">Pagamento de fatura</option>\n            <option value=\"transferencia\">Transferência</option>\n          </select>\n        </div>\n        <div class=\"form-group\" id=\"wrap-categoria\">\n          <label>Categoria</label>\n          <select class=\"form-control\" id=\"l-categoria\"><option value=\"\">— (auto pela descrição) —</option></select>\n        </div>\n      </div>\n      <div class=\"alerta alerta-info mb-16\" id=\"aviso-natureza\" style=\"display:none\">\n        <strong>Não conta como gasto.</strong> <span id=\"aviso-natureza-txt\"></span>\n      </div>\n\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\">\n          <label>Forma de pagamento</label>\n          <select class=\"form-control\" id=\"l-forma\" onchange=\"formaTrocada()\"><option value=\"\">—</option></select>\n        </div>\n        <!-- campo FILHO da forma (rótulo e opções vêm da forma escolhida) -->\n        <div class=\"form-group\" id=\"wrap-instrumento\" style=\"display:none\">\n          <label id=\"label-instrumento\">Instrumento</label>\n          <select class=\"form-control\" id=\"l-instrumento\"><option value=\"\">—</option></select>\n        </div>\n      </div>\n\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\">\n          <label>Mês da fatura</label>\n          <input class=\"form-control\" id=\"l-fatura\" placeholder=\"aaaa-mm\" oninput=\"previewParcelas()\">\n        </div>\n        <div class=\"form-group\">\n          <label>Dono</label>\n          <select class=\"form-control\" id=\"l-dono\"><option value=\"\">— (sem dono) —</option><option>Tuto</option><option>Francesca</option></select>\n        </div>\n      </div>\n\n      <div class=\"form-group\">\n        <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer\">\n          <input type=\"checkbox\" id=\"l-parcelado\" onchange=\"parceladoTrocado()\" style=\"width:auto;margin:0\">\n          Parcelado\n        </label>\n      </div>\n      <div id=\"wrap-parcelas\" style=\"display:none\">\n        <div class=\"form-grid-2\">\n          <div class=\"form-group\">\n            <label>Parcela atual</label>\n            <input type=\"number\" min=\"1\" class=\"form-control\" id=\"l-parcela-atual\" placeholder=\"ex: 1\" oninput=\"previewParcelas()\">\n          </div>\n          <div class=\"form-group\">\n            <label>de quantas</label>\n            <input type=\"number\" min=\"2\" class=\"form-control\" id=\"l-parcelas-total\" placeholder=\"ex: 12\" oninput=\"previewParcelas()\">\n          </div>\n        </div>\n        <div class=\"alerta alerta-info mb-16\" id=\"preview-parcelas\"></div>\n      </div>\n\n      <div class=\"form-group\">\n        <label>Tipo</label>\n        <select class=\"form-control\" id=\"l-tipo\"><option value=\"saida\">Saída (gasto)</option><option value=\"entrada\">Entrada</option></select>\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn ghost\" onclick=\"fecharModal('modal-lanc')\">Cancelar</button>\n      <button class=\"btn\" id=\"btn-salvar-lanc\" onclick=\"salvarLanc()\">Salvar</button>\n    </div>\n  </div>\n</div>\n\n<!-- Modal confirmar exclusão -->\n<div class=\"modal-backdrop\" id=\"modal-excluir\">\n  <div class=\"modal modal-sm\">\n    <div class=\"modal-header danger\">\n      <h3>Excluir lançamento</h3>\n      <button class=\"modal-close\" onclick=\"fecharModal('modal-excluir')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <p>Remover <strong id=\"excluir-desc\"></strong>? Esta ação não pode ser desfeita.</p>\n      <!-- só aparece quando a linha faz parte de um grupo de parcelamento -->\n      <div id=\"excluir-escopo\" style=\"display:none\">\n        <div class=\"form-group mb-0\">\n          <label>O que excluir</label>\n          <select class=\"form-control\" id=\"l-escopo\">\n            <option value=\"linha\">Só esta parcela</option>\n            <option value=\"grupo\">Todas as parcelas desta compra</option>\n          </select>\n        </div>\n        <div class=\"text-sec mt-16\" style=\"font-size:.85em\" id=\"excluir-escopo-txt\"></div>\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn ghost\" onclick=\"fecharModal('modal-excluir')\">Cancelar</button>\n      <button class=\"btn danger\" id=\"btn-confirma-excluir\" onclick=\"confirmarExclusao()\">Excluir</button>\n    </div>\n  </div>\n</div>\n\n<script>\n(function() {\n  var _lista = [];      // cache da lista atual\n  var _opcoes = { categorias: [], cartoes: [], meses: [], formas: [], instrumentos: [] };\n  var _excluirId = null;\n  var _filtroTimer = null;\n  var _cartoesInit = false;   // carga lazy da aba Cartões\n\n  // rótulos das naturezas (o server usa os mesmos valores: veja NATUREZAS_LANCAMENTO)\n  var NAT_ROTULO = { despesa: 'Despesa', pagamento_fatura: 'Pagto de fatura', transferencia: 'Transferência' };\n  var NAT_AVISO = {\n    pagamento_fatura: 'Pagar a fatura só quita o cartão — as compras da fatura é que são as despesas.',\n    transferencia: 'Transferência só move dinheiro entre contas.'\n  };\n\n  window.fecharModal = function(id) { document.getElementById(id).classList.remove('aberta'); };\n  function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }\n\n  function fmtBRL(n) { return (Number(n) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }\n  function esc(s) { return String(s == null ? '' : s).replace(/[&<>\"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]; }); }\n\n  window.lancTab = function(t) {\n    document.querySelectorAll('.tab[data-ltab]').forEach(function(el){ el.classList.toggle('ativa', el.getAttribute('data-ltab') === t); });\n    ['lista','cartoes'].forEach(function(x){ var el = document.getElementById('ltab-'+x); if (el) el.classList.toggle('ativa', x === t); });\n    if (t === 'cartoes' && !_cartoesInit) { _cartoesInit = true; cartoesCarregar(); }\n  };\n\n  function carregarOpcoes(cb) {\n    google.script.run.withSuccessHandler(function(res) {\n      if (res && res.status === 'sucesso') {\n        _opcoes = res.dados;\n        _opcoes.formas = _opcoes.formas || [];\n        _opcoes.instrumentos = _opcoes.instrumentos || [];\n        preencherSelect('f-mes', (_opcoes.meses||[]).map(function(m){return {v:m,t:m};}), 'Todos');\n        preencherSelect('f-forma', _opcoes.formas.map(function(f){return {v:f.nome,t:f.nome};}), 'Todas');\n        preencherSelectCategorias('f-categoria', true);\n        preencherSelect('l-forma', _opcoes.formas.map(function(f){return {v:f.nome,t:f.nome};}), '—');\n        preencherSelectCategorias('l-categoria', false);\n      }\n      if (cb) cb();\n    }).obterOpcoesLancamentos();\n  }\n\n  /** Acha a forma pelo nome. */\n  function acharForma(nome) {\n    var l = (_opcoes.formas||[]).filter(function(f){ return f.nome === nome; });\n    return l.length ? l[0] : null;\n  }\n\n  /**\n   * A conta aceita esta forma? A conta do Itaú faz PIX, boleto E transferência — por isso\n   * `formas` é uma LISTA, e não um pai único. Conta SEM forma cadastrada aceita qualquer\n   * uma: sumir do select seria pior do que sobrar (o usuário não teria como lançar).\n   */\n  function contaAceita(conta, forma) {\n    var fs = (conta && conta.formas_valor) || [];\n    if (!fs.length) return true;\n    return fs.some(function(f){ return String(f).toLowerCase() === String(forma).toLowerCase(); });\n  }\n\n  /**\n   * Cascata Forma → CONTA (mesmo padrão do Dono→Fonte já existente).\n   * As contas são filhas da INSTITUIÇÃO (Itaú → \"Itaú PJ M&M\"), e o select FILTRA pelas\n   * que aceitam a forma escolhida. Forma sem nenhuma conta compatível esconde o campo —\n   * é o caso de Dinheiro/Boleto, que não têm instrumento.\n   */\n  window.formaTrocada = function(manter) {\n    var selF = document.getElementById('l-forma');\n    var wrap = document.getElementById('wrap-instrumento');\n    var selI = document.getElementById('l-instrumento');\n    if (!selF || !wrap || !selI) return;            // callback tardio: página já trocou\n    var forma = acharForma(selF.value);\n    var itens = forma ? (_opcoes.instrumentos||[]).filter(function(i){ return contaAceita(i, forma.nome); }) : [];\n    if (!forma || !itens.length) {\n      wrap.style.display = 'none'; selI.innerHTML = '<option value=\"\"></option>'; selI.value = ''; return;\n    }\n    var lbl = document.getElementById('label-instrumento');\n    if (lbl) lbl.textContent = 'Conta / cartão';\n    var atual = manter !== undefined ? manter : selI.value;\n    selI.innerHTML = '<option value=\"\">—</option>' + itens.map(function(i){\n      var rot = i.nome + (i.instituicao && i.instituicao !== i.nome ? (' · ' + i.instituicao) : '');\n      return '<option value=\"' + esc(i.nome) + '\">' + esc(rot) + '</option>';\n    }).join('');\n    selI.value = atual || '';\n    wrap.style.display = '';\n  };\n\n  /** Natureza ≠ despesa não é gasto → categoria não se aplica (esconde e limpa). */\n  window.naturezaTrocada = function() {\n    var sel = document.getElementById('l-natureza');\n    var wrap = document.getElementById('wrap-categoria');\n    var aviso = document.getElementById('aviso-natureza');\n    if (!sel || !wrap || !aviso) return;\n    var n = sel.value;\n    var ehDespesa = (n === 'despesa');\n    wrap.style.display = ehDespesa ? '' : 'none';\n    if (!ehDespesa) { var c = document.getElementById('l-categoria'); if (c) c.value = ''; }\n    aviso.style.display = ehDespesa ? 'none' : '';\n    var txt = document.getElementById('aviso-natureza-txt');\n    if (txt) txt.textContent = NAT_AVISO[n] || '';\n  };\n\n  window.parceladoTrocado = function() {\n    var chk = document.getElementById('l-parcelado');\n    var wrap = document.getElementById('wrap-parcelas');\n    if (!chk || !wrap) return;\n    wrap.style.display = chk.checked ? '' : 'none';\n    if (!chk.checked) {\n      ['l-parcela-atual','l-parcelas-total'].forEach(function(id){ var e = document.getElementById(id); if (e) e.value = ''; });\n    }\n    previewParcelas();\n  };\n\n  /** Mostra quantas linhas o salvar vai criar (as parcelas ANTERIORES não são criadas). */\n  window.previewParcelas = function() {\n    var box = document.getElementById('preview-parcelas');\n    if (!box) return;\n    var chk = document.getElementById('l-parcelado');\n    var atual = Number((document.getElementById('l-parcela-atual')||{}).value) || 0;\n    var total = Number((document.getElementById('l-parcelas-total')||{}).value) || 0;\n    var mes = ((document.getElementById('l-fatura')||{}).value || '').trim();\n    var editando = !!(document.getElementById('l-id')||{}).value;\n    if (!chk || !chk.checked || total < 2 || atual < 1 || atual > total) { box.textContent = ''; box.style.display='none'; return; }\n    box.style.display = '';\n    if (editando) { box.innerHTML = 'Editando <strong>uma</strong> parcela — as outras do grupo não são alteradas.'; return; }\n    var qtd = total - atual + 1;\n    box.innerHTML = 'Serão criadas <strong>' + qtd + '</strong> linha(s): parcela ' + atual + '/' + total +\n      (mes ? (' a partir de <strong>' + esc(mes) + '</strong>, uma por mês de fatura') : ' (informe o mês da fatura)') +\n      '. As parcelas anteriores não são criadas.';\n  };\n\n  function preencherSelect(id, itens, labelVazio) {\n    var sel = document.getElementById(id);\n    if(!sel) return;                                   // callback tardio: página já trocou\n    var atual = sel.value;\n    var html = '<option value=\"\">' + labelVazio + '</option>';\n    itens.forEach(function(it){ html += '<option value=\"' + esc(it.v) + '\">' + esc(it.t) + '</option>'; });\n    sel.innerHTML = html; sel.value = atual;\n  }\n\n  function preencherSelectCategorias(id, comTodas) {\n    var sel = document.getElementById(id);\n    if(!sel) return;                                   // callback tardio: página já trocou\n    var atual = sel.value;\n    var grupos = {};\n    _opcoes.categorias.forEach(function(c){ (grupos[c.grupo] = grupos[c.grupo] || []).push(c.categoria); });\n    var html = comTodas ? '<option value=\"\">Todas</option>' : '<option value=\"\">— (auto pela descrição) —</option>';\n    Object.keys(grupos).forEach(function(g){\n      html += '<optgroup label=\"' + esc(g) + '\">';\n      grupos[g].forEach(function(cat){ html += '<option value=\"' + esc(cat) + '\">' + esc(cat) + '</option>'; });\n      html += '</optgroup>';\n    });\n    sel.innerHTML = html; sel.value = atual;\n  }\n\n  window.aplicarFiltros = function() {\n    var v = function(id){ var e = document.getElementById(id); return e ? e.value : ''; };\n    var filtros = {\n      mes: v('f-mes'),\n      dono: v('f-dono'),\n      natureza: v('f-natureza'),\n      forma_pagamento: v('f-forma'),\n      categoria: v('f-categoria'),\n      busca: v('f-busca')\n    };\n    document.getElementById('body-lanc').innerHTML = '<tr><td colspan=\"9\"><div class=\"loader\"></div></td></tr>';\n    google.script.run.withSuccessHandler(function(res){\n      if (!res || res.status !== 'sucesso') {\n        document.getElementById('body-lanc').innerHTML = '<tr><td colspan=\"9\"><div class=\"alerta alerta-erro\">' + ((res&&res.mensagem)||'Erro.') + '</div></td></tr>';\n        return;\n      }\n      _lista = res.dados.lancamentos;\n      renderLista();\n      // O total do gasto é só o das DESPESAS; pagto de fatura/transferência ficam à parte.\n      var despesas = 0, fora = 0;\n      _lista.forEach(function(l){ if (l.natureza === 'despesa') despesas += (Number(l.valor)||0); else fora += (Number(l.valor)||0); });\n      var el = document.getElementById('lanc-resumo');\n      if (el) el.innerHTML = res.dados.qtd + ' lançamento(s) · despesas <strong class=\"mono\">' + fmtBRL(despesas) + '</strong>' +\n        (fora ? (' · <span class=\"text-sec\">fora do gasto ' + fmtBRL(fora) + '</span>') : '');\n    }).withFailureHandler(function(err){\n      document.getElementById('body-lanc').innerHTML = '<tr><td colspan=\"9\"><div class=\"alerta alerta-erro\">Erro: ' + (err.message||err) + '</div></td></tr>';\n    }).listarLancamentos(filtros);\n  };\n\n  window.debounceFiltro = function() { clearTimeout(_filtroTimer); _filtroTimer = setTimeout(aplicarFiltros, 350); };\n\n  function renderLista() {\n    if (!_lista.length) {\n      document.getElementById('body-lanc').innerHTML = '<tr><td colspan=\"9\"><div class=\"alerta alerta-info\">Nenhum lançamento. Crie um manualmente ou importe uma fatura.</div></td></tr>';\n      return;\n    }\n    document.getElementById('body-lanc').innerHTML = _lista.map(function(l){\n      var ehDespesa = (l.natureza === 'despesa');\n      // despesa = verde (é gasto de verdade); as outras naturezas são cinza e a linha\n      // inteira fica esmaecida — sinal visual de que NÃO entra na conta dos gastos.\n      var natBadge = '<span class=\"badge ' + (ehDespesa ? 'low' : 'mid') + '\">' + esc(NAT_ROTULO[l.natureza] || l.natureza) + '</span>';\n      var cat = ehDespesa\n        ? (l.categoria ? esc(l.categoria) : '<span class=\"badge mid\">sem categoria</span>')\n        : '<span class=\"text-sec\">—</span>';\n      var dono = l.dono ? esc(l.dono) : '<span class=\"badge mid\">sem dono</span>';\n      // forma · instrumento (ex.: \"Cartão · Inter\"); cai no legado 'cartao' se preciso\n      var forma = esc(l.forma_pagamento || '');\n      if (l.instrumento) forma += (forma ? ' · ' : '') + '<strong>' + esc(l.instrumento) + '</strong>';\n      if (!forma) forma = '<span class=\"text-sec\">—</span>';\n      var parc = (l.parcelado && l.parcelas_total > 1)\n        ? (l.parcela_atual + '/' + l.parcelas_total)\n        : esc(l.parcela || '');\n      var tipoIcone = (l.tipo === 'entrada') ? ' <i class=\"fas fa-arrow-down\" style=\"color:var(--verde,#16A34A)\" title=\"Entrada\"></i>' : '';\n      return '<tr' + (ehDespesa ? '' : ' style=\"opacity:.62\"') + '>' +\n        '<td class=\"mono\" data-label=\"Data\">' + esc(l.dataStr) + '</td>' +\n        '<td class=\"veh\" data-full>' + esc(l.descricao) + tipoIcone + '</td>' +\n        '<td data-label=\"Natureza\">' + natBadge + '</td>' +\n        '<td data-label=\"Categoria\">' + cat + '</td>' +\n        '<td data-label=\"Dono\">' + dono + '</td>' +\n        '<td data-label=\"Forma\">' + forma + '</td>' +\n        '<td class=\"mono\" data-label=\"Parcela\">' + parc + '</td>' +\n        '<td class=\"num\" data-label=\"Valor\">' + fmtBRL(l.valor) + '</td>' +\n        '<td class=\"text-center\" data-label=\"Ações\" style=\"white-space:nowrap\">' +\n
