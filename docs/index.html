          '<button class=\"btn ghost sm\" onclick=\"abrirModalLanc(\\'' + l.id + '\\')\" title=\"Editar\"><i class=\"fas fa-pen\"></i></button> ' +\n          '<button class=\"btn ghost sm\" onclick=\"pedirExclusao(\\'' + l.id + '\\')\" title=\"Excluir\"><i class=\"fas fa-trash\"></i></button>' +\n        '</td>' +\n      '</tr>';\n    }).join('');\n  }\n\n  window.abrirModalLanc = function(id) {\n    document.getElementById('l-id').value = id || '';\n    document.getElementById('modal-lanc-titulo').textContent = id ? 'Editar lançamento' : 'Novo lançamento';\n    var l = id ? _lista.filter(function(x){ return String(x.id) === String(id); })[0] : null;\n    document.getElementById('l-data').value = l ? (l.dataISO || '') : '';\n    document.getElementById('l-valor').value = l ? String(l.valor).replace('.', ',') : '';\n    document.getElementById('l-descricao').value = l ? l.descricao : '';\n    document.getElementById('l-natureza').value = l ? (l.natureza || 'despesa') : 'despesa';\n    document.getElementById('l-categoria').value = l ? (l.categoria || '') : '';\n    document.getElementById('l-fatura').value = l ? (l.fatura_mes || '') : '';\n    document.getElementById('l-dono').value = l ? (l.dono || '') : '';\n    document.getElementById('l-tipo').value = l ? (l.tipo || 'saida') : 'saida';\n    // forma → campo filho (cascata): seta a forma e só então popula/seleciona o filho\n    document.getElementById('l-forma').value = l ? (l.forma_pagamento || '') : '';\n    formaTrocada(l ? (l.instrumento || '') : '');\n    // parcelamento\n    var parcelado = !!(l && l.parcelado && l.parcelas_total > 1);\n    document.getElementById('l-parcelado').checked = parcelado;\n    document.getElementById('l-parcela-atual').value = parcelado ? l.parcela_atual : '';\n    document.getElementById('l-parcelas-total').value = parcelado ? l.parcelas_total : '';\n    parceladoTrocado();\n    naturezaTrocada();\n    abrirModal('modal-lanc');\n  };\n\n  window.salvarLanc = function() {\n    var v = function(id){ var e = document.getElementById(id); return e ? e.value : ''; };\n    var parcelado = document.getElementById('l-parcelado').checked;\n    var dados = {\n      data: v('l-data'),\n      valor: v('l-valor'),\n      descricao: v('l-descricao'),\n      natureza: v('l-natureza'),\n      categoria: v('l-categoria'),\n      forma_pagamento: v('l-forma'),\n      instrumento: v('l-instrumento'),\n      fatura_mes: v('l-fatura'),\n      dono: v('l-dono'),\n      tipo: v('l-tipo'),\n      parcelado: parcelado,\n      parcela_atual: parcelado ? v('l-parcela-atual') : '',\n      parcelas_total: parcelado ? v('l-parcelas-total') : ''\n    };\n    if (!dados.descricao.trim()) { mostrarToast('Informe a descrição.', 'aviso'); return; }\n    if (parcelado) {\n      var pa = Number(dados.parcela_atual) || 0, pt = Number(dados.parcelas_total) || 0;\n      if (pt < 2) { mostrarToast('Parcelado: informe de quantas parcelas (2 ou mais).', 'aviso'); return; }\n      if (pa < 1 || pa > pt) { mostrarToast('Parcela atual precisa estar entre 1 e ' + pt + '.', 'aviso'); return; }\n      if (!dados.fatura_mes.trim()) { mostrarToast('Parcelado: informe o mês da fatura (aaaa-mm).', 'aviso'); return; }\n    }\n    var id = document.getElementById('l-id').value;\n    var btn = document.getElementById('btn-salvar-lanc');\n    btn.disabled = true; btn.innerHTML = '<span class=\"spinner-sm\"></span> Salvando…';\n\n    var handler = function(res){\n      btn.disabled = false; btn.textContent = 'Salvar';\n      if (res && res.status === 'sucesso') {\n        mostrarToast(res.mensagem, 'sucesso');\n        fecharModal('modal-lanc');\n        carregarOpcoes(aplicarFiltros);\n        if (_cartoesInit) cartoesCarregar();   // a reconciliação mudou\n      } else {\n        mostrarToast((res && res.mensagem) || 'Erro ao salvar.', 'erro');\n      }\n    };\n    var falha = function(err){ btn.disabled = false; btn.textContent = 'Salvar'; mostrarToast('Erro: ' + (err.message||err), 'erro'); };\n\n    if (id) google.script.run.withSuccessHandler(handler).withFailureHandler(falha).atualizarLancamento(id, dados);\n    else    google.script.run.withSuccessHandler(handler).withFailureHandler(falha).criarLancamento(dados);\n  };\n\n  window.pedirExclusao = function(id) {\n    _excluirId = id;\n    var l = _lista.filter(function(x){ return String(x.id) === String(id); })[0];\n    document.getElementById('excluir-desc').textContent = l ? (l.descricao + ' — ' + fmtBRL(l.valor)) : id;\n    // Linha de um grupo de parcelamento → deixa escolher entre a parcela e a compra toda\n    var box = document.getElementById('excluir-escopo');\n    var sel = document.getElementById('l-escopo');\n    var temGrupo = !!(l && l.grupo_parcelamento);\n    if (box) box.style.display = temGrupo ? '' : 'none';\n    if (sel) sel.value = 'linha';   // default: só esta parcela\n    if (temGrupo) {\n      var irmas = _lista.filter(function(x){ return x.grupo_parcelamento === l.grupo_parcelamento; }).length;\n      var txt = document.getElementById('excluir-escopo-txt');\n      if (txt) txt.textContent = 'Esta é a parcela ' + l.parcela_atual + '/' + l.parcelas_total +\n        ' de uma compra parcelada (' + irmas + ' parcela(s) visível(is) no filtro atual; excluir o grupo remove TODAS as parcelas da compra).';\n    }\n    abrirModal('modal-excluir');\n  };\n\n  window.confirmarExclusao = function() {\n    if (!_excluirId) return;\n    var sel = document.getElementById('l-escopo');\n    var box = document.getElementById('excluir-escopo');\n    var escopo = (box && box.style.display !== 'none' && sel) ? sel.value : 'linha';\n    var btn = document.getElementById('btn-confirma-excluir');\n    btn.disabled = true; btn.innerHTML = '<span class=\"spinner-sm\"></span> Excluindo…';\n    google.script.run.withSuccessHandler(function(res){\n      btn.disabled = false; btn.textContent = 'Excluir';\n      if (res && res.status === 'sucesso') {\n        mostrarToast(res.mensagem, 'sucesso'); fecharModal('modal-excluir'); aplicarFiltros();\n        if (_cartoesInit) cartoesCarregar();\n      }\n      else mostrarToast((res && res.mensagem) || 'Erro.', 'erro');\n    }).withFailureHandler(function(err){ btn.disabled = false; btn.textContent = 'Excluir'; mostrarToast('Erro: ' + (err.message||err), 'erro'); })\n      .excluirLancamento({ id: _excluirId, escopo: escopo });\n  };\n\n  window.abrirImport = function() { mostrarToast('Importação de fatura chega na próxima etapa (Fase 2b).', 'aviso'); };\n\n  /* ==================== CARTÕES (conta a pagar) ==================== */\n\n  var CART_STATUS = {\n    conciliado:    { cls: 'low',  txt: '✓ conciliado' },\n    sem_fatura:    { cls: 'high', txt: '⚠ fatura não importada' },\n    sem_pagamento: { cls: 'mid',  txt: '⚠ sem pagamento' },\n    diferenca:     { cls: 'high', txt: '⚠ difere' }\n  };\n\n  window.cartoesCarregar = function() {\n    var body = document.getElementById('body-cartoes');\n    if (!body) return;                                  // callback tardio: página já trocou\n    body.innerHTML = '<tr><td colspan=\"6\"><div class=\"loader\"></div></td></tr>';\n    var v = function(id){ var e = document.getElementById(id); return e ? e.value : ''; };\n    var filtros = { dono: v('c-dono'), de: v('c-de'), ate: v('c-ate') };\n    google.script.run.withSuccessHandler(function(res){\n      var b = document.getElementById('body-cartoes');\n      if (!b) return;\n      if (!res || res.status !== 'sucesso') {\n        b.innerHTML = '<tr><td colspan=\"6\"><div class=\"alerta alerta-erro\">' + ((res&&res.mensagem)||'Erro.') + '</div></td></tr>';\n        return;\n      }\n      cartoesRender(res.dados);\n    }).withFailureHandler(function(err){\n      var b = document.getElementById('body-cartoes');\n      if (b) b.innerHTML = '<tr><td colspan=\"6\"><div class=\"alerta alerta-erro\">Erro: ' + (err.message||err) + '</div></td></tr>';\n    }).obterCartoes(filtros);\n  };\n\n  function cartoesRender(d) {\n    var lista = d.cartoes || [], t = d.totais || {};\n    var body = document.getElementById('body-cartoes');\n    if (!body) return;\n    if (!lista.length) {\n      body.innerHTML = '<tr><td colspan=\"6\"><div class=\"alerta alerta-info\">Nenhuma fatura no período. Lance as compras com forma \"Cartão\" e o pagamento com natureza \"Pagamento de fatura\".</div></td></tr>';\n      var r0 = document.getElementById('cartoes-resumo'); if (r0) r0.textContent = '—';\n      return;\n    }\n    body.innerHTML = lista.map(function(c){\n      var st = CART_STATUS[c.status] || { cls: 'mid', txt: c.status };\n      var txt = (c.status === 'diferenca') ? ('⚠ difere ' + fmtBRL(Math.abs(c.delta))) : st.txt;\n      var deltaCls = Math.abs(c.delta) <= (d.tolerancia || 0.05) ? '' : ' style=\"color:var(--vermelho,#DC2626)\"';\n      return '<tr>' +\n        '<td data-label=\"Cartão\"><strong>' + esc(c.cartao) + '</strong></td>' +\n        '<td class=\"mono\" data-label=\"Mês\">' + esc(c.mes) + '</td>' +\n        '<td class=\"num\" data-label=\"Itens da fatura\">' + fmtBRL(c.itens) + ' <span class=\"text-sec\">(' + c.qtd_itens + ')</span></td>' +\n        '<td class=\"num\" data-label=\"Pagamento\">' + fmtBRL(c.pagamento) + '</td>' +\n        '<td class=\"num mono\" data-label=\"Δ\"' + deltaCls + '>' + fmtBRL(c.delta) + '</td>' +\n        '<td data-label=\"Situação\"><span class=\"badge ' + st.cls + '\">' + esc(txt) + '</span></td>' +\n      '</tr>';\n    }).join('');\n    var r = document.getElementById('cartoes-resumo');\n    if (r) r.innerHTML = (t.qtd||0) + ' fatura(s) · itens <strong class=\"mono\">' + fmtBRL(t.itens) + '</strong> · pagamentos <strong class=\"mono\">' +\n      fmtBRL(t.pagamento) + '</strong> · <span class=\"badge low\">' + (t.conciliado||0) + ' conciliada(s)</span> ' +\n      ((t.sem_fatura||0) ? '<span class=\"badge high\">' + t.sem_fatura + ' sem fatura</span> ' : '') +\n      ((t.sem_pagamento||0) ? '<span class=\"badge mid\">' + t.sem_pagamento + ' sem pagamento</span> ' : '') +\n      ((t.diferenca||0) ? '<span class=\"badge high\">' + t.diferenca + ' com diferença</span>' : '');\n  }\n\n  // boot\n  carregarOpcoes(aplicarFiltros);\n})();\n<\/script>\n","Gestao":"<!-- Gestao.html — CADASTRO ÚNICO em árvore (padrão PAI/FILHO do Personal Hub) + Regras.\n     Donos · Instituições → Contas → Mapa de categorias · Formas · Grupos → Categorias.\n     UMA tela, UM modal, UM CRUD (salvarCadastro/excluirCadastro) para todos os níveis:\n     `cat` é o discriminador. Antes eram 4 tabelas, 12 funções de CRUD e 4 modais. -->\n<div class=\"fade-in\">\n  <div class=\"section-head\"><h2>Gestão do sistema</h2></div>\n\n  <div class=\"tabs\">\n    <div class=\"tab ativa\" data-gtab=\"cadastros\" onclick=\"gestaoTab('cadastros')\"><i class=\"fas fa-sitemap\"></i> Cadastros</div>\n    <div class=\"tab\" data-gtab=\"regras\" onclick=\"gestaoTab('regras')\"><i class=\"fas fa-wand-magic-sparkles\"></i> Regras</div>\n  </div>\n\n  <!-- ===== CADASTROS (árvore) ===== -->\n  <div class=\"tab-content ativa\" id=\"gtab-cadastros\">\n    <div class=\"alerta alerta-info mb-16\" id=\"cad-vazio\" style=\"display:none\">\n      Nenhum cadastro ainda. Rode <strong>migrarCadastros()</strong> no editor do Apps Script para trazer\n      formas, instrumentos, categorias e o mapa para a árvore — as abas antigas não são apagadas.\n    </div>\n    <div id=\"cad-arvore\"><div class=\"loader\"></div></div>\n  </div>\n\n  <!-- ===== REGRAS ===== -->\n  <div class=\"tab-content\" id=\"gtab-regras\">\n    <div class=\"flex-between mb-16\">\n      <div class=\"text-sec\" style=\"font-size:.85em\">Categorização automática: se a palavra-chave aparece na descrição, o lançamento\n        recebe a categoria. Vence a <strong>maior prioridade</strong>; empatou, vence a palavra-chave <strong>mais longa</strong> (mais específica).</div>\n      <button class=\"btn sm\" onclick=\"abrirModalRegra(null)\"><i class=\"fas fa-plus\"></i> Nova regra</button>\n    </div>\n    <div class=\"card\"><div style=\"overflow-x:auto\">\n      <table class=\"tracker cardify\">\n        <thead><tr><th class=\"num\">Prior.</th><th>Palavra-chave</th><th>Match</th><th>Categoria</th><th>Grupo</th><th>Situação</th><th class=\"text-center\">Ações</th></tr></thead>\n        <tbody id=\"body-regras\"><tr><td colspan=\"7\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div></div>\n  </div>\n</div>\n\n<!-- ===== Modal ÚNICO de cadastro (os campos aparecem conforme a `cat`) ===== -->\n<div class=\"modal-backdrop\" id=\"modal-cad\">\n  <div class=\"modal modal-sm\">\n    <div class=\"modal-header\">\n      <h3 id=\"modal-cad-titulo\">Novo cadastro</h3>\n      <button class=\"modal-close\" onclick=\"fecharModalG('modal-cad')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <input type=\"hidden\" id=\"cd-id\">\n      <input type=\"hidden\" id=\"cd-cat\">\n\n      <div class=\"form-group\" id=\"wrap-cd-pai\" style=\"display:none\">\n        <label id=\"label-cd-pai\">Pai <span class=\"req\">*</span></label>\n        <select class=\"form-control\" id=\"cd-pai\"><option value=\"\">—</option></select>\n      </div>\n\n      <div class=\"form-group\">\n        <label id=\"label-cd-valor\">Nome <span class=\"req\">*</span></label>\n        <input class=\"form-control\" id=\"cd-valor\" placeholder=\"ex: Itaú\">\n        <div class=\"text-sec mt-16\" id=\"dica-cd-valor\" style=\"font-size:.8em;display:none\"></div>\n      </div>\n\n      <!-- dono -->\n      <div class=\"form-group\" id=\"wrap-cd-frente\" style=\"display:none\">\n        <label>Frente <span class=\"req\">*</span></label>\n        <select class=\"form-control\" id=\"cd-frente\">\n          <option value=\"PJ\">PJ — empresa</option>\n          <option value=\"PF\">PF — pessoa física</option>\n        </select>\n        <div class=\"text-sec mt-16\" style=\"font-size:.8em\">A frente mora no <strong>dono</strong>: cada conta herda a do seu dono, em vez de repetir a informação.</div>\n      </div>\n\n      <!-- conta -->\n      <div id=\"wrap-cd-conta\" style=\"display:none\">\n        <div class=\"form-group\">\n          <label>Dono</label>\n          <select class=\"form-control\" id=\"cd-dono\"><option value=\"\">— (sem dono pessoal / da empresa)</option></select>\n        </div>\n        <div class=\"form-group\">\n          <label>Formas de pagamento que esta conta faz</label>\n          <div id=\"cd-formas\" class=\"form-grid-2\" style=\"gap:6px\"></div>\n          <div class=\"text-sec mt-16\" style=\"font-size:.8em\">A conta do Itaú faz PIX, boleto <em>e</em> transferência — marque todas.\n            No lançamento, escolher a forma <strong>filtra</strong> as contas que a aceitam. Nenhuma marcada = aceita todas.</div>\n        </div>\n        <div class=\"form-grid-2\">\n          <div class=\"form-group\">\n            <label>Dia de fechamento</label>\n            <input type=\"number\" min=\"1\" max=\"31\" class=\"form-control\" id=\"cd-fechamento\" placeholder=\"1 a 31\">\n          </div>\n          <div class=\"form-group\">\n            <label>Dia de vencimento</label>\n            <input type=\"number\" min=\"1\" max=\"31\" class=\"form-control\" id=\"cd-vencimento\" placeholder=\"1 a 31\">\n          </div>\n        </div>\n        <div class=\"alerta alerta-info mb-16\">O <strong>dia de fechamento</strong> é o que permite ao importador saber em qual fatura cada compra cai.\n          Alterá-lo vale para as <strong>próximas</strong> importações — não reescreve o que já foi importado.</div>\n      </div>\n\n      <!-- categoria -->\n      <div class=\"form-group\" id=\"wrap-cd-tipo\" style=\"display:none\">\n        <label>Tipo</label>\n        <select class=\"form-control\" id=\"cd-tipo\"><option value=\"despesa\">Despesa</option><option value=\"receita\">Receita</option></select>\n      </div>\n\n      <!-- mapa -->\n      <div class=\"form-group\" id=\"wrap-cd-destino\" style=\"display:none\">\n        <label>Categoria do sistema</label>\n        <select class=\"form-control\" id=\"cd-destino\"><option value=\"\">— (mapear depois) —</option></select>\n        <div class=\"text-sec mt-16\" style=\"font-size:.8em\">Deixe vazio se ainda não sabe: o item importado cai na Conciliação em vez de receber categoria errada.</div>\n      </div>\n\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\">\n          <label>Ordem</label>\n          <input type=\"number\" class=\"form-control\" id=\"cd-ordem\" placeholder=\"1\">\n        </div>\n        <div class=\"form-group\">\n          <label>Situação</label>\n          <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer;height:40px\">\n            <input type=\"checkbox\" id=\"cd-ativo\" checked style=\"width:auto;margin:0\"> Ativo\n          </label>\n        </div>\n      </div>\n\n      <div class=\"alerta alerta-aviso mb-0\" id=\"cd-aviso-sistema\" style=\"display:none\">\n        Este é um <strong>item do sistema</strong>: há código que depende dele. Você pode editar o nome e desativá-lo, mas não excluí-lo.\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn ghost\" onclick=\"fecharModalG('modal-cad')\">Cancelar</button>\n      <button class=\"btn\" id=\"btn-salvar-cad\" onclick=\"salvarCad()\">Salvar</button>\n    </div>\n  </div>\n</div>\n\n<!-- ===== Modal: regra ===== -->\n<div class=\"modal-backdrop\" id=\"modal-regra\">\n  <div class=\"modal modal-sm\">\n    <div class=\"modal-header\">\n      <h3 id=\"modal-regra-titulo\">Nova regra</h3>\n      <button class=\"modal-close\" onclick=\"fecharModalG('modal-regra')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <input type=\"hidden\" id=\"rg-chave\">\n      <div class=\"form-group\">\n        <label>Palavra-chave <span class=\"req\">*</span></label>\n        <input class=\"form-control\" id=\"rg-palavra\" placeholder=\"ex: DROGASIL\">\n        <div class=\"text-sec mt-16\" style=\"font-size:.8em\">A comparação ignora maiúsculas e acentos dos dois lados.</div>\n      </div>\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\">\n          <label>Tipo de match</label>\n          <select class=\"form-control\" id=\"rg-tipo\" onchange=\"regraTipoTrocado()\">\n            <option value=\"contem\">Contém (a palavra aparece na descrição)</option>\n            <option value=\"regex\">Regex (expressão regular)</option>\n          </select>\n        </div>\n        <div class=\"form-group\">\n          <label>Prioridade</label>\n          <input type=\"number\" class=\"form-control\" id=\"rg-prioridade\" placeholder=\"ex: 10\">\n        </div>\n      </div>\n      <div class=\"alerta alerta-info mb-16\" id=\"aviso-regex\" style=\"display:none\">\n        O padrão é comparado <strong>em MAIÚSCULAS e sem acento</strong> (ex.: use <code>FARMACIA</code>, não <code>farmácia</code>).\n      </div>\n      <div class=\"form-group\">\n        <label>Categoria <span class=\"req\">*</span></label>\n        <select class=\"form-control\" id=\"rg-categoria\" onchange=\"regraCategoriaTrocada()\"><option value=\"\">—</option></select>\n      </div>\n      <div class=\"form-group\">\n        <label>Grupo</label>\n        <input class=\"form-control\" id=\"rg-grupo\" readonly placeholder=\"(automático pela categoria)\">\n      </div>\n      <div class=\"form-group mb-0\">\n        <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer\">\n          <input type=\"checkbox\" id=\"rg-ativo\" checked style=\"width:auto;margin:0\"> Ativa\n        </label>\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn ghost\" onclick=\"fecharModalG('modal-regra')\">Cancelar</button>\n      <button class=\"btn\" id=\"btn-salvar-regra\" onclick=\"salvarRegraUI()\">Salvar</button>\n    </div>\n  </div>\n</div>\n\n<!-- ===== Modal: confirmar exclusão (compartilhado) ===== -->\n<div class=\"modal-backdrop\" id=\"modal-excluir-g\">\n  <div class=\"modal modal-sm\">\n    <div class=\"modal-header danger\">\n      <h3>Excluir</h3>\n      <button class=\"modal-close\" onclick=\"fecharModalG('modal-excluir-g')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <p>Remover <strong id=\"excluir-g-desc\"></strong>? Esta ação não pode ser desfeita.</p>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn ghost\" onclick=\"fecharModalG('modal-excluir-g')\">Cancelar</button>\n      <button class=\"btn danger\" id=\"btn-confirma-excluir-g\" onclick=\"confirmarExclusaoG()\">Excluir</button>\n    </div>\n  </div>\n</div>\n\n<script>\n(function() {\n  var _itens = [];        // todos os cadastros, já resolvidos pelo server\n  var _ix = {};           // id → cadastro\n  var _cats = {};         // metadados de cada `cat` (rótulo, plural, pai)\n  var _emissores = [];    // instituições cujo parser de fatura existe\n  var _usosCat = {};      // categoria normalizada → nº de lançamentos\n  var _regras = [];\n  var _excluir = null;\n\n  window.fecharModalG = function(id) { var e = document.getElementById(id); if (e) e.classList.remove('aberta'); };\n  function abrirModalG(id) { var e = document.getElementById(id); if (e) e.classList.add('aberta'); }\n  function esc(s) { return String(s == null ? '' : s).replace(/[&<>\"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]; }); }\n  function val(id) { var e = document.getElementById(id); return e ? e.value : ''; }\n  function chk(id) { var e = document.getElementById(id); return e ? e.checked : false; }\n  function badgeAtivo(a) { return a ? '<span class=\"badge low\">ativo</span>' : '<span class=\"badge mid\">inativo</span>'; }\n  /** mesma normalização do server (normalize_): MAIÚSCULA, sem acento. */\n  function norm(s) { return String(s == null ? '' : s).normalize('NFD').replace(/[\\u0300-\\u036f]/g, '').toUpperCase().replace(/\\s+/g, ' ').trim(); }\n\n  window.gestaoTab = function(t) {\n    document.querySelectorAll('.tab[data-gtab]').forEach(function(el){ el.classList.toggle('ativa', el.getAttribute('data-gtab') === t); });\n    ['cadastros','regras'].forEach(function(x){\n      var el = document.getElementById('gtab-'+x); if (el) el.classList.toggle('ativa', x === t);\n    });\n  };\n\n  /* ---------- helpers da árvore ---------- */\n  function daCat(cat, pai) {\n    return _itens.filter(function(x){ return x.cat === cat && (pai === undefined || x.pai === pai); })\n      .sort(function(a,b){ return (a.ordem - b.ordem) || (a.valor < b.valor ? -1 : 1); });\n  }\n  function acoesDe(x) {\n    var lixo = x.gov === 'sistema'\n      ? '<button class=\"btn ghost sm\" disabled title=\"Item do sistema: o código depende dele\"><i class=\"fas fa-lock\"></i></button>'\n      : '<button class=\"btn ghost sm\" onclick=\"pedirExclusaoCad(\\'' + x.id + '\\')\" title=\"Excluir\"><i class=\"fas fa-trash\"></i></button>';\n    return '<td class=\"text-center\" data-label=\"Ações\" style=\"white-space:nowrap\">' +\n      '<button class=\"btn ghost sm\" onclick=\"abrirCadastro(\\'' + x.cat + '\\',\\'' + x.pai + '\\',\\'' + x.id + '\\')\" title=\"Editar\"><i class=\"fas fa-pen\"></i></button> ' +\n      lixo + '</td>';\n  }\n  function botaoNovo(cat, paiId, rotulo) {\n    return '<button class=\"btn sm\" onclick=\"abrirCadastro(\\'' + cat + '\\',\\'' + (paiId || '') + '\\',\\'\\')\">' +\n      '<i class=\"fas fa-plus\"></i> ' + esc(rotulo) + '</button>';\n  }\n  function cabecalhoSecao(titulo, ajuda, botao) {\n    return '<div class=\"flex-between mb-16\">' +\n      '<div><strong>' + esc(titulo) + '</strong>' +\n      (ajuda ? '<div class=\"text-sec\" style=\"font-size:.85em\">' + ajuda + '</div>' : '') + '</div>' +\n      (botao || '') + '</div>';\n  }\n  function tabelaVazia(cols, msg) {\n    return '<tr><td colspan=\"' + cols + '\"><div class=\"alerta alerta-info\" style=\"margin:0\">' + esc(msg) + '</div></td></tr>';\n  }\n\n  /* ---------- render da árvore ---------- */\n  window.renderCadastros = function() {\n    var alvo = document.getElementById('cad-arvore');\n    if (!alvo) return;                                   // callback tardio: página já trocou\n    var vazio = document.getElementById('cad-vazio');\n    if (vazio) vazio.style.display = _itens.length ? 'none' : '';\n    alvo.innerHTML = secaoDonos() + secaoFormas() + secaoInstituicoes() + secaoCategorias();\n  };\n\n  function secaoDonos() {\n    var donos = daCat('dono', '');\n    var linhas = donos.length ? donos.map(function(x){\n      return '<tr' + (x.ativo ? '' : ' style=\"opacity:.62\"') + '>' +\n        '<td data-label=\"Dono\"><strong>' + esc(x.valor) + '</strong>' +\n          (x.gov === 'sistema' ? ' <span class=\"badge neutral\">sistema</span>' : '') + '</td>' +\n        '<td data-label=\"Frente\"><span class=\"badge ' + (x.frente === 'PJ' ? 'neutral' : 'low') + '\">' + esc(x.frente || '—') + '</span></td>' +\n        '<td data-label=\"Contas\" class=\"num mono\">' + daCat('conta').filter(function(c){ return c.dono === x.id; }).length + '</td>' +\n        '<td data-label=\"Situação\">' + badgeAtivo(x.ativo) + '</td>' +\n        acoesDe(x) + '</tr>';\n    }).join('') : tabelaVazia(5, 'Nenhum dono cadastrado.');\n    return '<div class=\"card mb-16\">' +\n      cabecalhoSecao('Donos', 'Quem é o titular. A <strong>frente</strong> (PJ/PF) mora aqui — a conta herda a do seu dono.', botaoNovo('dono','','Novo dono')) +\n      '<div style=\"overflow-x:auto\"><table class=\"tracker cardify\"><thead><tr>' +\n      '<th>Dono</th><th>Frente</th><th class=\"num\">Contas</th><th>Situação</th><th class=\"text-center\">Ações</th>' +\n      '</tr></thead><tbody>' + linhas + '</tbody></table></div></div>';\n  }\n\n  function secaoFormas() {\n    var formas = daCat('forma', '');\n    var linhas = formas.length ? formas.map(function(x){\n      var contas = daCat('conta').filter(function(c){ return (c.formas || []).indexOf(x.id) !== -1; });\n      return '<tr' + (x.ativo ? '' : ' style=\"opacity:.62\"') + '>' +\n        '<td data-label=\"Forma\"><strong>' + esc(x.valor) + '</strong>' +\n          (x.gov === 'sistema' ? ' <span class=\"badge neutral\">sistema</span>' : '') + '</td>' +\n        '<td data-label=\"Contas que aceitam\">' + (contas.length\n            ? contas.map(function(c){ return esc(c.valor); }).join(' · ')\n            : '<span class=\"text-sec\">— (nenhuma conta)</span>') + '</td>' +\n        '<td data-label=\"Situação\">' + badgeAtivo(x.ativo) + '</td>' +\n        acoesDe(x) + '</tr>';\n    }).join('') : tabelaVazia(4, 'Nenhuma forma cadastrada.');\n    return '<div class=\"card mb-16\">' +\n      cabecalhoSecao('Formas de pagamento',\n        'Como o gasto foi pago. É uma lista <strong>simples</strong>: forma não é dona de conta — a mesma conta faz PIX, boleto e transferência.',\n        botaoNovo('forma','','Nova forma')) +\n      '<div style=\"overflow-x:auto\"><table class=\"tracker cardify\"><thead><tr>' +\n      '<th>Forma</th><th>Contas que aceitam</th><th>Situação</th><th class=\"text-center\">Ações</th>' +\n      '</tr></thead><tbody>' + linhas + '</tbody></table></div></div>';\n  }\n\n  function secaoInstituicoes() {\n    var insts = daCat('instituicao', '');\n    var h = '<div class=\"card mb-16\">' + cabecalhoSecao('Instituições, contas e mapa',\n      'A instituição é o <strong>nó comum</strong>: é quem manda o arquivo (extrato, fatura, comprovante), quem o sistema consulta para saber <em>como ler</em> a fatura, e a origem do mapa de categorias.',\n      botaoNovo('instituicao','','Nova instituição'));\n    if (!insts.length) return h + '<div class=\"alerta alerta-info\" style=\"margin:0\">Nenhuma instituição cadastrada.</div></div>';\n    h += '</div>';\n\n    h += insts.map(function(inst){\n      var leitor = _emissores.some(function(e){ return norm(e) === norm(inst.valor); })\n        ? '<span class=\"badge low\">lê fatura</span>' : '<span class=\"badge mid\">sem leitor</span>';\n      var contas = daCat('conta', inst.id);\n      var mapas = daCat('mapa', inst.id);\n\n      var b = '<div class=\"card mb-16\"' + (inst.ativo ? '' : ' style=\"opacity:.62\"') + '>' +\n        '<div class=\"flex-between mb-16\"><div><strong style=\"font-size:1.05em\">' + esc(inst.valor) + '</strong> ' + leitor +\n          (inst.gov === 'sistema' ? ' <span class=\"badge neutral\">sistema</span>' : '') +\n          '<div class=\"text-sec\" style=\"font-size:.85em\">' + contas.length + ' conta(s) · ' + mapas.length + ' mapeamento(s)</div></div>' +\n        '<div style=\"display:flex;gap:6px;flex-wrap:wrap\">' +\n          botaoNovo('conta', inst.id, 'Conta') + botaoNovo('mapa', inst.id, 'Mapeamento') +\n          '<button class=\"btn ghost sm\" onclick=\"abrirCadastro(\\'instituicao\\',\\'\\',\\'' + inst.id + '\\')\" title=\"Editar\"><i class=\"fas fa-pen\"></i></button>' +\n          (inst.gov === 'sistema'\n            ? '<button class=\"btn ghost sm\" disabled title=\"Item do sistema\"><i class=\"fas fa-lock\"></i></button>'\n            : '<button class=\"btn ghost sm\" onclick=\"pedirExclusaoCad(\\'' + inst.id + '\\')\" title=\"Excluir\"><i class=\"fas fa-trash\"></i></button>') +\n        '</div></div>';\n\n      b += '<div style=\"overflow-x:auto\"><table class=\"tracker cardify\"><thead><tr>' +\n        '<th>Conta / cartão</th><th>Dono</th><th>Frente</th><th>Formas</th>' +\n        '<th class=\"num\">Fech.</th><th class=\"num\">Venc.</th><th>Situação</th><th class=\"text-center\">Ações</th>' +\n        '</tr></thead><tbody>';\n      b += contas.length ? contas.map(function(c){\n        var dia = function(v){ return v ? ('dia ' + v) : '<span class=\"badge mid\">—</span>'; };\n        return '<tr' + (c.ativo ? '' : ' style=\"opacity:.62\"') + '>' +\n          '<td data-label=\"Conta\"><strong>' + esc(c.valor) + '</strong></td>' +\n          '<td data-label=\"Dono\">' + (c.dono_valor ? esc(c.dono_valor) : '<span class=\"text-sec\">— (empresa)</span>') + '</td>' +\n          '<td data-label=\"Frente\">' + (c.frente ? '<span class=\"badge neutral\">' + esc(c.frente) + '</span>' : '<span class=\"text-sec\">—</span>') + '</td>' +\n          '<td data-label=\"Formas\">' + ((c.formas_valor || []).length\n              ? (c.formas_valor || []).map(function(f){ return esc(f); }).join(' · ')\n              : '<span class=\"text-sec\">todas</span>') + '</td>' +\n          '<td class=\"num mono\" data-label=\"Fechamento\">' + dia(c.dia_fechamento) + '</td>' +\n          '<td class=\"num mono\" data-label=\"Vencimento\">' + dia(c.dia_vencimento) + '</td>' +\n          '<td data-label=\"Situação\">' + badgeAtivo(c.ativo) + '</td>' +\n          acoesDe(c) + '</tr>';\n      }).join('') : tabelaVazia(8, 'Nenhuma conta nesta instituição.');\n      b += '</tbody></table></div>';\n\n      if (mapas.length) {\n        b += '<div class=\"text-sec mt-16\" style=\"font-size:.85em\"><strong>Mapa de categorias</strong> — tradução do que vem no arquivo desta instituição.</div>' +\n          '<div style=\"overflow-x:auto\"><table class=\"tracker cardify\"><thead><tr>' +\n          '<th>Categoria na origem</th><th>Categoria do sistema</th><th>Grupo</th><th>Situação</th><th class=\"text-center\">Ações</th>' +\n          '</tr></thead><tbody>' + mapas.map(function(m){\n            var dest = m.destino ? _ix[m.destino] : null;\n            var grupo = (dest && dest.pai && _ix[dest.pai]) ? _ix[dest.pai].valor : '';\n            return '<tr' + (m.ativo ? '' : ' style=\"opacity:.62\"') + '>' +\n              '<td class=\"mono\" data-label=\"Categoria na origem\">' + esc(m.valor) + '</td>' +\n              '<td data-label=\"Categoria do sistema\">' + (dest ? ('<strong>' + esc(dest.valor) + '</strong>') : '<span class=\"badge high\">não mapeada</span>') + '</td>' +\n              '<td data-label=\"Grupo\">' + (grupo ? esc(grupo) : '<span class=\"text-sec\">—</span>') + '</td>' +\n              '<td data-label=\"Situação\">' + badgeAtivo(m.ativo) + '</td>' +\n              acoesDe(m) + '</tr>';\n          }).join('') + '</tbody></table></div>';\n      }\n      return b + '</div>';\n    }).join('');\n    return h;\n  }\n\n  function secaoCategorias() {\n    var grupos = daCat('grupo', '');\n    var h = '<div class=\"card mb-16\">' + cabecalhoSecao('Grupos e categorias',\n      'Categoria em uso por algum lançamento não pode ser excluída (recategorize antes).',\n      botaoNovo('grupo','','Novo grupo'));\n    if (!grupos.length) return h + '<div class=\"alerta alerta-info\" style=\"margin:0\">Nenhum grupo cadastrado.</div></div>';\n    h += '</div>';\n\n    h += grupos.map(function(g){\n      var cats = daCat('categoria', g.id);\n      var b = '<div class=\"card mb-16\"' + (g.ativo ? '' : ' style=\"opacity:.62\"') + '>' +\n        '<div class=\"flex-between mb-16\"><div><strong style=\"font-size:1.05em\">' + esc(g.valor) + '</strong>' +\n          (g.gov === 'sistema' ? ' <span class=\"badge neutral\">sistema</span>' : '') +\n          '<div class=\"text-sec\" style=\"font-size:.85em\">' + cats.length + ' categoria(s)</div></div>' +\n        '<div style=\"display:flex;gap:6px;flex-wrap:wrap\">' + botaoNovo('categoria', g.id, 'Categoria') +\n          '<button class=\"btn ghost sm\" onclick=\"abrirCadastro(\\'grupo\\',\\'\\',\\'' + g.id + '\\')\" title=\"Editar\"><i class=\"fas fa-pen\"></i></button>' +\n          (g.gov === 'sistema'\n            ? '<button class=\"btn ghost sm\" disabled title=\"Item do sistema\"><i class=\"fas fa-lock\"></i></button>'\n            : '<button class=\"btn ghost sm\" onclick=\"pedirExclusaoCad(\\'' + g.id + '\\')\" title=\"Excluir\"><i class=\"fas fa-trash\"></i></button>') +\n        '</div></div>' +\n        '<div style=\"overflow-x:auto\"><table class=\"tracker cardify\"><thead><tr>' +\n        '<th>Categoria</th><th>Tipo</th><th class=\"num\">Lançamentos</th><th>Situação</th><th class=\"text-center\">Ações</th>' +\n        '</tr></thead><tbody>';\n      b += cats.length ? cats.map(function(c){\n        var usos = _usosCat[norm(c.valor)] || 0;\n        return '<tr' + (c.ativo ? '' : ' style=\"opacity:.62\"') + '>' +\n          '<td data-label=\"Categoria\"><strong>' + esc(c.valor) + '</strong>' +\n            (c.gov === 'sistema' ? ' <span class=\"badge neutral\">sistema</span>' : '') + '</td>' +\n          '<td data-label=\"Tipo\"><span class=\"badge ' + (c.tipo === 'receita' ? 'low' : 'mid') + '\">' + esc(c.tipo || 'despesa') + '</span></td>' +\n          '<td class=\"num mono\" data-label=\"Lançamentos\">' + (usos || '<span class=\"text-sec\">—</span>') + '</td>' +\n          '<td data-label=\"Situação\">' + badgeAtivo(c.ativo) + '</td>' +\n          acoesDe(c) + '</tr>';\n      }).join('') : tabelaVazia(5, 'Nenhuma categoria neste grupo.');\n      return b + '</tbody></table></div></div>';\n    }).join('');\n    return h;\n  }\n\n  /* ---------- modal ÚNICO (os campos aparecem conforme a `cat`) ---------- */\n  var PLACEHOLDER = { dono: 'ex: M&M', instituicao: 'ex: Itaú', conta: 'ex: Itaú PJ M&M',\n                      forma: 'ex: PIX', grupo: 'ex: Comida', categoria: 'ex: Supermercado',\n                      mapa: 'ex: SUPERMERCADO' };\n  var DICA = {\n    instituicao: 'O nome tem de bater com o que o sistema conhece para ler a fatura (ex.: <strong>Inter</strong>). Instituição sem leitor funciona igual — só não importa fatura sozinha.',\n    mapa: 'É o texto <strong>exatamente como vem no arquivo</strong> da instituição (ex.: SUPERMERCADO).'\n  };\n\n  function mostrar(id, sim) { var e = document.getElementById(id); if (e) e.style.display = sim ? '' : 'none'; }\n\n  function preencherSelectCad(id, itens, vazio, sel) {\n    var e = document.getElementById(id); if (!e) return;\n    e.innerHTML = '<option value=\"\">' + esc(vazio) + '</option>' + itens.map(function(x){\n      return '<option value=\"' + esc(x.v) + '\">' + esc(x.t) + '</option>';\n    }).join('');\n    e.value = sel || '';\n  }\n\n  window.abrirCadastro = function(cat, paiId, id) {\n    var x = id ? _ix[id] : null;\n    var meta = _cats[cat] || { rotulo: cat, pai: '' };\n    var t = document.getElementById('modal-cad-titulo'); if (!t) return;\n    t.textContent = (x ? 'Editar ' : 'Novo ') + String(meta.rotulo).toLowerCase();\n    document.getElementById('cd-id').value = x ? x.id : '';\n    document.getElementById('cd-cat').value = cat;\n    document.getElementById('cd-valor').value = x ? x.valor : '';\n    document.getElementById('cd-valor').placeholder = PLACEHOLDER[cat] || '';\n    document.getElementById('label-cd-valor').innerHTML =\n      (cat === 'mapa' ? 'Categoria na origem' : 'Nome') + ' <span class=\"req\">*</span>';\n    document.getElementById('cd-ordem').value = x ? (x.ordem || '') : '';\n    document.getElementById('cd-ativo').checked = x ? !!x.ativo : true;\n\n    var dica = document.getElementById('dica-cd-valor');\n    if (dica) { dica.innerHTML = DICA[cat] || ''; dica.style.display = DICA[cat] ? '' : 'none'; }\n    mostrar('cd-aviso-sistema', !!(x && x.gov === 'sistema'));\n\n    // pai\n    var temPai = !!meta.pai;\n    mostrar('wrap-cd-pai', temPai);\n    if (temPai) {\n      document.getElementById('label-cd-pai').innerHTML =\n        esc(_cats[meta.pai] ? _cats[meta.pai].rotulo : meta.pai) + ' <span class=\"req\">*</span>';\n      preencherSelectCad('cd-pai', daCat(meta.pai, '').map(function(p){ return { v: p.id, t: p.valor }; }),\n                         '—', (x ? x.pai : paiId) || '');\n    }\n\n    // dono\n    mostrar('wrap-cd-frente', cat === 'dono');\n    if (cat === 'dono') document.getElementById('cd-frente').value = (x && x.frente) || 'PF';\n\n    // conta\n    mostrar('wrap-cd-conta', cat === 'conta');\n    if (cat === 'conta') {\n      preencherSelectCad('cd-dono', daCat('dono','').map(function(d){ return { v: d.id, t: d.valor + ' (' + (d.frente||'—') + ')' }; }),\n                         '— (sem dono pessoal / da empresa)', (x && x.dono) || '');\n      var box = document.getElementById('cd-formas');\n      if (box) {\n        var marcadas = (x && x.formas) || [];\n        box.innerHTML = daCat('forma','').map(function(f){\n          return '<label style=\"display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.9em\">' +\n            '<input type=\"checkbox\" class=\"cd-forma-item\" value=\"' + esc(f.id) + '\"' +\n            (marcadas.indexOf(f.id) !== -1 ? ' checked' : '') + ' style=\"width:auto;margin:0\"> ' + esc(f.valor) + '</label>';\n        }).join('') || '<div class=\"text-sec\" style=\"font-size:.85em\">Nenhuma forma cadastrada ainda.</div>';\n      }\n      document.getElementById('cd-fechamento').value = (x && x.dia_fechamento) || '';\n      document.getElementById('cd-vencimento').value = (x && x.dia_vencimento) || '';\n    }\n\n    // categoria\n    mostrar('wrap-cd-tipo', cat === 'categoria');\n    if (cat === 'categoria') document.getElementById('cd-tipo').value = (x && x.tipo) || 'despesa';\n\n    // mapa\n    mostrar('wrap-cd-destino', cat === 'mapa');\n    if (cat === 'mapa') {\n      var sel = document.getElementById('cd-destino');\n      if (sel) {\n        var html = '<option value=\"\">— (mapear depois) —</option>';\n        daCat('grupo','').forEach(function(g){\n          var cats = daCat('categoria', g.id);\n          if (!cats.length) return;\n          html += '<optgroup label=\"' + esc(g.valor) + '\">' + cats.map(function(c){\n            return '<option value=\"' + esc(c.id) + '\">' + esc(c.valor) + '</option>';\n          }).join('') + '</optgroup>';\n        });\n        sel.innerHTML = html; sel.value = (x && x.destino) || '';\n      }\n    }\n\n    abrirModalG('modal-cad');\n  };\n\n  window.salvarCad = function() {\n    var cat = val('cd-cat');\n    var valor = val('cd-valor').trim();\n    if (!valor) { mostrarToast('Informe o nome.', 'aviso'); return; }\n    var meta = _cats[cat] || { pai: '' };\n    if (meta.pai && !val('cd-pai')) { mostrarToast('Escolha ' + (meta.pai === 'grupo' ? 'o grupo.' : 'a instituição.'), 'aviso'); return; }\n    // dias: vazio é válido; preenchido tem de ser 1..31 (o server revalida)\n    if (cat === 'conta') {\n      var erro = null;\n      [['cd-fechamento','fechamento'], ['cd-vencimento','vencimento']].forEach(function(p){\n        var v = val(p[0]).trim();\n        if (v !== '' && !(Number(v) >= 1 && Number(v) <= 31)) erro = 'O dia de ' + p[1] + ' deve estar entre 1 e 31 (ou vazio).';\n      });\n      if (erro) { mostrarToast(erro, 'aviso'); return; }\n    }\n    // O modal é UM só e é reusado entre as `cat`: os campos escondidos guardam o valor do\n    // cadastro aberto ANTES. Por isso o payload é montado por `cat` — mandar `formas` numa\n    // categoria funcionaria (o server ignora o que não é da cat), mas seria uma armadilha\n    // esperando alguém acrescentar um campo lido sem condição.\n    var d = { id: val('cd-id'), cat: cat, valor: valor, pai: meta.pai ? val('cd-pai') : '',\n              ordem: val('cd-ordem'), ativo: chk('cd-ativo') };\n    if (cat === 'dono') d.frente = val('cd-frente');\n    if (cat === 'conta') {\n      d.dono = val('cd-dono');\n      d.formas = [];\n      Array.prototype.forEach.call(document.querySelectorAll('.cd-forma-item'), function(c){ if (c.checked) d.formas.push(c.value); });\n      d.dia_fechamento = val('cd-fechamento').trim();\n      d.dia_vencimento = val('cd-vencimento').trim();\n    }\n    if (cat === 'categoria') d.tipo = val('cd-tipo');\n    if (cat === 'mapa') d.destino = val('cd-destino');\n\n    var btn = document.getElementById('btn-salvar-cad');\n    btn.disabled = true; btn.innerHTML = '<span class=\"spinner-sm\"></span> Salvando…';\n    google.script.run.withSuccessHandler(function(res){\n      btn.disabled = false; btn.textContent = 'Salvar';\n      if (res && res.status === 'sucesso') { mostrarToast(res.mensagem, 'sucesso'); fecharModalG('modal-cad'); carregarCadastros(); }\n      else mostrarToast((res && res.mensagem) || 'Erro ao salvar.', 'erro');\n    }).withFailureHandler(function(err){ btn.disabled = false; btn.textContent = 'Salvar'; mostrarToast('Erro: ' + (err.message||err), 'erro'); })\n      .salvarCadastro(d);\n  };\n\n  window.pedirExclusaoCad = function(id) {\n    var x = _ix[id]; if (!x) return;\n    var meta = _cats[x.cat] || { rotulo: x.cat };\n    _excluir = { fn: 'excluirCadastro', dados: { id: id },\n                 desc: String(meta.rotulo).toLowerCase() + ' \"' + x.valor + '\"', recarrega: 'cadastros' };\n    document.getElementById('excluir-g-desc').textContent = _excluir.desc;\n    abrirModalG('modal-excluir-g');\n  };\n\n  window.carregarCadastros = function() {\n    google.script.run.withSuccessHandler(function(res){\n      var alvo = document.getElementById('cad-arvore');\n      if (!alvo) return;                                 // callback tardio: página já trocou\n      if (!res || res.status !== 'sucesso') {\n        alvo.innerHTML = '<div class=\"alerta alerta-erro\">' + esc((res&&res.mensagem)||'Erro ao carregar.') + '</div>';\n        return;\n      }\n      _itens = res.dados.itens || [];\n      _cats = res.dados.cats || {};\n      _emissores = res.dados.emissores || [];\n      _usosCat = res.dados.usos_categoria || {};\n      _ix = {}; _itens.forEach(function(x){ _ix[x.id] = x; });\n      renderCadastros();\n      preencherSelectCategoriasRegra();                  // as regras escolhem categoria daqui\n    }).withFailureHandler(function(err){\n      var alvo = document.getElementById('cad-arvore');\n      if (alvo) alvo.innerHTML = '<div class=\"alerta alerta-erro\">Erro: ' + esc(err.message||err) + '</div>';\n    }).listarCadastros();\n  };\n\n  /* ---------- Regras ----------\n   * O motor (Categorizador.gs) só entende dois tipos de match: 'contem' e 'regex'.\n   * A chave de identidade da regra é a PALAVRA-CHAVE (ver GestaoController.salvarRegra).\n   */\n  var MATCH_ROTULO = { contem: 'contém', regex: 'regex' };\n\n  window.carregarRegras = function() {\n    google.script.run.withSuccessHandler(function(res){\n      var b = document.getElementById('body-regras');\n      if (!b) return;                                   // callback tardio: página já trocou\n      if (!res || res.status !== 'sucesso') {\n        b.innerHTML = '<tr><td colspan=\"7\"><div class=\"alerta alerta-erro\">' + esc((res&&res.mensagem)||'Erro ao carregar.') + '</div></td></tr>';\n        return;\n      }\n      _regras = res.dados.regras || [];                 // já vêm na ordem do motor\n      b.innerHTML = _regras.length ? _regras.map(function(r, i){\n        return '<tr' + (r.ativo ? '' : ' style=\"opacity:.62\"') + '>' +\n          '<td class=\"num mono\" data-label=\"Prioridade\">' + r.prioridade + '</td>' +\n          '<td class=\"mono\" data-label=\"Palavra-chave\"><strong>' + esc(r.palavra_chave) + '</strong></td>' +\n          '<td data-label=\"Match\"><span class=\"badge ' + (r.tipo_match === 'regex' ? 'mid' : 'low') + '\">' + esc(MATCH_ROTULO[r.tipo_match] || r.tipo_match) + '</span></td>' +\n          '<td data-label=\"Categoria\">' + (r.categoria ? esc(r.categoria) : '<span class=\"badge high\">sem categoria</span>') + '</td>' +\n          '<td data-label=\"Grupo\">' + (r.grupo ? esc(r.grupo) : '<span class=\"text-sec\">—</span>') + '</td>' +\n          '<td data-label=\"Situação\">' + badgeAtivo(r.ativo) + '</td>' +\n          '<td class=\"text-center\" data-label=\"Ações\" style=\"white-space:nowrap\">' +\n            '<button class=\"btn ghost sm\" onclick=\"abrirModalRegra(' + i + ')\" title=\"Editar\"><i class=\"fas fa-pen\"></i></button> ' +\n            '<button class=\"btn ghost sm\" onclick=\"pedirExclusaoRegra(' + i + ')\" title=\"Excluir\"><i class=\"fas fa-trash\"></i></button></td>' +\n          '</tr>';\n      }).join('') : '<tr><td colspan=\"7\"><div class=\"alerta alerta-info\">Nenhuma regra cadastrada.</div></td></tr>';\n    }).withFailureHandler(function(err){\n      var b = document.getElementById('body-regras');\n      if (b) b.innerHTML = '<tr><td colspan=\"7\"><div class=\"alerta alerta-erro\">Erro: ' + esc(err.message||err) + '</div></td></tr>';\n    }).listarRegras();\n  };\n\n  /** O select da regra guarda o NOME da categoria (a aba Regras é por nome, não por id). */\n  function preencherSelectCategoriasRegra() {\n    var sel = document.getElementById('rg-categoria');\n    if (!sel) return;\n    var atual = sel.value;\n    var html = '<option value=\"\">—</option>';\n    daCat('grupo','').forEach(function(g){\n      var cats = daCat('categoria', g.id);\n      if (!cats.length) return;\n      html += '<optgroup label=\"' + esc(g.valor) + '\">' + cats.map(function(c){\n        return '<option value=\"' + esc(c.valor) + '\" data-grupo=\"' + esc(g.valor) + '\">' + esc(c.valor) + '</option>';\n      }).join('') + '</optgroup>';\n    });\n    sel.innerHTML = html; sel.value = atual;\n  }\n\n  /** Grupo é AUTOMÁTICO pela categoria (o server confirma na gravação). */\n  window.regraCategoriaTrocada = function() {\n    var g = document.getElementById('rg-grupo');\n    var sel = document.getElementById('rg-categoria');\n    if (!g || !sel) return;\n    var op = sel.options[sel.selectedIndex];\n    g.value = op ? (op.getAttribute('data-grupo') || '') : '';\n  };\n\n  /** Regex é comparado já normalizado (MAIÚSCULO, sem acento) — avisa quem for escrever. */\n  window.regraTipoTrocado = function() {\n    var a = document.getElementById('aviso-regex');\n    if (a) a.style.display = (val('rg-tipo') === 'regex') ? '' : 'none';\n  };\n\n  window.abrirModalRegra = function(i) {\n    var r = (i === null || i === undefined) ? null : _regras[i];\n    var t = document.getElementById('modal-regra-titulo'); if (!t) return;\n    t.textContent = r ? 'Editar regra' : 'Nova regra';\n    preencherSelectCategoriasRegra();\n    document.getElementById('rg-chave').value = r ? r.palavra_chave : '';   // palavra ORIGINAL (renomear)\n    document.getElementById('rg-palavra').value = r ? r.palavra_chave : '';\n    document.getElementById('rg-tipo').value = r ? r.tipo_match : 'contem';\n    document.getElementById('rg-prioridade').value = r ? r.prioridade : 10;\n    document.getElementById('rg-categoria').value = r ? (r.categoria || '') : '';\n    document.getElementById('rg-ativo').checked = r ? !!r.ativo : true;\n    regraCategoriaTrocada();\n    regraTipoTrocado();\n    abrirModalG('modal-regra');\n  };\n\n  window.salvarRegraUI = function() {\n    var palavra = val('rg-palavra').trim(), categoria = val('rg-categoria');\n    if (!palavra) { mostrarToast('Informe a palavra-chave.', 'aviso'); return; }\n    if (!categoria) { mostrarToast('Escolha a categoria.', 'aviso'); return; }\n    var btn = document.getElementById('btn-salvar-regra');\n    btn.disabled = true; btn.innerHTML = '<span class=\"spinner-sm\"></span> Salvando…';\n    google.script.run.withSuccessHandler(function(res){\n      btn.disabled = false; btn.textContent = 'Salvar';\n      if (res && res.status === 'sucesso') { mostrarToast(res.mensagem, 'sucesso'); fecharModalG('modal-regra'); carregarRegras(); }\n      else mostrarToast((res && res.mensagem) || 'Erro ao salvar.', 'erro');\n    }).withFailureHandler(function(err){ btn.disabled = false; btn.textContent = 'Salvar'; mostrarToast('Erro: ' + (err.message||err), 'erro'); })\n      .salvarRegra({ chave: val('rg-chave'), palavra_chave: palavra, tipo_match: val('rg-tipo'),\n                     prioridade: val('rg-prioridade'), categoria: categoria, ativo: chk('rg-ativo') });\n  };\n\n  window.pedirExclusaoRegra = function(i) {\n    var r = _regras[i]; if (!r) return;\n    _excluir = { fn: 'excluirRegra', dados: { palavra_chave: r.palavra_chave },\n                 desc: 'a regra \"' + r.palavra_chave + '\" → ' + r.categoria, recarrega: 'regras' };\n    document.getElementById('excluir-g-desc').textContent = _excluir.desc;\n    abrirModalG('modal-excluir-g');\n  };\n\n  /* ---------- Exclusão (compartilhada) ---------- */\n  window.confirmarExclusaoG = function() {\n    if (!_excluir) return;\n    var alvo = _excluir;\n    var btn = document.getElementById('btn-confirma-excluir-g');\n    btn.disabled = true; btn.innerHTML = '<span class=\"spinner-sm\"></span> Excluindo…';\n    var runner = google.script.run.withSuccessHandler(function(res){\n      btn.disabled = false; btn.textContent = 'Excluir';\n      if (res && res.status === 'sucesso') {\n        mostrarToast(res.mensagem, 'sucesso');\n        fecharModalG('modal-excluir-g');\n        if (alvo.recarrega === 'cadastros') carregarCadastros(); else carregarRegras();\n      } else mostrarToast((res && res.mensagem) || 'Erro ao excluir.', 'erro');\n    }).withFailureHandler(function(err){ btn.disabled = false; btn.textContent = 'Excluir'; mostrarToast('Erro: ' + (err.message||err), 'erro'); });\n    runner[alvo.fn](alvo.dados);\n  };\n\n  // boot — DUAS chamadas ao servidor (antes eram cinco)\n  carregarCadastros();\n  carregarRegras();\n})();\n<\/script>\n","Conciliacao":"<!-- Conciliacao.html — B.3: fila do que o import não categorizou + importadores.\n     Padrão do projeto: .tabs/.tab-content, .card, .tracker.cardify, .kpi-row, .modal,\n     .badge, .dz-zone — tudo do CSS_Master (sem CSS paralelo). -->\n<div class=\"fade-in\">\n  <div class=\"section-head\"><h2>Conciliação</h2></div>\n\n  <div class=\"tabs\">\n    <div class=\"tab ativa\" data-ctab=\"pendentes\" onclick=\"concTab('pendentes')\"><i class=\"fas fa-inbox\"></i> Pendentes <span class=\"badge neutral\" id=\"cc-badge-pend\">0</span></div>\n    <div class=\"tab\" data-ctab=\"duplicatas\" onclick=\"concTab('duplicatas')\"><i class=\"fas fa-clone\"></i> Duplicatas <span class=\"badge neutral\" id=\"cc-badge-dup\">0</span></div>\n    <div class=\"tab\" data-ctab=\"manuais\" onclick=\"concTab('manuais')\"><i class=\"fas fa-image\"></i> Leitura manual <span class=\"badge neutral\" id=\"cc-badge-man\">0</span></div>\n    <div class=\"tab\" data-ctab=\"importar\" onclick=\"concTab('importar')\"><i class=\"fas fa-file-import\"></i> Importar</div>\n  </div>\n\n  <!-- ===== PENDENTES ===== -->\n  <div class=\"tab-content ativa\" id=\"ctab-pendentes\">\n    <div class=\"kpi-row mb-16\" id=\"cc-kpis\"></div>\n    <div class=\"flex-between mb-16\">\n      <div class=\"text-sec\" style=\"font-size:.85em\">Lançamentos importados que ficaram <strong>sem categoria</strong> (ou em \"A classificar\").\n        Ao confirmar, a decisão <strong>vira regra</strong> — a próxima importação já acerta sozinha.</div>\n      <div class=\"flex gap-8\">\n        <select class=\"form-control\" id=\"cc-f-origem\" onchange=\"carregarConciliacao()\" style=\"width:auto\"><option value=\"\">Todas as origens</option></select>\n        <button class=\"btn ghost sm\" onclick=\"carregarConciliacao()\"><i class=\"fas fa-rotate\"></i></button>\n      </div>\n    </div>\n    <div class=\"card\"><div style=\"overflow-x:auto\">\n      <table class=\"tracker cardify\">\n        <thead><tr><th>Data</th><th>Descrição</th><th class=\"num\">Valor</th><th>Origem</th><th>Sugestão</th><th class=\"text-center\">Ações</th></tr></thead>\n        <tbody id=\"body-pendentes\"><tr><td colspan=\"6\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div></div>\n  </div>\n\n  <!-- ===== DUPLICATAS (transparência) ===== -->\n  <div class=\"tab-content\" id=\"ctab-duplicatas\">\n    <div class=\"alerta alerta-info mb-16\"><i class=\"fas fa-circle-info\"></i>\n      O que o importador <strong>descartou</strong> por já existir no sistema, e o motivo de cada descarte.\n      Nada aqui foi gravado em Lançamentos — está listado para você poder auditar.</div>\n    <div class=\"card\"><div style=\"overflow-x:auto\">\n      <table class=\"tracker cardify\">\n        <thead><tr><th>Quando</th><th>Origem</th><th>Arquivo</th><th>Data</th><th>Descrição</th><th class=\"num\">Valor</th><th>Motivo do descarte</th></tr></thead>\n        <tbody id=\"body-duplicatas\"><tr><td colspan=\"7\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div></div>\n  </div>\n\n  <!-- ===== PENDENTES DE LEITURA MANUAL (PNGs) ===== -->\n  <div class=\"tab-content\" id=\"ctab-manuais\">\n    <div class=\"alerta alerta-aviso mb-16\"><i class=\"fas fa-triangle-exclamation\"></i>\n      Comprovantes em <strong>imagem</strong> (PNG/JPG): o sistema <strong>não</strong> tenta adivinhar o valor —\n      não há leitura automática de imagem. Abra o arquivo e lance à mão em Pessoal.</div>\n    <div class=\"card\"><div style=\"overflow-x:auto\">\n      <table class=\"tracker cardify\">\n        <thead><tr><th>Quando</th><th>Arquivo</th><th>Motivo</th><th class=\"text-center\">Abrir</th></tr></thead>\n        <tbody id=\"body-manuais\"><tr><td colspan=\"4\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div></div>\n    <div id=\"cc-erros-wrap\" style=\"display:none;margin-top:18px\">\n      <div class=\"section-head\"><h3 style=\"font-size:1em\">Ilegíveis</h3></div>\n      <div class=\"card\"><div style=\"overflow-x:auto\">\n        <table class=\"tracker cardify\">\n          <thead><tr><th>Arquivo</th><th>Motivo</th><th class=\"text-center\">Abrir</th></tr></thead>\n          <tbody id=\"body-erros\"></tbody>\n        </table>\n      </div></div>\n    </div>\n  </div>\n\n  <!-- ===== IMPORTAR ===== -->\n  <div class=\"tab-content\" id=\"ctab-importar\">\n    <div class=\"section-head\"><h3 style=\"font-size:1em\">Fatura do cartão (CSV)</h3></div>\n    <div class=\"card card-pad mb-16\">\n      <div class=\"text-sec\" style=\"font-size:.85em;margin-bottom:12px\">CSV da fatura do cartão. O arquivo é lido no seu navegador;\n        só as linhas vão para o sistema. <strong>Analise antes de importar</strong> — o que já existe é descartado como duplicata.</div>\n      <!-- Cartão/Dono NÃO são chumbados: vêm de Gestão → Instrumentos. Cadastrar um cartão\n           novo lá faz ele aparecer aqui sozinho, sem mexer em código. -->\n      <div class=\"form-grid\">\n        <div class=\"form-group\"><label>Cartão</label>\n          <select class=\"form-control\" id=\"fi-instr\"><option value=\"\">detectar pelo arquivo</option></select></div>\n        <div class=\"form-group\"><label>Mês da fatura (opcional)</label><input type=\"month\" class=\"form-control\" id=\"fi-mes\"></div>\n      </div>\n      <div id=\"fi-deteccao\"></div>\n      <div class=\"dz-zone\" id=\"fi-dz\" onclick=\"document.getElementById('fi-file').click()\">\n        <i class=\"fas fa-file-csv\"></i>\n        <div><strong>Toque para escolher o CSV</strong> ou arraste o arquivo aqui</div>\n        <div class=\"text-sec\" id=\"fi-arquivo\" style=\"margin-top:6px;font-size:.85em\">nenhum arquivo selecionado</div>\n      </div>\n      <input type=\"file\" id=\"fi-file\" accept=\".csv,text/csv\" style=\"display:none\" onchange=\"fiArquivoSelecionado(this.files)\">\n      <div id=\"fi-previa\" style=\"margin-top:14px\"></div>\n      <div class=\"flex gap-8\" style=\"margin-top:14px;justify-content:flex-end\">\n        <button class=\"btn ghost\" id=\"fi-btn-analisar\" onclick=\"fiAnalisar()\" disabled><i class=\"fas fa-magnifying-glass\"></i> Analisar</button>\n        <button class=\"btn\" id=\"fi-btn-importar\" onclick=\"fiImportar()\" disabled><i class=\"fas fa-file-import\"></i> Importar</button>\n      </div>\n    </div>\n\n    <div class=\"section-head\"><h3 style=\"font-size:1em\">Comprovantes (Drive)</h3></div>\n    <div class=\"card card-pad\">\n      <div class=\"text-sec\" style=\"font-size:.85em;margin-bottom:12px\">Lê a pasta <span class=\"mono\">Comprovantes de Pagamento/{M&amp;M|PFs}/{ano}/{Mês}</span>.\n        O Drive é <strong>somente leitura</strong> — nada é criado, movido ou renomeado. PDFs são lidos no navegador; imagens ficam para lançamento manual.</div>\n      <div class=\"form-grid\">\n        <div class=\"form-group\"><label>Frente</label><select class=\"form-control\" id=\"cp-frente\"><option value=\"PFs\">PFs</option><option value=\"M&M\">M&amp;M</option></select></div>\n        <div class=\"form-group\"><label>Mês</label><input type=\"month\" class=\"form-control\" id=\"cp-mes\"></div>\n        <div class=\"form-group\" style=\"display:flex;align-items:flex-end\"><button class=\"btn ghost\" onclick=\"cpListar()\"><i class=\"fas fa-folder-open\"></i> Listar</button></div>\n      </div>\n      <div id=\"cp-lista\" style=\"margin-top:12px\"></div>\n      <div class=\"flex gap-8\" style=\"margin-top:14px;justify-content:flex-end\">\n        <button class=\"btn ghost\" id=\"cp-btn-analisar\" onclick=\"cpAnalisar()\" disabled><i class=\"fas fa-magnifying-glass\"></i> Ler e analisar</button>\n        <button class=\"btn\" id=\"cp-btn-importar\" onclick=\"cpImportar()\" disabled><i class=\"fas fa-file-import\"></i> Importar</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- ===== Modal: conciliar ===== -->\n<div class=\"modal-backdrop\" id=\"modal-conc\"><div class=\"modal\">\n  <div class=\"modal-header\"><h3>Categorizar lançamento</h3><button class=\"modal-close\" onclick=\"fecharModalC('modal-conc')\">&times;</button></div>\n  <div class=\"modal-body\">\n    <input type=\"hidden\" id=\"cc-id\">\n    <div class=\"card card-pad mb-16\" style=\"background:var(--blue-50)\">\n      <div style=\"font-weight:700\" id=\"cc-desc\"></div>\n      <div class=\"text-sec\" style=\"font-size:.85em;margin-top:4px\" id=\"cc-meta\"></div>\n    </div>\n    <div id=\"cc-sug-box\"></div>\n    <div class=\"form-group\">\n      <label>Categoria <span class=\"req\">*</span></label>\n      <select class=\"form-control\" id=\"cc-categoria\" onchange=\"ccCategoriaTrocada()\"></select>\n    </div>\n    <div id=\"cc-nova-wrap\" style=\"display:none\">\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\"><label>Nome da categoria nova <span class=\"req\">*</span></label><input class=\"form-control\" id=\"cc-nova-cat\" placeholder=\"ex: Academia\"></div>\n        <div class=\"form-group\"><label>Grupo <span class=\"req\">*</span></label><input class=\"form-control\" id=\"cc-nova-grupo\" list=\"cc-grupos\" placeholder=\"ex: Saúde\"><datalist id=\"cc-grupos\"></datalist></div>\n      </div>\n    </div>\n    <div class=\"form-group\">\n      <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer\">\n        <input type=\"checkbox\" id=\"cc-criar-regra\" checked style=\"width:auto;margin:0\" onchange=\"ccRegraToggle()\">\n        Transformar esta decisão em <strong>regra</strong> (a próxima importação acerta sozinha)\n      </label>\n    </div>\n    <div id=\"cc-regra-wrap\">\n      <div class=\"form-group\">\n        <label>Palavra-chave da regra</label>\n        <input class=\"form-control\" id=\"cc-palavra\" oninput=\"ccPreviewRegra()\" placeholder=\"ex: VINDI\">\n        <div class=\"text-sec\" style=\"font-size:.8em;margin-top:5px\" id=\"cc-preview\">Se esta palavra aparecer na descrição, o lançamento recebe a categoria.</div>\n      </div>\n      <div class=\"form-group mb-0\">\n        <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer\">\n          <input type=\"checkbox\" id=\"cc-semelhantes\" style=\"width:auto;margin:0\">\n          Aplicar também aos <strong id=\"cc-qtd-sem\">0</strong> pendente(s) semelhante(s)\n        </label>\n      </div>\n    </div>\n  </div>\n  <div class=\"modal-footer\">\n    <button class=\"btn ghost\" onclick=\"fecharModalC('modal-conc')\">Cancelar</button>\n    <button class=\"btn\" id=\"cc-btn-salvar\" onclick=\"ccSalvar()\">Confirmar</button>\n  </div>\n</div></div>\n\n<script>\n(function() {\n  var _dados = null, _pend = [], _cats = [], _grupos = [], _atual = null;\n  var PDFJS_URL = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';\n  var PDFJS_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';\n\n  function esc(s) { return String(s == null ? '' : s).replace(/[&<>\"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]; }); }\n  function val(id) { var e = document.getElementById(id); return e ? e.value : ''; }\n  function chk(id) { var e = document.getElementById(id); return e ? e.checked : false; }\n  function fmtR$(n) { return 'R$ ' + (Number(n)||0).toFixed(2).replace('.', ',').replace(/\\B(?=(\\d{3})+(?!\\d))/g, '.'); }\n  function fmtData(d) { var m = String(d||'').match(/^(\\d{4})-(\\d{2})-(\\d{2})/); return m ? (m[3]+'/'+m[2]+'/'+m[1]) : esc(d||''); }\n  function online() { return !(typeof navigator !== 'undefined' && navigator.onLine === false); }\n  window.fecharModalC = function(id) { var e = document.getElementById(id); if (e) e.classList.remove('aberta'); };\n  function abrirModalC(id) { var e = document.getElementById(id); if (e) e.classList.add('aberta'); }\n\n  window.concTab = function(t) {\n    document.querySelectorAll('.tab[data-ctab]').forEach(function(el){ el.classList.toggle('ativa', el.getAttribute('data-ctab') === t); });\n    ['pendentes','duplicatas','manuais','importar'].forEach(function(x){\n      var el = document.getElementById('ctab-'+x); if (el) el.classList.toggle('ativa', x === t);\n    });\n    // os cartões do select vêm do cadastro (Gestão → Instrumentos); carrega ao abrir a aba\n    if (t === 'importar' && !(_fiCartoes && _fiCartoes.length) && online()) fiCarregarCartoes();\n  };\n\n  /* ==================== PENDENTES ==================== */\n  window.carregarConciliacao = function() {\n    google.script.run.withSuccessHandler(function(res){\n      var b = document.getElementById('body-pendentes');\n      if (!b) return;                       // callback tardio: a página já trocou\n      if (!res || res.status !== 'sucesso') {\n        b.innerHTML = '<tr><td colspan=\"6\"><div class=\"alerta alerta-erro\">' + esc((res&&res.mensagem)||'Erro ao carregar.') + '</div></td></tr>';\n        return;\n      }\n      _dados = res.dados; _pend = _dados.pendentes || []; _cats = _dados.categorias || []; _grupos = _dados.grupos || [];\n      renderKpis(); renderPendentes(); renderDuplicatas(); renderManuais(); renderFiltroOrigem();\n    }).withFailureHandler(function(e){\n      var b = document.getElementById('body-pendentes');\n      if (b) b.innerHTML = '<tr><td colspan=\"6\"><div class=\"alerta alerta-erro\">' + esc(e&&e.message||e) + '</div></td></tr>';\n    }).obterConciliacao({ origem: val('cc-f-origem') });\n  };\n\n  function renderKpis() {\n    var t = _dados.totais || {};\n    var el = document.getElementById('cc-kpis'); if (!el) return;\n    el.innerHTML =\n      '<div class=\"kpi\"><div class=\"kpi-label\">Pendentes</div><div class=\"kpi-value\">' + (t.pendentes||0) + '</div></div>' +\n      '<div class=\"kpi\"><div class=\"kpi-label\">Valor pendente</div><div class=\"kpi-value\">' + fmtR$(t.valor_pendente) + '</div></div>' +\n      '<div class=\"kpi\"><div class=\"kpi-label\">Com sugestão</div><div class=\"kpi-value\">' + (t.com_sugestao||0) + '</div></div>' +\n      '<div class=\"kpi\"><div class=\"kpi-label\">Duplicatas suprimidas</div><div class=\"kpi-value\">' + (t.duplicatas||0) + '</div></div>';\n    var bp = document.getElementById('cc-badge-pend'); if (bp) bp.textContent = t.pendentes||0;\n    var bd = document.getElementById('cc-badge-dup'); if (bd) bd.textContent = t.duplicatas||0;\n    var bm = document.getElementById('cc-badge-man'); if (bm) bm.textContent = t.pendentes_manuais||0;\n  }\n\n  function renderFiltroOrigem() {\n    var s = document.getElementById('cc-f-origem'); if (!s) return;\n    var atual = s.value;\n    s.innerHTML = '<option value=\"\">Todas as origens</option>' +\n      (_dados.origens||[]).map(function(o){ return '<option value=\"'+esc(o)+'\">'+esc(o)+'</option>'; }).join('');\n    s.value = atual;\n  }\n\n  function renderPendentes() {\n    var b = document.getElementById('body-pendentes'); if (!b) return;\n    if (!_pend.length) {\n      b.innerHTML = '<tr><td colspan=\"6\"><div class=\"alerta alerta-info\" style=\"margin:0\"><i class=\"fas fa-circle-check\"></i> Nada pendente — tudo categorizado.</div></td></tr>';\n      return;\n    }\n    b.innerHTML = _pend.map(function(p, i){\n      var sug = p.sugestao;\n      var sugHtml = sug\n        ? '<span class=\"badge ' + (sug.origem === 'regra' ? 'low' : 'mid') + '\" title=\"' + esc(sug.origem === 'regra' ? ('regra: ' + sug.base) : ('parecido com: ' + sug.base)) + '\">' +\n          esc(sug.categoria) + ' · ' + Math.round(sug.confianca * 100) + '%</span>'\n        : '<span class=\"text-sec\" style=\"font-size:.85em\">—</span>';\n      var btnConfirmar = sug\n        ? '<button class=\"btn sm\" onclick=\"ccConfirmarSugestao(' + i + ')\" title=\"Confirmar a sugestão\"><i class=\"fas fa-check\"></i></button> '\n        : '';\n      return '<tr>' +\n        '<td data-label=\"Data\">' + fmtData(p.data) + '</td>' +\n        '<td data-label=\"Descrição\" data-full=\"' + esc(p.descricao) + '\"><span class=\"mono\" style=\"font-size:.85em\">' + esc(String(p.descricao).trim()) + '</span></td>' +\n        '<td class=\"num\" data-label=\"Valor\">' + fmtR$(p.valor) + '</td>' +\n        '<td data-label=\"Origem\"><span class=\"badge neutral\">' + esc(p.origem||'—') + '</span></td>' +\n        '<td data-label=\"Sugestão\">' + sugHtml + '</td>' +\n        '<td class=\"text-center\" data-label=\"Ações\" style=\"white-space:nowrap\">' + btnConfirmar +\n          '<button class=\"btn ghost sm\" onclick=\"ccAbrir(' + i + ')\" title=\"Escolher categoria\"><i class=\"fas fa-pen\"></i></button></td>' +\n        '</tr>';\n    }).join('');\n  }\n\n  function renderDuplicatas() {\n    var b = document.getElementById('body-duplicatas'); if (!b) return;\n    var d = _dados.duplicatas || [];\n    if (!d.length) { b.innerHTML = '<tr><td colspan=\"7\"><div class=\"text-sec\" style=\"padding:8px\">Nenhuma duplicata suprimida até agora.</div></td></tr>'; return; }\n    b.innerHTML = d.map(function(x){\n      return '<tr>' +\n        '<td data-label=\"Quando\">' + fmtData(x.quando) + '</td>' +\n        '<td data-label=\"Origem\"><span class=\"badge neutral\">' + esc(x.origem) + '</span></td>' +\n        '<td data-label=\"Arquivo\" data-full=\"' + esc(x.arquivo) + '\"><span style=\"font-size:.85em\">' + esc(x.arquivo) + '</span></td>' +\n        '<td data-label=\"Data\">' + fmtData(x.data) + '</td>' +\n        '<td data-label=\"Descrição\" data-full=\"' + esc(x.descricao) + '\">' + esc(String(x.descricao).trim()) + '</td>' +\n        '<td class=\"num\" data-label=\"Valor\">' + fmtR$(x.valor) + '</td>' +\n        '<td data-label=\"Motivo\"><span class=\"badge mid\">' + esc(x.motivo) + '</span></td>' +\n        '</tr>';\n    }).join('');\n  }\n\n  function renderManuais() {\n    var b = document.getElementById('body-manuais'); if (!b) return;\n    var m = _dados.pendentes_manuais || [];\n    b.innerHTML = m.length ? m.map(function(x){\n      return '<tr>' +\n        '<td data-label=\"Quando\">' + fmtData(x.quando) + '</td>' +\n        '<td data-label=\"Arquivo\" data-full=\"' + esc(x.arquivo) + '\">' + esc(x.arquivo) + '</td>' +\n        '<td data-label=\"Motivo\"><span class=\"badge mid\">' + esc(x.motivo) + '</span></td>' +\n        '<td class=\"text-center\" data-label=\"Abrir\">' + (x.url ? '<a class=\"btn ghost sm\" target=\"_blank\" rel=\"noopener\" href=\"' + esc(x.url) + '\"><i class=\"fas fa-up-right-from-square\"></i></a>' : '—') + '</td>' +\n        '</tr>';\n    }).join('') : '<tr><td colspan=\"4\"><div class=\"text-sec\" style=\"padding:8px\">Nada pendente de leitura manual.</div></td></tr>';\n\n    var er = _dados.erros || [];\n    var wrap = document.getElementById('cc-erros-wrap');\n    var be = document.getElementById('body-erros');\n    if (wrap) wrap.style.display = er.length ? 'block' : 'none';\n    if (be && er.length) {\n      be.innerHTML = er.map(function(x){\n        return '<tr><td data-label=\"Arquivo\">' + esc(x.arquivo) + '</td><td data-label=\"Motivo\">' + esc(x.motivo) + '</td>' +\n          '<td class=\"text-center\" data-label=\"Abrir\">' + (x.url ? '<a class=\"btn ghost sm\" target=\"_blank\" rel=\"noopener\" href=\"' + esc(x.url) + '\"><i class=\"fas fa-up-right-from-square\"></i></a>' : '—') + '</td></tr>';\n      }).join('');\n    }\n  }\n\n  /* ==================== MODAL: conciliar ==================== */\n  function preencherCategorias(sel) {\n    var s = document.getElementById('cc-categoria'); if (!s) return;\n    s.innerHTML = '<option value=\"\">— escolha —</option>' +\n      _cats.map(function(c){ return '<option value=\"' + esc(c.categoria) + '\">' + esc(c.categoria) + (c.grupo ? (' (' + esc(c.grupo) + ')') : '') + '</option>'; }).join('') +\n      '<option value=\"__nova__\">➕ Criar categoria nova…</option>';\n    if (sel) s.value = sel;\n    var dl = document.getElementById('cc-grupos');\n    if (dl) dl.innerHTML = _grupos.map(function(g){ return '<option value=\"' + esc(g) + '\">'; }).join('');\n  }\n\n  window.ccCategoriaTrocada = function() {\n    var w = document.getElementById('cc-nova-wrap');\n    if (w) w.style.display = (val('cc-categoria') === '__nova__') ? 'block' : 'none';\n  };\n  window.ccRegraToggle = function() {\n    var w = document.getElementById('cc-regra-wrap');\n    if (w) w.style.display = chk('cc-criar-regra') ? 'block' : 'none';\n  };\n\n  window.ccAbrir = function(i) {\n    var p = _pend[i]; if (!p) return;\n    _atual = p;\n    document.getElementById('cc-id').value = p.id;\n    document.getElementById('cc-desc').textContent = String(p.descricao).trim();\n    document.getElementById('cc-meta').textContent =\n      fmtData(p.data) + ' · ' + fmtR$(p.valor) + ' · ' + (p.origem||'—') + (p.instrumento ? (' · ' + p.instrumento) : '');\n    preencherCategorias(p.sugestao ? p.sugestao.categoria : '');\n    ccCategoriaTrocada();\n    var sb = document.getElementById('cc-sug-box');\n    sb.innerHTML = p.sugestao\n      ? '<div class=\"alerta alerta-info\"><i class=\"fas fa-lightbulb\"></i> Sugestão: <strong>' + esc(p.sugestao.categoria) + '</strong> (' +\n        Math.round(p.sugestao.confianca*100) + '%) — ' + (p.sugestao.origem === 'regra' ? 'pela regra' : 'parecido com') +\n        ' <span class=\"mono\" style=\"font-size:.85em\">' + esc(String(p.sugestao.base).trim()) + '</span></div>'\n      : '<div class=\"alerta alerta-aviso\"><i class=\"fas fa-circle-question\"></i> Sem sugestão — nada parecido no histórico. Escolha a categoria.</div>';\n    document.getElementById('cc-palavra').value = p.palavra_chave || '';\n    document.getElementById('cc-criar-regra').checked = true;\n    document.getElementById('cc-semelhantes').checked = false;\n    document.getElementById('cc-qtd-sem').textContent = p.semelhantes || 0;\n    ccRegraToggle();\n    ccPreviewRegra();\n    abrirModalC('modal-conc');\n  };\n\n  window.ccConfirmarSugestao = function(i) {\n    var p = _pend[i]; if (!p || !p.sugestao) return;\n    enviar({ id: p.id, categoria: p.sugestao.categoria, criar_regra: true, palavra_chave: p.palavra_chave }, null);\n  };\n\n  var _tPrev = null;\n  window.ccPreviewRegra = function() {\n    var el = document.getElementById('cc-preview'); if (!el) return;\n    var palavra = val('cc-palavra').trim();\n    if (!palavra) { el.textContent = 'Sem palavra-chave, a decisão vale só para este lançamento.'; return; }\n    clearTimeout(_tPrev);\n    _tPrev = setTimeout(function(){\n      google.script.run.withSuccessHandler(function(res){\n        var e2 = document.getElementById('cc-preview'); if (!e2) return;   // modal já fechou\n        if (!res || res.status !== 'sucesso' || !res.dados) { e2.textContent = ''; return; }\n        var d = res.dados;\n        e2.innerHTML = 'Esta palavra-chave pega <strong>' + d.total + '</strong> lançamento(s): ' +\n          d.pendentes + ' pendente(s) e ' + d.ja_categorizados + ' já categorizado(s).' +\n          (d.ja_categorizados ? ' <span class=\"text-sec\">(os já categorizados não são alterados)</span>' : '');\n      }).withFailureHandler(function(){}).previewRegraConciliacao({ palavra_chave: palavra });\n    }, 350);\n  };\n\n  window.ccSalvar = function() {\n    var cat = val('cc-categoria');\n    if (!cat) { mostrarToast('Escolha a categoria.', 'aviso'); return; }\n    var d = { id: val('cc-id'), criar_regra: chk('cc-criar-regra'),\n              palavra_chave: chk('cc-criar-regra') ? val('cc-palavra').trim() : '',\n              aplicar_semelhantes: chk('cc-semelhantes') };\n    if (cat === '__nova__') {\n      var nova = val('cc-nova-cat').trim(), grupo = val('cc-nova-grupo').trim();\n      if (!nova) { mostrarToast('Informe o nome da categoria nova.', 'aviso'); return; }\n      if (!grupo) { mostrarToast('Informe o grupo da categoria nova.', 'aviso'); return; }\n      d.categoria = nova; d.grupo = grupo; d.criar_categoria = true;\n    } else {\n      d.categoria = cat;\n    }\n    enviar(d, document.getElementById('cc-btn-salvar'));\n  };\n\n  function enviar(d, btn) {\n    if (btn) { btn.disabled = true; btn.innerHTML = '<span class=\"spinner-sm\"></span> Salvando…'; }\n    google.script.run.withSuccessHandler(function(res){\n      if (btn) { btn.disabled = false; btn.textContent = 'Confirmar'; }\n      if (!res || res.status !== 'sucesso') { mostrarToast((res&&res.mensagem)||'Erro ao salvar', 'erro'); return; }\n      mostrarToast(res.mensagem || 'Conciliado.', 'sucesso');\n      fecharModalC('modal-conc');\n      carregarConciliacao();\n    }).withFailureHandler(function(e){\n      if (btn) { btn.disabled = false; btn.textContent = 'Confirmar'; }\n      mostrarToast('Erro: ' + (e&&e.message?e.message:e), 'erro');\n    }).resolverConciliacao(d);\n  }\n\n  /* ==================== pdf.js (lazy, CDN pinado — igual ao extrato) ==================== */\n  function carregarPdfJs() {\n    return new Promise(function(resolve, reject){\n      if (window.pdfjsLib) { resolve(window.pdfjsLib); return; }\n      var s = document.createElement('script');\n      s.src = PDFJS_URL;\n      s.onload = function(){\n        if (!window.pdfjsLib) { reject(new Error('leitor de PDF não inicializou')); return; }\n        try { window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER; } catch(e) {}\n
