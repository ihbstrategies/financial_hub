<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Financial Hub</title>
  <meta charset="utf-8">
  <!-- CSS_Master.html — Design system compartilhado (incluído via <?!= include('CSS_Master') ?>).
     Base visual: tracker de investimentos IHB (paleta bandeira de Israel + acentos de risco,
     tipografia Instrument Serif / Manrope / JetBrains Mono). Usado por TODO o sistema. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  /* Israeli flag core */
  --il-blue:#0038B8; --il-white:#FFFFFF;
  /* Blue family */
  --blue-900:#001F66; --blue-700:#002C8C; --blue-600:#0038B8; --blue-500:#2E5DCB;
  --blue-400:#5A82DA; --blue-300:#9DB6E8; --blue-200:#CEDDF3; --blue-100:#E6EEF9; --blue-50:#F2F6FC;
  /* Neutrals */
  --bg:#F8F9FB; --bg-soft:#FCFCFD; --surface:#FFFFFF; --line:#E4E8EE; --line-strong:#C8D0DB;
  --ink-900:#0B1426; --ink-700:#2A3548; --ink-500:#5A6678; --ink-400:#7D8898; --ink-300:#A8B0BD;
  /* Risk accents */
  --risk-low:#16A34A;  --risk-low-bg:#E7F7EC;  --risk-low-line:#BBEACB;
  --risk-mid:#D97706;  --risk-mid-bg:#FEF4DC;  --risk-mid-line:#F8DCA0;
  --risk-high:#DC2626; --risk-high-bg:#FDECEC; --risk-high-line:#F6BFBF;
  /* Spacing / radius / shadow */
  --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:24px; --s-6:32px; --s-7:48px; --s-8:64px;
  --radius:10px; --radius-sm:6px; --radius-lg:14px;
  --shadow-sm:0 1px 2px rgba(11,20,38,.04),0 1px 3px rgba(11,20,38,.06);
  --shadow:0 4px 16px rgba(0,56,184,.06),0 1px 3px rgba(11,20,38,.05);
  --shadow-lg:0 12px 32px rgba(0,56,184,.10),0 2px 6px rgba(11,20,38,.06);

  /* Aliases de compatibilidade (nomes usados em páginas) */
  --azul:#0038B8; --azul-escuro:#002C8C; --azul-profundo:#001F66; --azul-claro:#5A82DA; --azul-palido:#E6EEF9;
  --branco:#fff; --texto:#0B1426; --texto-sec:#5A6678; --borda:#E4E8EE; --fundo:#F8F9FB;
  --verde:#16A34A; --amarelo:#D97706; --vermelho:#DC2626;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--ink-900);
  font-family: 'Manrope', system-ui, -apple-system, sans-serif;
  font-size: 14px; line-height: 1.5; font-feature-settings: 'ss01','cv11'; -webkit-font-smoothing: antialiased;
}
input, textarea, select, button { font-family: inherit; }
a { color: var(--il-blue); text-decoration: none; }
h1, h2, h3 { color: var(--ink-900); }

/* ---------- Botões ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
  border-radius: var(--radius-sm); background: var(--il-blue); color: #fff; border: none;
  font-size: 12px; font-weight: 600; letter-spacing: .02em; cursor: pointer;
  transition: all .15s ease; box-shadow: var(--shadow-sm);
}
.btn:hover:not(:disabled) { background: var(--blue-700); transform: translateY(-1px); box-shadow: var(--shadow); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn.ghost   { background: transparent; color: var(--il-blue); border: 1px solid var(--blue-200); box-shadow: none; }
.btn.ghost:hover { background: var(--blue-50); border-color: var(--blue-300); }
.btn.verde   { background: var(--risk-low); } .btn.verde:hover { background: #128a3e; }
.btn.danger  { background: var(--risk-high); } .btn.danger:hover { background: #b91c1c; }
.btn.lg { padding: 11px 20px; font-size: 13px; } .btn.sm { padding: 5px 10px; font-size: 11px; }

/* ---------- KPI ---------- */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px,1fr)); gap: var(--s-4); }
.kpi {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
  padding: var(--s-4) var(--s-4) var(--s-5); position: relative; overflow: hidden;
}
.kpi::before { content:''; position: absolute; top:0; left:0; right:0; height:3px; background: var(--il-blue); }
.kpi.r-low::before  { background: var(--risk-low); }
.kpi.r-mid::before  { background: var(--risk-mid); }
.kpi.r-high::before { background: var(--risk-high); }
.kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: .15em; color: var(--ink-500); font-weight: 700; margin-bottom: var(--s-3); }
.kpi-value { font-family: 'Instrument Serif', serif; font-size: 30px; line-height: 1; color: var(--ink-900); font-weight: 400; letter-spacing: -.01em; }
.kpi-value .unit { font-family: 'Manrope', sans-serif; font-size: 14px; color: var(--ink-500); font-weight: 500; margin-left: 4px; }
.kpi-foot { margin-top: var(--s-3); font-size: 11px; color: var(--ink-500); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.kpi-target { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; background: var(--blue-50); color: var(--blue-700); }
.kpi-target.r-low  { background: var(--risk-low-bg);  color: var(--risk-low); }
.kpi-target.r-mid  { background: var(--risk-mid-bg);  color: var(--risk-mid); }
.kpi-target.r-high { background: var(--risk-high-bg); color: var(--risk-high); }

/* ---------- Section / Card ---------- */
.section { margin-bottom: var(--s-6); }
.section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: var(--s-4); gap: var(--s-4); flex-wrap: wrap; }
.section-head h2 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 22px; letter-spacing: -.01em; }
.section-head h2 .num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--blue-600); font-weight: 600; margin-right: 8px; vertical-align: middle; padding: 2px 6px; background: var(--blue-50); border-radius: 4px; }
.section-head .note { font-size: 11px; color: var(--ink-500); }
.card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
.card-pad { padding: var(--s-5); }

/* ---------- Tabela ---------- */
table.tracker { width: 100%; border-collapse: collapse; font-size: 13px; }
table.tracker thead th {
  background: var(--blue-50); color: var(--ink-700); font-size: 10px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; text-align: left;
  padding: var(--s-3) var(--s-4); border-bottom: 1px solid var(--line); white-space: nowrap;
}
table.tracker tbody td { padding: var(--s-3) var(--s-4); border-bottom: 1px solid var(--line); vertical-align: middle; }
table.tracker tbody tr:nth-child(even) { background: var(--bg-soft); }
table.tracker tbody tr:last-child td { border-bottom: none; }
table.tracker tbody tr:hover { background: var(--blue-50); }
td.num, th.num { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; text-align: right; font-size: 12px; }
td.veh { font-weight: 600; color: var(--ink-900); }
td.veh .ticker { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-500); margin-left: 6px; font-weight: 500; }
td.thesis { color: var(--ink-500); font-size: 12px; }
tr.row-total td { background: var(--blue-100); font-weight: 700; color: var(--blue-900); border-top: 2px solid var(--blue-300); }

/* ---------- Badges ---------- */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; border: 1px solid transparent; }
.badge::before { content:''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; }
.badge.low  { background: var(--risk-low-bg);  color: var(--risk-low);  border-color: var(--risk-low-line); }  .badge.low::before  { background: var(--risk-low); }
.badge.mid  { background: var(--risk-mid-bg);  color: var(--risk-mid);  border-color: var(--risk-mid-line); }  .badge.mid::before  { background: var(--risk-mid); }
.badge.high { background: var(--risk-high-bg); color: var(--risk-high); border-color: var(--risk-high-line); } .badge.high::before { background: var(--risk-high); }
.badge.neutral { background: var(--blue-50); color: var(--blue-700); border-color: var(--blue-200); } .badge.neutral::before { background: var(--blue-600); }
.action-badge { display: inline-flex; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
.action-badge.buy { background: var(--risk-low-bg); color: var(--risk-low); }
.action-badge.reinforce { background: var(--blue-100); color: var(--blue-700); }
.action-badge.hold { background: #F1F3F7; color: var(--ink-500); }
.action-badge.reduce { background: var(--risk-mid-bg); color: var(--risk-mid); }
.action-badge.avoid { background: var(--risk-high-bg); color: var(--risk-high); }

/* ---------- Timeline ---------- */
.timeline { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: var(--s-3); padding: var(--s-5); }
.tl-item { padding: var(--s-3) var(--s-4); border-radius: var(--radius-sm); background: var(--bg-soft); border-left: 3px solid var(--blue-300); }
.tl-item.critical { border-left-color: var(--risk-high); background: var(--risk-high-bg); }
.tl-item.watch { border-left-color: var(--risk-mid); background: var(--risk-mid-bg); }
.tl-item.action { border-left-color: var(--risk-low); background: var(--risk-low-bg); }
.tl-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: var(--ink-700); margin-bottom: 4px; letter-spacing: .04em; }
.tl-title { font-size: 12px; font-weight: 700; color: var(--ink-900); margin-bottom: 2px; line-height: 1.25; }
.tl-desc { font-size: 11px; color: var(--ink-500); line-height: 1.4; }

/* ---------- Thesis cards ---------- */
.thesis-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: var(--s-4); }
.thesis-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: var(--s-5); }
.thesis-card .signal { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; margin-bottom: var(--s-3); }
.thesis-card .signal .dot { width: 8px; height: 8px; border-radius: 50%; }
.thesis-card.green .signal { color: var(--risk-low); } .thesis-card.green .signal .dot { background: var(--risk-low); box-shadow: 0 0 0 4px var(--risk-low-bg); }
.thesis-card.amber .signal { color: var(--risk-mid); } .thesis-card.amber .signal .dot { background: var(--risk-mid); box-shadow: 0 0 0 4px var(--risk-mid-bg); }
.thesis-card.red   .signal { color: var(--risk-high); } .thesis-card.red .signal .dot { background: var(--risk-high); box-shadow: 0 0 0 4px var(--risk-high-bg); }
.thesis-card.blue  .signal { color: var(--blue-600); } .thesis-card.blue .signal .dot { background: var(--blue-600); box-shadow: 0 0 0 4px var(--blue-100); }
.thesis-card h3 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 18px; margin-bottom: 8px; }
.thesis-card p { font-size: 12px; color: var(--ink-500); line-height: 1.5; }
.thesis-card .meta { margin-top: var(--s-3); padding-top: var(--s-3); border-top: 1px dashed var(--line); display: flex; justify-content: space-between; font-size: 11px; }
.thesis-card .meta span:first-child { color: var(--ink-400); }
.thesis-card .meta span:last-child { font-family: 'JetBrains Mono', monospace; color: var(--ink-700); font-weight: 600; }

/* ---------- Legend ---------- */
.legend { display: flex; gap: var(--s-5); padding: var(--s-4) var(--s-5); background: var(--bg-soft); border: 1px dashed var(--line); border-radius: var(--radius); margin-top: var(--s-3); flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--ink-500); }
.legend-swatch { width: 14px; height: 14px; border-radius: 4px; }

/* ---------- Formulários ---------- */
.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: var(--s-4); }
.form-group label { font-size: 11px; font-weight: 700; color: var(--ink-700); text-transform: uppercase; letter-spacing: .05em; }
.form-group label .req { color: var(--risk-high); margin-left: 2px; }
.form-control { border: 1px solid var(--line-strong); border-radius: var(--radius-sm); padding: 9px 11px; font-size: 13px; color: var(--ink-900); width: 100%; background: #fff; transition: border-color .15s, box-shadow .15s; }
.form-control:focus { outline: none; border-color: var(--il-blue); box-shadow: 0 0 0 3px rgba(0,56,184,.12); }
.form-control[readonly] { background: #f8f9fa; color: #666; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: var(--s-4); }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-4); }

/* ---------- Modal ---------- */
.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(11,20,38,.5); z-index: 1000; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
.modal-backdrop.aberta { display: flex; }
.modal { background: #fff; border-radius: var(--radius-lg); width: 100%; max-width: 760px; box-shadow: var(--shadow-lg); animation: slideUp .2s ease; overflow: hidden; margin: auto; }
.modal-sm { max-width: 460px; } .modal-lg { max-width: 980px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; background: linear-gradient(135deg, var(--blue-600), var(--blue-900)); color: #fff; }
.modal-header h3 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 19px; color: #fff; }
.modal-header.danger { background: linear-gradient(135deg, var(--risk-high), #991b1b); }
.modal-close { background: none; border: none; color: #fff; font-size: 1.3em; cursor: pointer; padding: 2px 7px; border-radius: 4px; }
.modal-close:hover { background: rgba(255,255,255,.2); }
.modal-body { padding: 22px; max-height: 72vh; overflow-y: auto; }
.modal-footer { padding: 14px 22px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; }

/* ---------- Toast ---------- */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: #fff; border-radius: var(--radius-sm); padding: 12px 16px; box-shadow: var(--shadow-lg); font-size: 13px; display: flex; align-items: center; gap: 10px; min-width: 260px; max-width: 380px; animation: slideUp .2s ease; }
.toast.sucesso { border-left: 4px solid var(--risk-low); } .toast.sucesso i { color: var(--risk-low); }
.toast.erro    { border-left: 4px solid var(--risk-high); } .toast.erro i { color: var(--risk-high); }
.toast.aviso   { border-left: 4px solid var(--risk-mid); } .toast.aviso i { color: var(--risk-mid); }

/* ---------- Tabs ---------- */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 18px; flex-wrap: wrap; }
.tab { padding: 9px 16px; cursor: pointer; font-weight: 600; font-size: 13px; color: var(--ink-500); border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.ativa { color: var(--il-blue); border-bottom-color: var(--il-blue); }
.tab-content { display: none; } .tab-content.ativa { display: block; }

/* ---------- Drop zone ---------- */
.dz-zone { border: 2px dashed var(--blue-300); border-radius: var(--radius); padding: 28px; text-align: center; color: var(--ink-500); background: var(--blue-50); cursor: pointer; transition: background .15s, border-color .15s; }
.dz-zone:hover, .dz-zone.dz-over { background: var(--blue-100); border-color: var(--il-blue); }
.dz-zone i { font-size: 1.8em; color: var(--il-blue); margin-bottom: 8px; }

/* ---------- Alertas ---------- */
.alerta { padding: 13px 16px; border-radius: var(--radius-sm); font-size: 13px; }
.alerta-erro  { background: var(--risk-high-bg); color: #991b1b; border: 1px solid var(--risk-high-line); }
.alerta-info  { background: var(--blue-50); color: var(--blue-900); border: 1px solid var(--blue-200); }
.alerta-aviso { background: var(--risk-mid-bg); color: #92400e; border: 1px solid var(--risk-mid-line); }

/* ---------- Utilitários ---------- */
.text-sec { color: var(--ink-500); } .text-right { text-align: right; } .text-center { text-align: center; }
.mt-0{margin-top:0}.mb-0{margin-bottom:0}.mt-16{margin-top:16px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.flex { display: flex; } .flex-between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; }
.mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
.serif { font-family: 'Instrument Serif', serif; font-weight: 400; }

/* ---------- Animações ---------- */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideUp { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.fade-in { animation: slideUp .22s ease; }
.spinner-sm { display: inline-block; width: 15px; height: 15px; border: 2px solid #ddd; border-top-color: var(--il-blue); border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; }
.loader { border: 5px solid var(--blue-100); border-top: 5px solid var(--il-blue); border-radius: 50%; width: 44px; height: 44px; animation: spin 1.1s linear infinite; margin: 48px auto; }

/* ============ MOBILE / responsivo ============ */
@media (max-width: 768px) {
  html, body { font-size: 13.5px; }
  .card-pad { padding: var(--s-4); }
  /* tabelas largas passam a ROLAR na horizontal dentro do card (antes: overflow hidden = cortava) */
  .card { overflow: auto; -webkit-overflow-scrolling: touch; }
  /* KPIs 2-up e mais baixos */
  .kpi-row { grid-template-columns: repeat(auto-fit, minmax(148px,1fr)); gap: var(--s-3); }
  .kpi { padding: var(--s-3) var(--s-3) var(--s-4); }
  .kpi-value { font-size: 24px; }
  /* cabeçalho de seção empilha */
  .section { margin-bottom: var(--s-5); }
  .section-head { flex-direction: column; align-items: flex-start; gap: 4px; margin-bottom: var(--s-3); }
  .section-head h2 { font-size: 19px; }
  /* formulários em 1 coluna */
  .form-grid, .form-grid-2 { grid-template-columns: 1fr; gap: var(--s-3); }
  /* tabelas compactas + 1ª coluna fixa ao rolar */
  table.tracker { font-size: 12px; }
  table.tracker thead th, table.tracker tbody td { padding: var(--s-2) var(--s-3); }
  td.num, th.num { font-size: 11px; }
  table.tracker thead th:first-child,
  table.tracker tbody td:first-child { position: sticky; left: 0; z-index: 2; background: var(--surface); box-shadow: 1px 0 0 var(--line); }
  table.tracker thead th:first-child { background: var(--blue-50); }
  table.tracker tbody tr:nth-child(even) td:first-child { background: var(--bg-soft); }
  tr.row-total td:first-child { background: var(--blue-100); }
  /* alvos de toque maiores */
  .btn { padding: 10px 15px; font-size: 12px; }
  .btn.sm { padding: 7px 11px; font-size: 11px; }
  .tabs { gap: 2px; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { padding: 10px 13px; font-size: 12px; white-space: nowrap; }
  /* modal ocupa a tela inteira */
  .modal-backdrop { padding: 0; align-items: stretch; overflow: hidden; }
  .modal, .modal-sm, .modal-lg { max-width: 100%; width: 100%; min-height: 100vh; min-height: 100dvh; border-radius: 0; margin: 0; display: flex; flex-direction: column; }
  .modal-header { padding: calc(14px + env(safe-area-inset-top)) 16px 14px; position: sticky; top: 0; z-index: 3; }
  .modal-body { max-height: none; flex: 1 1 auto; padding: 16px; }
  .modal-footer { padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); position: sticky; bottom: 0; background: #fff; }
  /* toast largura cheia embaixo */
  #toast-container { left: 12px; right: 12px; bottom: 12px; }
  .toast { min-width: 0; max-width: none; }
  /* linhas flex quebram */
  .flex-between { flex-wrap: wrap; }

  /* ---------- Card-ificação (.cardify): cada linha da tabela vira um cartão ---------- */
  table.cardify, table.cardify tbody { display: block; }
  table.cardify thead { display: none; }
  table.cardify tbody tr {
    display: flex; flex-direction: column;
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    margin-bottom: 10px; padding: 6px 12px; box-shadow: var(--shadow-sm);
  }
  table.cardify tbody tr:last-child { margin-bottom: 0; }
  /* célula = linha rótulo → valor; anula bordas verticais herdadas/inline (ex.: border-left de grupos) */
  table.cardify tbody td {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    padding: 7px 0;
    border-top: none !important; border-left: none !important; border-right: none !important;
  }
  table.cardify tbody td, table.cardify tbody tr:last-child td { border-bottom: 1px dashed var(--line); }
  table.cardify tbody td:last-child, table.cardify tbody tr:last-child td:last-child { border-bottom: none; }
  table.cardify tbody td[data-label]::before {
    content: attr(data-label);
    font-family: 'Manrope', system-ui, sans-serif; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em; color: var(--ink-500);
    text-align: left; flex-shrink: 0;
  }
  /* célula sem rótulo (ex.: ações): conteúdo alinhado à direita */
  table.cardify tbody td:not([data-label]):not([data-full]) { justify-content: flex-end; }
  /* célula-título do cartão (data-full): vem primeiro, maior, sem rótulo */
  table.cardify tbody td[data-full] { display: block; order: -1; font-size: 14px; font-weight: 700; padding: 8px 0 7px; }
  table.cardify tbody td[data-full]::before { content: none; }
  /* linhas de mensagem (loader/alerta, colspan) ocupam a largura toda */
  table.cardify tbody td[colspan] { display: block; }
  /* sem zebra/hover e sem 1ª coluna sticky em cartões */
  table.tracker.cardify tbody tr:nth-child(even), table.tracker.cardify tbody tr:hover { background: var(--surface); }
  table.tracker.cardify thead th:first-child,
  table.tracker.cardify tbody td:first-child,
  table.tracker.cardify tbody tr:nth-child(even) td:first-child { position: static; box-shadow: none; background: transparent; }
  /* linha de total = cartão destacado */
  table.tracker.cardify tbody tr.row-total { background: var(--blue-100); border-color: var(--blue-300); }
  table.tracker.cardify tbody tr.row-total td, table.tracker.cardify tbody tr.row-total td:first-child { background: transparent; }
  /* container .card some atrás dos cartões (fallback sem :has(): tabela ganha respiro interno) */
  .card table.cardify { padding: 8px; }
  .card:has(table.cardify) { border: none; background: transparent; overflow: visible; }
  .card:has(table.cardify) table.cardify { padding: 0; }
}
@media (max-width: 400px) {
  .kpi-row { grid-template-columns: 1fr 1fr; }

}

<script>window.__FH_PAGES={"Dashboard":"<!-- Dashboard.html — Visão geral de Faturamento (empresa). navegarPara('Dashboard'). -->\n<div class=\"fade-in\">\n  <div class=\"section-head\">\n    <h2>Dashboard · Financeiro e Tributos</h2>\n    <span class=\"note text-sec\">Gastos pessoais entram depois, com os lançamentos PF.</span>\n  </div>\n\n  <div class=\"tabs\">\n    <div class=\"tab ativa\" data-dtab=\"fat\" onclick=\"dashTab('fat')\"><i class=\"fas fa-file-invoice-dollar\"></i> Faturamento</div>\n    <div class=\"tab\" data-dtab=\"fluxo\" onclick=\"dashTab('fluxo')\"><i class=\"fas fa-building-columns\"></i> Fluxo de Caixa</div>\n  </div>\n\n  <div class=\"tab-content ativa\" id=\"dtab-fat\">\n\n  <div class=\"card card-pad mb-16\">\n    <div class=\"form-grid\" style=\"align-items:end\">\n      <div class=\"form-group mb-0\"><label>Dono</label><select class=\"form-control\" id=\"f-dono\" onchange=\"onDono()\"><option value=\"\">Todos</option><option>Tuto</option><option>Francesca</option></select></div>\n      <div class=\"form-group mb-0\"><label>Fonte</label><select class=\"form-control\" id=\"f-fonte\" onchange=\"aplicar()\"><option value=\"\">Todas</option></select></div>\n      <div class=\"form-group mb-0\"><label>Regime</label><select class=\"form-control\" id=\"f-regime\" onchange=\"aplicar()\"><option value=\"\">Todos</option><option value=\"PJ\">PJ</option><option value=\"CLT\">CLT</option><option value=\"Lucros\">Lucros</option></select></div>\n      <div class=\"form-group mb-0\"><label>De (mês)</label><input type=\"month\" class=\"form-control\" id=\"f-de\" onchange=\"aplicar()\"></div>\n      <div class=\"form-group mb-0\"><label>Até (mês)</label><input type=\"month\" class=\"form-control\" id=\"f-ate\" onchange=\"aplicar()\"></div>\n    </div>\n    <div class=\"flex gap-8 mt-16\" style=\"flex-wrap:wrap\">\n      <button class=\"btn ghost sm\" onclick=\"presetUlt12()\"><i class=\"fas fa-clock-rotate-left\"></i> Últimos 12m</button>\n      <button class=\"btn ghost sm\" onclick=\"presetYTD()\"><i class=\"fas fa-calendar-day\"></i> YTD (ano corrente)</button>\n      <button class=\"btn ghost sm\" onclick=\"limpar()\" style=\"margin-left:auto\"><i class=\"fas fa-eraser\"></i> Limpar</button>\n    </div>\n  </div>\n\n  <div class=\"kpi-row mb-24\" id=\"dash-kpis\"><div class=\"loader\"></div></div>\n\n  <div class=\"section\">\n    <div class=\"section-head\"><h2><span class=\"num\">01</span>Evolução mensal <span class=\"text-sec\" style=\"font-size:.55em;font-weight:400\">· por mês de emissão</span></h2><span class=\"note text-sec\" id=\"dash-mes-nota\"></span></div>\n    <div class=\"card card-pad\"><div id=\"dash-mes\"><div class=\"loader\"></div></div></div>\n  </div>\n\n  <div class=\"section\">\n    <div class=\"section-head\"><h2><span class=\"num\">02</span>A Receber por mês <span class=\"text-sec\" style=\"font-size:.55em;font-weight:400\">· curva de caixa</span></h2></div>\n    <div class=\"card card-pad\"><div id=\"dash-receb\"><div class=\"loader\"></div></div></div>\n  </div>\n\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px\">\n    <div class=\"section\">\n      <div class=\"section-head\"><h2><span class=\"num\">03</span>Concentração por fonte</h2></div>\n      <div class=\"card card-pad\"><div id=\"dash-fonte\" class=\"text-sec\">carregando…</div></div>\n    </div>\n    <div class=\"section\">\n      <div class=\"section-head\"><h2><span class=\"num\">04</span>Por dono</h2></div>\n      <div class=\"card card-pad\"><div id=\"dash-dono\" class=\"text-sec\">carregando…</div></div>\n    </div>\n  </div>\n\n  </div><!-- /dtab-fat -->\n\n  <div class=\"tab-content\" id=\"dtab-fluxo\">\n    <div class=\"card card-pad\">\n      <div class=\"alerta alerta-info\">\n        <strong>Em construção.</strong> Esta aba vai mostrar os indicadores do <strong>fluxo de caixa real</strong> da empresa,\n        a partir dos extratos consolidados mensais do banco (PDF) — comparando real × projetado.\n        Envie 1 PDF de exemplo para calibrarmos o leitor.\n      </div>\n    </div>\n  </div>\n</div>\n\n<script>\n(function() {\n  var _fontes = [], _competencias = [];\n\n  window.dashTab = function(t){\n    document.querySelectorAll('.tab[data-dtab]').forEach(function(el){ el.classList.toggle('ativa', el.getAttribute('data-dtab')===t); });\n    ['fat','fluxo'].forEach(function(x){ document.getElementById('dtab-'+x).classList.toggle('ativa', x===t); });\n  };\n  function mesAtual(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }\n  function shiftMes(ym,delta){ var p=String(ym).split('-'); var d=new Date(Number(p[0]),Number(p[1])-1+delta,1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }\n  // Paleta categórica — cores distintas ao olho, ancoradas no azul da marca\n  var PALETA = ['#0038B8','#17A2B8','#7E5C9C','#E0A100','#16A34A','#EC6608','#5A82DA','#B23A82','#0E7490','#64748B'];\n  var MESNOME = {'01':'Jan','02':'Fev','03':'Mar','04':'Abr','05':'Mai','06':'Jun','07':'Jul','08':'Ago','09':'Set','10':'Out','11':'Nov','12':'Dez'};\n\n  function fmt(n){ return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }\n  function fmtK(n){ n=Number(n)||0; if(Math.abs(n)>=1000000) return 'R$ '+(n/1000000).toLocaleString('pt-BR',{maximumFractionDigits:1})+'M'; if(Math.abs(n)>=1000) return 'R$ '+(n/1000).toLocaleString('pt-BR',{maximumFractionDigits:0})+'k'; return 'R$ '+n.toFixed(0); }\n  function esc(s){ return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c];}); }\n  function pctf(n){ return (Number(n)||0).toFixed(1).replace('.',',')+'%'; }\n  function seta(v){ return v>0.05?'<span style=\"color:var(--risk-low)\">▲ '+pctf(v)+'</span>':(v<-0.05?'<span style=\"color:var(--risk-high)\">▼ '+pctf(Math.abs(v))+'</span>':'– estável'); }\n  function kpi(label, valor, foot){ return '<div class=\"kpi\"><div class=\"kpi-label\">'+label+'</div><div class=\"kpi-value\">'+valor+'</div>'+(foot?'<div class=\"kpi-foot\">'+foot+'</div>':'')+'</div>'; }\n\n  // ---------- tooltip próprio (segue o cursor; lê data-tip do elemento) ----------\n  function ensureTip(){\n    var t=document.getElementById('dash-tip');\n    if(!t){ t=document.createElement('div'); t.id='dash-tip';\n      t.style.cssText='position:fixed;display:none;z-index:99999;background:#0B1426;color:#fff;padding:7px 11px;border-radius:7px;font-size:12px;line-height:1.4;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.28);max-width:260px';\n      document.body.appendChild(t);\n    }\n    return t;\n  }\n  function bindTips(el){\n    if(!el) return; var box=ensureTip();\n    el.onmousemove=function(e){\n      var tip=(e.target&&e.target.getAttribute)?e.target.getAttribute('data-tip'):null;\n      if(tip){ box.innerHTML=tip; box.style.display='block'; var x=e.clientX+14, y=e.clientY+14; if(x+270>window.innerWidth) x=e.clientX-260; box.style.left=x+'px'; box.style.top=y+'px'; }\n      else box.style.display='none';\n    };\n    el.onmouseleave=function(){ box.style.display='none'; };\n  }\n\n  // ---------- gráfico de área multi-série (tooltips + valores por série) ----------\n  // cfg = { gid, xKey, series:[{key,cor,label,area,dash}], showValues }\n  function areaChart(data, cfg){\n    if(!data.length) return '<div class=\"alerta alerta-info\">Sem dados no filtro atual.</div>';\n    var W=720,H=250,padL=50,padR=12,padT=22,padB=28, S=cfg.series;\n    var max=Math.max.apply(null,[1].concat(data.map(function(d){ return Math.max.apply(null,S.map(function(s){return Number(d[s.key])||0;})); })));\n    var n=data.length, iw=W-padL-padR, ih=H-padT-padB;\n    function X(i){ return padL+(n<=1?iw/2:(i/(n-1))*iw); }\n    function Y(v){ return padT+ih-((Number(v)||0)/max)*ih; }\n    function lp(k){ return data.map(function(d,i){return (i?'L':'M')+X(i).toFixed(1)+','+Y(d[k]).toFixed(1);}).join(' '); }\n    function tipAt(i){ var d=data[i]; return '<strong>'+esc(String(d[cfg.xKey]))+'</strong>'+S.map(function(s){return '<br>'+esc(s.label)+': '+esc(fmt(d[s.key]));}).join(''); }\n\n    var grid='';\n    for(var g=0;g<=4;g++){ var gy=padT+(g/4)*ih, gv=max*(1-g/4); grid+='<line x1=\"'+padL+'\" y1=\"'+gy.toFixed(1)+'\" x2=\"'+(W-padR)+'\" y2=\"'+gy.toFixed(1)+'\" stroke=\"#E4E8EE\"/><text x=\"'+(padL-6)+'\" y=\"'+(gy+3).toFixed(1)+'\" font-size=\"9\" fill=\"#7D8898\" text-anchor=\"end\">'+fmtK(gv)+'</text>'; }\n    var step=Math.ceil(n/9), xlab='';\n    data.forEach(function(d,i){ if(i%step===0||i===n-1) xlab+='<text x=\"'+X(i).toFixed(1)+'\" y=\"'+(H-8)+'\" font-size=\"9\" fill=\"#7D8898\" text-anchor=\"middle\">'+esc(String(d[cfg.xKey])).slice(-5)+'</text>'; });\n\n    var defs='<defs>'+S.map(function(s,si){ return s.area?('<linearGradient id=\"'+cfg.gid+si+'\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"'+s.cor+'\" stop-opacity=\"0.2\"/><stop offset=\"100%\" stop-color=\"'+s.cor+'\" stop-opacity=\"0\"/></linearGradient>'):''; }).join('')+'</defs>';\n    var areas='', lines='', extras='';\n    S.forEach(function(s,si){\n      if(s.area){ areas+='<path d=\"M'+X(0).toFixed(1)+','+(padT+ih)+' '+data.map(function(d,i){return 'L'+X(i).toFixed(1)+','+Y(d[s.key]).toFixed(1);}).join(' ')+' L'+X(n-1).toFixed(1)+','+(padT+ih)+' Z\" fill=\"url(#'+cfg.gid+si+')\"/>'; }\n      lines+='<path d=\"'+lp(s.key)+'\" fill=\"none\" stroke=\"'+s.cor+'\" stroke-width=\"'+(s.width||(s.area?2.2:1.8))+'\"'+(s.dash?' stroke-dasharray=\"4 3\"':'')+' stroke-linejoin=\"round\"/>';\n      var dy = (si%2===0) ? -7 : 12;\n      data.forEach(function(d,i){\n        extras+='<circle cx=\"'+X(i).toFixed(1)+'\" cy=\"'+Y(d[s.key]).toFixed(1)+'\" r=\"2.4\" fill=\"'+s.cor+'\"/>';\n        if(cfg.showValues!==false && !s.noLabel && n<=14) extras+='<text x=\"'+X(i).toFixed(1)+'\" y=\"'+(Y(d[s.key])+dy).toFixed(1)+'\" font-size=\"8\" fill=\"'+s.cor+'\" text-anchor=\"middle\">'+fmtK(d[s.key])+'</text>';\n        extras+='<circle cx=\"'+X(i).toFixed(1)+'\" cy=\"'+Y(d[s.key]).toFixed(1)+'\" r=\"9\" fill=\"transparent\" style=\"cursor:pointer\" data-tip=\"'+tipAt(i)+'\"></circle>';\n      });\n    });\n    var leg='<div class=\"flex gap-12 mt-16\" style=\"font-size:.8em;color:var(--ink-500)\">'+S.map(function(s){ return '<span><span style=\"display:inline-block;width:12px;'+(s.dash?'height:0;border-top:2px dashed '+s.cor:'height:3px;background:'+s.cor+';border-radius:2px')+';vertical-align:middle\"></span> '+esc(s.label)+'</span>'; }).join('')+'</div>';\n    return '<svg viewBox=\"0 0 '+W+' '+H+'\" style=\"width:100%;height:auto\">'+defs+grid+areas+lines+extras+xlab+'</svg>'+leg;\n  }\n\n  // ---------- área EMPILHADA (composição por dono + linha do total) ----------\n  // cfg = { gid, xKey, series:[{key,cor,label}], showValues }\n  function stackedArea(data, cfg){\n    if(!data.length) return '<div class=\"alerta alerta-info\">Sem dados no filtro atual.</div>';\n    var W=720,H=250,padL=50,padR=12,padT=22,padB=28, S=cfg.series;\n    function cum(i,upto){ var a=0; for(var k=0;k<upto;k++) a+=Number(data[i][S[k].key])||0; return a; }\n    var max=Math.max.apply(null,[1].concat(data.map(function(d,i){ return cum(i,S.length); })));\n    var n=data.length, iw=W-padL-padR, ih=H-padT-padB;\n    function X(i){ return padL+(n<=1?iw/2:(i/(n-1))*iw); }\n    function Y(v){ return padT+ih-((Number(v)||0)/max)*ih; }\n\n    var grid='';\n    for(var g=0;g<=4;g++){ var gy=padT+(g/4)*ih, gv=max*(1-g/4); grid+='<line x1=\"'+padL+'\" y1=\"'+gy.toFixed(1)+'\" x2=\"'+(W-padR)+'\" y2=\"'+gy.toFixed(1)+'\" stroke=\"#E4E8EE\"/><text x=\"'+(padL-6)+'\" y=\"'+(gy+3).toFixed(1)+'\" font-size=\"9\" fill=\"#7D8898\" text-anchor=\"end\">'+fmtK(gv)+'</text>'; }\n    var step=Math.ceil(n/9), xlab='';\n    data.forEach(function(d,i){ if(i%step===0||i===n-1) xlab+='<text x=\"'+X(i).toFixed(1)+'\" y=\"'+(H-8)+'\" font-size=\"9\" fill=\"#7D8898\" text-anchor=\"middle\">'+esc(String(d[cfg.xKey])).slice(-5)+'</text>'; });\n\n    var bands='';\n    S.forEach(function(s,si){\n      var up=data.map(function(d,i){ return X(i).toFixed(1)+','+Y(cum(i,si+1)).toFixed(1); });\n      var path='M'+up.join(' L');\n      for(var i=data.length-1;i>=0;i--) path+=' L'+X(i).toFixed(1)+','+Y(cum(i,si)).toFixed(1);\n      bands+='<path d=\"'+path+' Z\" fill=\"'+s.cor+'\" fill-opacity=\"0.6\"/>';\n    });\n    var totalLine='M'+data.map(function(d,i){ return X(i).toFixed(1)+','+Y(cum(i,S.length)).toFixed(1); }).join(' L');\n    var extras='';\n    data.forEach(function(d,i){\n      var tv=cum(i,S.length);\n      extras+='<circle cx=\"'+X(i).toFixed(1)+'\" cy=\"'+Y(tv).toFixed(1)+'\" r=\"2.6\" fill=\"#0B1426\"/>';\n      if(cfg.showValues!==false && n<=14) extras+='<text x=\"'+X(i).toFixed(1)+'\" y=\"'+(Y(tv)-7).toFixed(1)+'\" font-size=\"8\" fill=\"#0B1426\" text-anchor=\"middle\">'+fmtK(tv)+'</text>';\n      var tip='<strong>'+esc(String(d[cfg.xKey]))+'</strong>'+S.map(function(s){return '<br>'+esc(s.label)+': '+esc(fmt(d[s.key]));}).join('')+'<br><strong>Total: '+esc(fmt(tv))+'</strong>';\n      extras+='<circle cx=\"'+X(i).toFixed(1)+'\" cy=\"'+Y(tv).toFixed(1)+'\" r=\"11\" fill=\"transparent\" style=\"cursor:pointer\" data-tip=\"'+tip+'\"></circle>';\n    });\n    var leg='<div class=\"flex gap-12 mt-16\" style=\"font-size:.8em;color:var(--ink-500)\">'+S.map(function(s){return '<span><span style=\"display:inline-block;width:12px;height:10px;background:'+s.cor+';opacity:.6;vertical-align:middle;border-radius:2px\"></span> '+esc(s.label)+'</span>';}).join('')+'<span><span style=\"display:inline-block;width:12px;height:3px;background:#0B1426;vertical-align:middle;border-radius:2px\"></span> Total</span></div>';\n    return '<svg viewBox=\"0 0 '+W+' '+H+'\" style=\"width:100%;height:auto\">'+grid+bands+'<path d=\"'+totalLine+'\" fill=\"none\" stroke=\"#0B1426\" stroke-width=\"2\" stroke-linejoin=\"round\"/>'+extras+xlab+'</svg>'+leg;\n  }\n\n  // ---------- donut ----------\n  function donut(items){\n    var total=items.reduce(function(s,i){return s+(Number(i.valor)||0);},0);\n    var cx=90,cy=90,r=64,sw=26,circ=2*Math.PI*r,off=0,gap=2.5;\n    var segs=total>0? items.map(function(it){\n      var frac=(Number(it.valor)||0)/total, len=frac*circ, draw=Math.max(len-gap,0.5);\n      var tip='<strong>'+esc(it.label)+'</strong><br>'+esc(fmt(it.valor))+' · '+esc(pctf(frac*100));\n      var s='<circle cx=\"'+cx+'\" cy=\"'+cy+'\" r=\"'+r+'\" fill=\"none\" stroke=\"'+it.cor+'\" stroke-width=\"'+sw+'\" stroke-dasharray=\"'+draw.toFixed(2)+' '+(circ-draw).toFixed(2)+'\" stroke-dashoffset=\"'+(-off).toFixed(2)+'\" transform=\"rotate(-90 '+cx+' '+cy+')\" style=\"cursor:pointer\" data-tip=\"'+tip+'\"></circle>';\n      off+=len; return s;\n    }).join('') : '<circle cx=\"90\" cy=\"90\" r=\"64\" fill=\"none\" stroke=\"#E4E8EE\" stroke-width=\"26\"/>';\n    return '<svg viewBox=\"0 0 180 180\" style=\"width:170px;max-width:100%;height:auto;display:block;margin:0 auto 10px\">'+segs+\n      '<text x=\"90\" y=\"86\" text-anchor=\"middle\" font-size=\"10\" fill=\"#7D8898\">total</text><text x=\"90\" y=\"103\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#0B1426\">'+fmtK(total)+'</text></svg>';\n  }\n  function tabelaDonut(items){\n    var total=items.reduce(function(s,i){return s+(Number(i.valor)||0);},0)||1;\n    return '<table class=\"tracker\" style=\"font-size:12px\"><tbody>'+items.map(function(it){\n      return '<tr><td><span style=\"display:inline-block;width:10px;height:10px;border-radius:2px;background:'+it.cor+';margin-right:7px\"></span>'+esc(it.label)+'</td><td class=\"num\">'+fmt(it.valor)+'</td><td class=\"num text-sec\">'+pctf((Number(it.valor)||0)/total*100)+'</td></tr>';\n    }).join('')+'</tbody></table>';\n  }\n\n  window.onDono = function(){ filtrarFontes(); aplicar(); };\n  function filtrarFontes(){\n    var dono=document.getElementById('f-dono').value, atual=document.getElementById('f-fonte').value;\n    var fs=_fontes.filter(function(f){ return !dono || String(f.dono).toLowerCase()===dono.toLowerCase(); });\n    document.getElementById('f-fonte').innerHTML='<option value=\"\">Todas</option>'+fs.map(function(f){return '<option>'+esc(f.nome)+'</option>';}).join('');\n    if(fs.some(function(f){return f.nome===atual;})) document.getElementById('f-fonte').value=atual;\n  }\n  window.limpar = function(){ ['f-dono','f-fonte','f-regime','f-de','f-ate'].forEach(function(id){document.getElementById(id).value='';}); filtrarFontes(); aplicar(); };\n\n  // presets de data\n  window.presetUlt12 = function(){\n    var latest = _competencias.length ? _competencias[0] : mesAtual();\n    var ate = latest > mesAtual() ? mesAtual() : latest;          // não passa do mês corrente\n    document.getElementById('f-ate').value = ate;\n    document.getElementById('f-de').value = shiftMes(ate, -11);\n    aplicar();\n  };\n  window.presetYTD = function(){\n    var m = mesAtual();\n    document.getElementById('f-de').value = m.slice(0,4)+'-01';\n    document.getElementById('f-ate').value = m;\n    aplicar();\n  };\n\n  function carregarOpcoes(cb){\n    google.script.run.withSuccessHandler(function(res){\n      if(res&&res.status==='sucesso'){\n        _fontes=res.dados.fontes||[]; _competencias=(res.dados.competencias||[]); filtrarFontes();\n      }\n      if(cb) cb();\n    }).obterOpcoesFaturamento();\n  }\n\n  window.aplicar = function(){\n    var filtros={ dono:document.getElementById('f-dono').value, fonte:document.getElementById('f-fonte').value, regime:document.getElementById('f-regime').value,\n      competenciaDe:document.getElementById('f-de').value, competenciaAte:document.getElementById('f-ate').value };\n    ['dash-kpis','dash-mes','dash-receb'].forEach(function(id){document.getElementById(id).innerHTML='<div class=\"loader\"></div>';});\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso'){ document.getElementById('dash-kpis').innerHTML='<div class=\"alerta alerta-erro\">'+((res&&res.mensagem)||'Erro')+'</div>'; return; }\n      var d=res.dados, t=d.totais, mes=d.por_mes||[], fon=d.por_fonte||[];\n\n      // métricas\n      var margem=t.bruto? t.liquido/t.bruto*100:0, carga=t.bruto? t.tributos/t.bruto*100:0;\n      var top=fon[0]||null, conc=(top&&t.bruto)?top.bruto/t.bruto*100:0;\n      var hhi=t.bruto? fon.reduce(function(s,f){ var sh=f.bruto/t.bruto*100; return s+sh*sh; },0):0;\n      var hhiLbl=hhi>2500?'alta':(hhi>1500?'média':'baixa');\n      var mom=(mes.length>=2 && mes[mes.length-2].bruto)? (mes[mes.length-1].bruto/mes[mes.length-2].bruto-1)*100:0;\n      var media=mes.length? mes.reduce(function(s,m){return s+m.bruto;},0)/mes.length:0, runrate=media*12;\n      // YoY: total por ano\n      var porAno={}; mes.forEach(function(m){ var y=m.competencia.slice(0,4); porAno[y]=(porAno[y]||0)+m.bruto; });\n      var anos=Object.keys(porAno).sort(), yoy=(anos.length>=2 && porAno[anos[anos.length-2]])? (porAno[anos[anos.length-1]]/porAno[anos[anos.length-2]]-1)*100:null;\n\n      document.getElementById('dash-kpis').innerHTML =\n        kpi('Faturado (bruto)', fmt(t.bruto), t.qtd+' NF(s) · MoM '+seta(mom/100)) +\n        kpi('Líquido', fmt(t.liquido), 'margem '+pctf(margem)) +\n        kpi('Carga tributária', pctf(carga), 'a recolher '+fmt(t.a_recolher)) +\n        kpi('Concentração', pctf(conc), top?('top: '+esc(top.fonte)):'—') +\n        kpi('HHI', Math.round(hhi).toLocaleString('pt-BR'), 'dependência '+hhiLbl) +\n        kpi('Projeção do ano', fmt(runrate), 'run-rate (média×12)'+(yoy!=null?' · YoY '+seta(yoy/100):''));\n\n      // 01 evolução\n      document.getElementById('dash-mes-nota').textContent=mes.length?(mes.length+' meses'):'';\n      document.getElementById('dash-mes').innerHTML=areaChart(mes,{gid:'gEvo',xKey:'competencia',series:[{key:'bruto',cor:'#0038B8',label:'Faturado',area:true},{key:'liquido',cor:'#16A34A',label:'Líquido',dash:true}]});\n\n      // 02 fonte (donut + tabela)\n      var itFon=fon.map(function(f,i){ return {label:f.fonte,valor:f.bruto,cor:PALETA[i%PALETA.length]}; });\n      document.getElementById('dash-fonte').innerHTML = fon.length ? (donut(itFon)+tabelaDonut(itFon)) : '<span class=\"text-sec\">—</span>';\n\n      // 03 dono (donut + tabela) + regime\n      var pd=d.por_dono||{}, T=pd.Tuto||{bruto:0}, F=pd.Francesca||{bruto:0};\n      var itDono=[{label:'Tuto',valor:T.bruto||0,cor:'#0038B8'},{label:'Francesca',valor:F.bruto||0,cor:'#7E5C9C'}];\n      var regHtml=(d.por_regime&&d.por_regime.length)?('<div style=\"margin-top:12px;border-top:1px dashed var(--line);padding-top:10px\"><div class=\"kpi-label mb-16\">Por regime</div>'+d.por_regime.map(function(rg){return '<div class=\"flex-between\" style=\"font-size:.85em;padding:3px 0\"><span class=\"text-sec\">'+esc(rg.regime)+'</span><strong class=\"mono\">'+fmt(rg.bruto)+'</strong></div>';}).join('')+'</div>'):'';\n      document.getElementById('dash-dono').innerHTML = donut(itDono)+tabelaDonut(itDono)+regHtml;\n\n      // 04 A Receber (curva de caixa)\n      var rec=d.por_recebimento||[];\n      document.getElementById('dash-receb').innerHTML=areaChart(rec,{gid:'gRec',xKey:'mes',series:[\n        {key:'a_receber',cor:'#0B1426',label:'Total',width:2.6},\n        {key:'tuto',cor:'#0038B8',label:'Tuto',noLabel:true},\n        {key:'fran',cor:'#7E5C9C',label:'Francesca',noLabel:true}\n      ]});\n\n      ['dash-mes','dash-fonte','dash-dono','dash-receb'].forEach(function(id){ bindTips(document.getElementById(id)); });\n    }).obterDashboardFaturamento(filtros);\n  };\n\n  carregarOpcoes(aplicar);\n})();\n<\/script>\n","FinanceiroTributos":"<!-- FinanceiroTributos.html — Container da empresa: sub-abas Faturamento + Fluxo de Caixa.\n     navegarPara('FinanceiroTributos'). Carrega as páginas Faturamento/Caixa dinamicamente. -->\n<div class=\"fade-in\">\n  <div class=\"section-head\"><h2>Financeiro &amp; Tributos <span class=\"text-sec\" style=\"font-size:.6em;font-weight:400\">· empresa</span></h2></div>\n\n  <div class=\"tabs\">\n    <div class=\"tab ativa\" data-ft=\"Faturamento\" onclick=\"ftAba('Faturamento')\"><i class=\"fas fa-file-invoice-dollar\"></i> Faturamento</div>\n    <div class=\"tab\" data-ft=\"Caixa\" onclick=\"ftAba('Caixa')\"><i class=\"fas fa-hand-holding-dollar\"></i> Fluxo de Caixa</div>\n  </div>\n\n  <div id=\"ft-conteudo\"><div class=\"loader\"></div></div>\n</div>\n\n<script>\n(function() {\n  function execScripts(container){\n    var scripts=container.querySelectorAll('script');\n    for(var i=0;i<scripts.length;i++){\n      var s=document.createElement('script');\n      if(scripts[i].src) s.src=scripts[i].src; else s.textContent=scripts[i].textContent;\n      document.body.appendChild(s);\n      scripts[i].parentNode.removeChild(scripts[i]);\n    }\n  }\n  window.ftAba=function(pg){\n    var tabs=document.querySelectorAll('.tab[data-ft]');\n    for(var i=0;i<tabs.length;i++) tabs[i].classList.toggle('ativa', tabs[i].getAttribute('data-ft')===pg);\n    var alvo=document.getElementById('ft-conteudo');\n    alvo.innerHTML='<div class=\"loader\"></div>';\n    google.script.run\n      .withSuccessHandler(function(html){ alvo.innerHTML=html; execScripts(alvo); })\n      .withFailureHandler(function(err){ alvo.innerHTML='<div class=\"alerta alerta-erro\">Erro ao carregar: '+(err&&err.message?err.message:err)+'</div>'; })\n      .carregarConteudoDaPagina(pg);\n  };\n  ftAba('Faturamento');\n})();\n<\/script>\n","Faturamento":"<!-- Faturamento.html — NFs, Consolidado e Fontes. navegarPara('Faturamento'). -->\n<div class=\"fade-in\">\n  <div class=\"section-head\"><h2>Faturamento &amp; Tributos</h2></div>\n\n  <div class=\"tabs\">\n    <div class=\"tab ativa\" data-tab=\"nf\" onclick=\"trocarTab('nf')\"><i class=\"fas fa-file-invoice-dollar\"></i> Faturamento (NFs)</div>\n    <div class=\"tab\" data-tab=\"cons\" onclick=\"trocarTab('cons')\"><i class=\"fas fa-layer-group\"></i> Consolidado</div>\n    <div class=\"tab\" data-tab=\"fontes\" onclick=\"trocarTab('fontes')\"><i class=\"fas fa-briefcase\"></i> Fontes</div>\n  </div>\n\n  <!-- ===== TAB NF ===== -->\n  <div class=\"tab-content ativa\" id=\"tab-nf\">\n    <div class=\"card card-pad mb-16\"><div class=\"form-grid\" style=\"align-items:end\">\n      <div class=\"form-group mb-0\">\n        <label>Mês de referência (emissão)</label>\n        <div class=\"flex gap-8\" style=\"align-items:center\">\n          <button class=\"btn ghost sm\" onclick=\"navMes(-1)\" title=\"Mês anterior\"><i class=\"fas fa-chevron-left\"></i></button>\n          <input type=\"month\" class=\"form-control\" id=\"ff-comp\" onchange=\"carregarNFs()\" style=\"flex:1\">\n          <button class=\"btn ghost sm\" onclick=\"navMes(1)\" title=\"Próximo mês\"><i class=\"fas fa-chevron-right\"></i></button>\n        </div>\n      </div>\n      <div class=\"form-group mb-0\"><label>Dono</label><select class=\"form-control\" id=\"ff-dono\" onchange=\"onDonoFiltro()\"><option value=\"\">Todos</option><option>Tuto</option><option>Francesca</option></select></div>\n      <div class=\"form-group mb-0\"><label>Fonte</label><select class=\"form-control\" id=\"ff-fonte\" onchange=\"carregarNFs()\"><option value=\"\">Todas</option></select></div>\n      <div class=\"form-group mb-0\" style=\"justify-content:flex-end\"><button class=\"btn\" onclick=\"abrirModalNF(null)\"><i class=\"fas fa-plus\"></i> Lançar faturamento</button></div>\n    </div></div>\n    <div class=\"flex-between mb-16\">\n      <div class=\"text-sec\" id=\"nf-resumo\">carregando…</div>\n      <label class=\"text-sec\" style=\"font-size:.85em\"><input type=\"checkbox\" id=\"ff-todos\" onchange=\"carregarNFs()\"> ver todos os meses</label>\n    </div>\n    <div class=\"card\"><div style=\"overflow-x:auto\">\n      <table class=\"tracker cardify\" id=\"tbl-nf\">\n        <thead><tr id=\"nf-head\">\n          <th data-sort=\"emissao\">Emissão</th><th data-sort=\"fonte\">Fonte</th><th data-sort=\"dono\">Dono</th><th data-sort=\"nf\">NF</th>\n          <th data-sort=\"valor_bruto\" class=\"num\">Bruto</th><th data-sort=\"iss\" class=\"num\">ISS</th><th data-sort=\"federais\" class=\"num\">Federais</th>\n          <th data-sort=\"retido\" class=\"num\">Retenções</th><th data-sort=\"a_recolher\" class=\"num\">A Recolher</th><th data-sort=\"provisionar\" class=\"num\">Provisionar</th>\n          <th data-sort=\"a_receber\" class=\"num\">Recebido</th><th data-sort=\"liquido\" class=\"num\">Líquido</th><th class=\"text-center\">Ações</th>\n        </tr></thead>\n        <tbody id=\"body-nf\"><tr><td colspan=\"13\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div></div>\n  </div>\n\n  <!-- ===== TAB CONSOLIDADO ===== -->\n  <div class=\"tab-content\" id=\"tab-cons\">\n    <div class=\"card\"><div style=\"overflow-x:auto\">\n      <table class=\"tracker\" id=\"tbl-cons\">\n        <thead>\n          <tr>\n            <th rowspan=\"2\" style=\"vertical-align:bottom\">Mês (emissão)</th>\n            <th colspan=\"3\" class=\"text-center\" style=\"border-left:1px solid var(--line)\">Tuto</th>\n            <th colspan=\"3\" class=\"text-center\" style=\"border-left:1px solid var(--line)\">Francesca</th>\n            <th colspan=\"3\" class=\"text-center\" style=\"border-left:1px solid var(--line)\">Total</th>\n          </tr>\n          <tr>\n            <th class=\"num\" style=\"border-left:1px solid var(--line)\">Receita</th><th class=\"num\">Impostos</th><th class=\"num\">Líquido</th>\n            <th class=\"num\" style=\"border-left:1px solid var(--line)\">Receita</th><th class=\"num\">Impostos</th><th class=\"num\">Líquido</th>\n            <th class=\"num\" style=\"border-left:1px solid var(--line)\">Receita</th><th class=\"num\">Impostos</th><th class=\"num\">Líquido</th>\n          </tr>\n        </thead>\n        <tbody id=\"body-cons\"><tr><td colspan=\"10\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div></div>\n  </div>\n\n  <!-- ===== TAB FONTES ===== -->\n  <div class=\"tab-content\" id=\"tab-fontes\">\n    <div class=\"flex-between mb-16\"><div class=\"text-sec\">Fontes de renda (\"empregos\") por dono e regime.</div><button class=\"btn sm\" onclick=\"abrirModalFonte(null)\"><i class=\"fas fa-plus\"></i> Nova fonte</button></div>\n    <div class=\"card\"><div style=\"overflow-x:auto\">\n      <table class=\"tracker\" id=\"tbl-fontes\">\n        <thead><tr><th>Fonte</th><th>Dono</th><th>Regime</th><th>Retém fonte</th><th class=\"num\">ISS</th><th class=\"num\">Federais</th><th class=\"text-center\">Ações</th></tr></thead>\n        <tbody id=\"body-fontes\"><tr><td colspan=\"7\"><div class=\"loader\"></div></td></tr></tbody>\n      </table>\n    </div></div>\n  </div>\n</div>\n\n<!-- Modal NF (criar/editar) -->\n<div class=\"modal-backdrop\" id=\"modal-nf\"><div class=\"modal modal-lg\">\n  <div class=\"modal-header\"><h3 id=\"modal-nf-titulo\">Lançar faturamento</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-nf')\">&times;</button></div>\n  <div class=\"modal-body\">\n    <input type=\"hidden\" id=\"n-id\">\n    <div class=\"form-grid-2\">\n      <div class=\"form-group\"><label>Competência <span class=\"req\">*</span></label><input type=\"month\" class=\"form-control\" id=\"n-comp\" onchange=\"prefillPagamento()\"></div>\n      <div class=\"form-group\"><label>Fonte <span class=\"req\">*</span></label><select class=\"form-control\" id=\"n-fonte\" onchange=\"onFonteChange()\"></select></div>\n    </div>\n    <div class=\"form-grid\">\n      <div class=\"form-group\"><label>Dono</label><input class=\"form-control\" id=\"n-dono\" readonly></div>\n      <div class=\"form-group\"><label>Regime</label><input class=\"form-control\" id=\"n-regime\" readonly></div>\n      <div class=\"form-group\"><label>Nº NF</label><input class=\"form-control\" id=\"n-nf\" placeholder=\"ex: 107\"></div>\n    </div>\n    <div class=\"form-group\"><label id=\"lbl-bruto\">Valor bruto (R$) <span class=\"req\">*</span></label><input class=\"form-control\" id=\"n-bruto\" inputmode=\"decimal\" placeholder=\"0,00\" oninput=\"calcPreview()\"></div>\n    <div class=\"form-grid\">\n      <div class=\"form-group\"><label>Emissão (fiscal)</label><input type=\"month\" class=\"form-control\" id=\"n-emissao\" onchange=\"onEmissaoChange()\"></div>\n      <div class=\"form-group\"><label>Mês de pagamento</label><input type=\"month\" class=\"form-control\" id=\"n-mespag\"></div>\n      <div class=\"form-group\"><label>Dia de pagamento</label><input class=\"form-control\" id=\"n-diapag\" inputmode=\"numeric\" placeholder=\"ex: 15\"></div>\n    </div>\n    <div id=\"bloco-pj\">\n      <div class=\"card card-pad\" style=\"background:var(--blue-50);border:none\">\n        <div class=\"kpi-label mb-16\" style=\"color:var(--il-blue)\"><i class=\"fas fa-calculator\"></i> Cálculo automático — pelas alíquotas da fonte (ajuste os impostos no cadastro da Fonte)</div>\n        <div class=\"form-grid\">\n          <div><div class=\"kpi-label\">ISS</div><div class=\"mono\" id=\"pv-iss\">—</div></div>\n          <div><div class=\"kpi-label\">Impostos Federais</div><div class=\"mono\" id=\"pv-federais\">—</div></div>\n          <div><div class=\"kpi-label\">Retenções</div><div class=\"mono\" id=\"pv-retido\">—</div></div>\n        </div>\n        <div class=\"form-grid mt-16\">\n          <div><div class=\"kpi-label\">PIS/COFINS (mensal)</div><div class=\"mono\" id=\"pv-pc\">—</div></div>\n          <div><div class=\"kpi-label\">IRPJ/CSLL (trim.)</div><div class=\"mono\" id=\"pv-irpj\">—</div></div>\n        </div>\n        <div class=\"form-grid mt-16\" style=\"border-top:1px dashed var(--blue-200);padding-top:14px\">\n          <div><div class=\"kpi-label\">Recebido</div><div class=\"mono\" id=\"pv-receber\" style=\"font-size:1.1em;font-weight:700;color:var(--il-blue)\">—</div></div>\n          <div><div class=\"kpi-label\">A Recolher</div><div class=\"mono\" id=\"pv-recolher\" style=\"font-size:1.1em;font-weight:700;color:var(--risk-mid)\">—</div></div>\n          <div><div class=\"kpi-label\">Provisionar</div><div class=\"mono\" id=\"pv-prov\" style=\"font-weight:700\">—</div></div>\n          <div><div class=\"kpi-label\">Líquido</div><div class=\"mono\" id=\"pv-liquido\" style=\"font-size:1.1em;font-weight:700;color:var(--risk-low)\">—</div></div>\n        </div>\n      </div>\n    </div>\n    <div class=\"form-group mt-16\"><label>Observações</label><input class=\"form-control\" id=\"n-obs\"></div>\n  </div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-nf')\">Cancelar</button><button class=\"btn\" id=\"btn-salvar-nf\" onclick=\"salvarNF()\">Salvar</button></div>\n</div></div>\n\n<!-- Modal VER (detalhe read-only) -->\n<div class=\"modal-backdrop\" id=\"modal-ver\"><div class=\"modal\">\n  <div class=\"modal-header\"><h3 id=\"ver-titulo\">Detalhe do faturamento</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-ver')\">&times;</button></div>\n  <div class=\"modal-body\" id=\"ver-body\"></div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-ver')\">Fechar</button><button class=\"btn\" id=\"ver-editar\">Editar</button></div>\n</div></div>\n\n<!-- Modal Fonte -->\n<div class=\"modal-backdrop\" id=\"modal-fonte\"><div class=\"modal modal-sm\">\n  <div class=\"modal-header\"><h3 id=\"modal-fonte-titulo\">Nova fonte</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-fonte')\">&times;</button></div>\n  <div class=\"modal-body\">\n    <input type=\"hidden\" id=\"fo-original\">\n    <div class=\"form-group\"><label>Nome <span class=\"req\">*</span></label><input class=\"form-control\" id=\"fo-nome\" placeholder=\"ex: Unimed\"></div>\n    <div class=\"form-grid-2\">\n      <div class=\"form-group\"><label>Dono <span class=\"req\">*</span></label><select class=\"form-control\" id=\"fo-dono\"><option>Tuto</option><option>Francesca</option></select></div>\n      <div class=\"form-group\"><label>Regime</label><select class=\"form-control\" id=\"fo-regime\" onchange=\"onRegimeFonte()\">\n        <option value=\"PJ\">PJ (tributado)</option><option value=\"CLT\">CLT</option><option value=\"Lucros\">Distribuição de Lucros</option>\n      </select></div>\n    </div>\n    <div class=\"form-grid\">\n      <div class=\"form-group\"><label>Dia de pagamento</label><input class=\"form-control\" id=\"fo-diapag\" inputmode=\"numeric\" placeholder=\"ex: 15\"></div>\n      <div class=\"form-group\"><label>Emissão <span class=\"text-sec\">(meses da competência)</span></label><input class=\"form-control\" id=\"fo-emiss-off\" inputmode=\"numeric\" placeholder=\"0\"></div>\n      <div class=\"form-group\"><label>Pagamento <span class=\"text-sec\">(meses da emissão)</span></label><input class=\"form-control\" id=\"fo-pag-off\" inputmode=\"numeric\" placeholder=\"0\"></div>\n    </div>\n    <div id=\"fo-bloco-pj\">\n      <div class=\"form-group\"><label>Retém na fonte?</label><select class=\"form-control\" id=\"fo-retem\"><option value=\"false\">Não</option><option value=\"true\">Sim (6,15%)</option></select></div>\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\"><label>Alíquota ISS</label><input class=\"form-control\" id=\"fo-iss\" placeholder=\"0,02\"></div>\n        <div class=\"form-group\"><label>Alíquota Federais</label><input class=\"form-control\" id=\"fo-fed\" placeholder=\"0,1133\"></div>\n      </div>\n      <div class=\"form-grid-2\">\n        <div class=\"form-group\"><label>Alíquota Retenção</label><input class=\"form-control\" id=\"fo-ret\" placeholder=\"0,0615\"></div>\n        <div class=\"form-group\"><label>Alíquota PIS/COFINS</label><input class=\"form-control\" id=\"fo-pc\" placeholder=\"0,0365\"></div>\n      </div>\n    </div>\n    <div id=\"fo-nota-pj\" class=\"alerta alerta-info\" style=\"display:none\">Regime sem tributação na pessoa — lança o valor recebido direto.</div>\n  </div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-fonte')\">Cancelar</button><button class=\"btn\" id=\"btn-salvar-fonte\" onclick=\"salvarFonteUI()\">Salvar</button></div>\n</div></div>\n\n<!-- Modal excluir -->\n<div class=\"modal-backdrop\" id=\"modal-del\"><div class=\"modal modal-sm\">\n  <div class=\"modal-header danger\"><h3>Excluir</h3><button class=\"modal-close\" onclick=\"fecharModal('modal-del')\">&times;</button></div>\n  <div class=\"modal-body\"><p id=\"del-msg\"></p></div>\n  <div class=\"modal-footer\"><button class=\"btn ghost\" onclick=\"fecharModal('modal-del')\">Cancelar</button><button class=\"btn danger\" id=\"btn-del\" onclick=\"confirmarDel()\">Excluir</button></div>\n</div></div>\n\n<script>\n(function() {\n  var _fontes = [], _nfs = [], _fontesMap = {}, _del = null;\n  var _sortField = 'fonte', _sortDir = 1;\n  var NUMERICOS = { valor_bruto:1, iss:1, federais:1, retido:1, a_recolher:1, provisionar:1, a_receber:1, liquido:1 };\n\n  window.fecharModal = function(id){ document.getElementById(id).classList.remove('aberta'); };\n  function abrir(id){ document.getElementById(id).classList.add('aberta'); }\n  function fmt(n){ return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }\n  function esc(s){ return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c];}); }\n  function num(v){ if(v==null||v==='') return 0; v=String(v).replace(/[^\\d.,-]/g,''); if(v.indexOf(',')!==-1) v=v.replace(/\\./g,'').replace(',','.'); return parseFloat(v)||0; }\n  function r2(n){ return Math.round((Number(n)||0)*100)/100; }\n  function pct(n){ return (Number(n)*100).toFixed(2)+'%'; }\n  function isPJ(f){ return f && String(f.regime).toUpperCase()==='PJ'; }\n\n  function mesAtual(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }\n  function shiftMes(ym, delta){ if(!ym) ym=mesAtual(); var p=ym.split('-'); var d=new Date(Number(p[0]), Number(p[1])-1+delta, 1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }\n\n  window.trocarTab = function(t){\n    document.querySelectorAll('.tab[data-tab]').forEach(function(el){ el.classList.toggle('ativa', el.getAttribute('data-tab')===t); });\n    ['nf','cons','fontes'].forEach(function(x){ document.getElementById('tab-'+x).classList.toggle('ativa', x===t); });\n    if(t==='cons') carregarConsolidado();\n    if(t==='fontes') carregarFontes();\n  };\n\n  window.navMes = function(delta){\n    document.getElementById('ff-todos').checked=false;\n    document.getElementById('ff-comp').value = shiftMes(document.getElementById('ff-comp').value, delta);\n    carregarNFs();\n  };\n\n  window.onDonoFiltro = function(){ filtrarFontesPorDono(); carregarNFs(); };\n  function filtrarFontesPorDono(){\n    var dono=document.getElementById('ff-dono').value;\n    var atual=document.getElementById('ff-fonte').value;\n    var lista=_fontes.filter(function(f){ return !dono || normalizeDono(f.dono)===normalizeDono(dono); });\n    document.getElementById('ff-fonte').innerHTML='<option value=\"\">Todas</option>'+lista.map(function(f){return '<option>'+esc(f.nome)+'</option>';}).join('');\n    // mantém seleção se ainda válida\n    if(lista.some(function(f){return f.nome===atual;})) document.getElementById('ff-fonte').value=atual;\n  }\n  function normalizeDono(s){ return String(s||'').trim().toLowerCase(); }\n\n  function carregarOpcoes(cb){\n    google.script.run.withSuccessHandler(function(res){\n      if(res&&res.status==='sucesso'){\n        _fontes=res.dados.fontes; _fontesMap={}; _fontes.forEach(function(f){_fontesMap[f.nome]=f;});\n        filtrarFontesPorDono();\n        document.getElementById('n-fonte').innerHTML='<option value=\"\">— selecione —</option>'+_fontes.map(function(f){return '<option>'+esc(f.nome)+'</option>';}).join('');\n      }\n      if(cb) cb();\n    }).obterOpcoesFaturamento();\n  }\n\n  /* ---- NFs ---- */\n  window.carregarNFs = function(){\n    var todos=document.getElementById('ff-todos').checked;\n    var filtros={ competencia: todos?'':document.getElementById('ff-comp').value, dono:document.getElementById('ff-dono').value, fonte:document.getElementById('ff-fonte').value };\n    document.getElementById('body-nf').innerHTML='<tr><td colspan=\"13\"><div class=\"loader\"></div></td></tr>';\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso'){ document.getElementById('body-nf').innerHTML='<tr><td colspan=\"13\"><div class=\"alerta alerta-erro\">'+((res&&res.mensagem)||'Erro')+'</div></td></tr>'; return; }\n      _nfs=res.dados.itens; renderNFs();\n      var t=res.dados.totais;\n      document.getElementById('nf-resumo').innerHTML=res.dados.qtd+' NF(s) · Bruto <strong class=\"mono\">'+fmt(t.bruto)+'</strong> · Recebido <strong class=\"mono\">'+fmt(t.a_receber)+'</strong> · A Recolher <strong class=\"mono\">'+fmt(t.a_recolher)+'</strong> · Provisionar <strong class=\"mono\">'+fmt(t.provisionar)+'</strong> · Líquido <strong class=\"mono\">'+fmt(t.liquido)+'</strong>';\n    }).listarFaturamento(filtros);\n  };\n\n  function renderNFs(){\n    var body=document.getElementById('body-nf');\n    if(!_nfs.length){ body.innerHTML='<tr><td colspan=\"13\"><div class=\"alerta alerta-info\">Nenhum lançamento neste mês. Use as setas para navegar ou clique em \"Lançar faturamento\".</div></td></tr>'; atualizarSetasSort(); return; }\n    var lista=_nfs.slice().sort(function(a,b){\n      var va=a[_sortField], vb=b[_sortField];\n      if(NUMERICOS[_sortField]){ va=Number(va)||0; vb=Number(vb)||0; return (va-vb)*_sortDir; }\n      va=String(va||''); vb=String(vb||''); return va.localeCompare(vb)*_sortDir;\n    });\n    body.innerHTML=lista.map(function(n){\n      var pj=String(n.regime).toUpperCase()==='PJ';\n      var reg = pj ? '' : ' <span class=\"badge neutral\">'+esc(n.regime)+'</span>';\n      var tax=function(v){ return pj ? fmt(v) : '—'; };\n      return '<tr>'+\n        '<td class=\"mono\" data-label=\"Emissão\">'+esc(n.emissao||n.competencia)+'</td><td class=\"veh\" data-full>'+esc(n.fonte)+reg+'</td><td data-label=\"Dono\">'+esc(n.dono)+'</td><td class=\"mono\" data-label=\"NF\">'+esc(n.nf)+'</td>'+\n        '<td class=\"num\" data-label=\"Bruto\">'+fmt(n.valor_bruto)+'</td><td class=\"num\" data-label=\"ISS\">'+tax(n.iss)+'</td><td class=\"num\" data-label=\"Federais\">'+tax(n.federais)+'</td>'+\n        '<td class=\"num\" data-label=\"Retenções\">'+tax(n.retido)+'</td><td class=\"num\" data-label=\"A Recolher\">'+tax(n.a_recolher)+'</td><td class=\"num\" data-label=\"Provisionar\">'+tax(n.provisionar)+'</td>'+\n        '<td class=\"num\" data-label=\"Recebido\">'+fmt(n.a_receber)+'</td><td class=\"num\" data-label=\"Líquido\">'+fmt(n.liquido)+'</td>'+\n        '<td class=\"text-center\" style=\"white-space:nowrap\">'+\n          '<button class=\"btn ghost sm\" onclick=\"abrirVer(\\''+n.id+'\\')\" title=\"Ver\"><i class=\"fas fa-eye\"></i></button> '+\n          '<button class=\"btn ghost sm\" onclick=\"abrirModalNF(\\''+n.id+'\\')\" title=\"Editar\"><i class=\"fas fa-pen\"></i></button> '+\n          '<button class=\"btn ghost sm\" onclick=\"pedirDel(\\'nf\\',\\''+n.id+'\\')\" title=\"Excluir\"><i class=\"fas fa-trash\"></i></button>'+\n        '</td></tr>';\n    }).join('');\n    atualizarSetasSort();\n  }\n\n  window.ordenar = function(campo){ if(_sortField===campo) _sortDir=-_sortDir; else { _sortField=campo; _sortDir=1; } renderNFs(); };\n  function atualizarSetasSort(){\n    document.querySelectorAll('#nf-head th[data-sort]').forEach(function(th){\n      var c=th.getAttribute('data-sort'); var base=th.getAttribute('data-label')||th.textContent.replace(/[▲▼]/g,'').trim();\n      th.setAttribute('data-label', base);\n      th.innerHTML = base + (c===_sortField ? (_sortDir>0?' ▲':' ▼') : '');\n      th.style.cursor='pointer';\n    });\n  }\n\n  /* ---- Ver (detalhe) ---- */\n  window.abrirVer = function(id){\n    var n=_nfs.filter(function(x){return String(x.id)===String(id);})[0]; if(!n) return;\n    var pj=String(n.regime).toUpperCase()==='PJ';\n    function row(l,v,opt){ opt=opt||{}; return '<div class=\"flex-between\" style=\"padding:6px 0;border-bottom:1px solid var(--line)\"><span class=\"text-sec\"'+(opt.sub?' style=\"padding-left:16px\"':'')+'>'+(opt.sub?'↳ ':'')+l+'</span><strong class=\"mono\"'+(opt.cor?' style=\"color:'+opt.cor+'\"':'')+'>'+v+'</strong></div>'; }\n    function mini(l,v,cor){ return '<div style=\"flex:1;text-align:center;padding:12px 8px;background:#fff;border:1px solid var(--line);border-radius:10px\"><div class=\"serif\" style=\"font-size:1.35em;line-height:1;color:'+(cor||'var(--ink-900)')+'\">'+v+'</div><div class=\"kpi-label\" style=\"margin-top:5px\">'+l+'</div></div>'; }\n    function chip(l,v){ return '<div style=\"text-align:center\"><div class=\"kpi-label\">'+l+'</div><div class=\"mono\" style=\"font-weight:700;margin-top:2px\">'+(v||'—')+'</div></div>'; }\n\n    var h = '<div class=\"flex-between mb-16\"><div><div class=\"serif\" style=\"font-size:1.4em\">'+esc(n.fonte)+'</div><div class=\"text-sec\">'+esc(n.dono)+' · NF '+esc(n.nf||'—')+'</div></div><span class=\"badge '+(pj?'low':'neutral')+'\">'+esc(n.regime)+'</span></div>';\n    h += '<div class=\"flex gap-8 mb-16\">'+mini('Bruto', fmt(n.valor_bruto))+mini('Recebido', fmt(n.a_receber), 'var(--il-blue)')+mini('Líquido', fmt(n.liquido), 'var(--risk-low)')+'</div>';\n    h += '<div class=\"card card-pad mb-16\" style=\"background:var(--blue-50);border:none\"><div style=\"display:flex;justify-content:space-around;align-items:center;gap:8px;flex-wrap:wrap\">'+\n      chip('Competência', esc(n.competencia))+'<i class=\"fas fa-arrow-right text-sec\" style=\"font-size:.8em\"></i>'+\n      chip('Emissão', esc(n.emissao))+'<i class=\"fas fa-arrow-right text-sec\" style=\"font-size:.8em\"></i>'+\n      chip('Pagamento', esc(n.mes_pagamento)+(n.dia_pagamento?' · dia '+esc(n.dia_pagamento):''))+'</div></div>';\n    if(pj){\n      h += '<div class=\"card card-pad\" style=\"background:var(--blue-50);border:none\">'+\n        '<div class=\"kpi-label mb-16\" style=\"color:var(--il-blue)\">Tributos</div>'+\n        row('ISS', fmt(n.iss))+row('Impostos Federais', fmt(n.federais))+\n        row('PIS/COFINS (mensal)', fmt(n.pis_cofins), {sub:true})+row('IRPJ/CSLL (trimestral)', fmt(n.irpj_csll), {sub:true})+\n        row('Retenções', fmt(n.retido))+\n        row('A Recolher', fmt(n.a_recolher), {cor:'var(--risk-mid)'})+row('Provisionar', fmt(n.provisionar))+'</div>';\n    }\n    if(n.obs) h += '<div class=\"mt-16 text-sec\"><i class=\"fas fa-note-sticky\"></i> '+esc(n.obs)+'</div>';\n    document.getElementById('ver-body').innerHTML=h;\n    document.getElementById('ver-editar').onclick=function(){ fecharModal('modal-ver'); abrirModalNF(id); };\n    abrir('modal-ver');\n  };\n\n  /* ---- Modal criar/editar ---- */\n  window.onFonteChange = function(){\n    var f=_fontesMap[document.getElementById('n-fonte').value];\n    document.getElementById('n-dono').value = f? f.dono : '';\n    document.getElementById('n-regime').value = f? f.regime : '';\n    var pj = isPJ(f);\n    document.getElementById('bloco-pj').style.display = pj?'block':'none';\n    document.getElementById('lbl-bruto').innerHTML = pj ? 'Valor bruto (R$) <span class=\"req\">*</span>' : 'Valor recebido (R$) <span class=\"req\">*</span>';\n    prefillPagamento();\n    calcPreview();\n  };\n\n  // Preenche emissão/pagamento pela agenda da fonte:\n  //   emissão = competência + emissao_offset · pagamento = emissão + pagamento_offset\n  window.prefillPagamento = function(){\n    var f=_fontesMap[document.getElementById('n-fonte').value];\n    var comp=document.getElementById('n-comp').value;\n    if(!f) return;\n    if(comp){\n      var emissao=shiftMes(comp, Number(f.emissao_offset||0));\n      document.getElementById('n-emissao').value=emissao;\n      document.getElementById('n-mespag').value=shiftMes(emissao, Number(f.pagamento_offset||0));\n    }\n    document.getElementById('n-diapag').value = (f.dia_pagamento===''||f.dia_pagamento==null)?'':f.dia_pagamento;\n  };\n\n  // Se o usuário editar a emissão à mão, recalcula o mês de pagamento\n  window.onEmissaoChange = function(){\n    var f=_fontesMap[document.getElementById('n-fonte').value];\n    var em=document.getElementById('n-emissao').value;\n    if(f&&em) document.getElementById('n-mespag').value=shiftMes(em, Number(f.pagamento_offset||0));\n  };\n\n  window.calcPreview = function(){\n    var f=_fontesMap[document.getElementById('n-fonte').value];\n    if(!isPJ(f)) return;\n    var bruto=num(document.getElementById('n-bruto').value);\n    var iss=r2(bruto*f.aliquota_iss);\n    var fed=r2(bruto*f.aliquota_federais);\n    var pc=r2(bruto*f.aliquota_pis_cofins), irpj=r2(fed-pc);\n    var retido=f.retem_fonte?r2(bruto*f.aliquota_retencao):0;\n    var aRecolher=r2(iss+fed-retido), prov=r2(aRecolher-iss), aReceber=r2(bruto-retido), liq=r2(bruto-(iss+fed));\n    document.getElementById('pv-iss').textContent=fmt(iss);\n    document.getElementById('pv-federais').textContent=fmt(fed);\n    document.getElementById('pv-retido').textContent=fmt(retido);\n    document.getElementById('pv-pc').textContent=fmt(pc);\n    document.getElementById('pv-irpj').textContent=fmt(irpj);\n    document.getElementById('pv-receber').textContent=fmt(aReceber);\n    document.getElementById('pv-recolher').textContent=fmt(aRecolher);\n    document.getElementById('pv-prov').textContent=fmt(prov);\n    document.getElementById('pv-liquido').textContent=fmt(liq);\n  };\n\n  window.abrirModalNF = function(id){\n    document.getElementById('n-id').value=id||'';\n    document.getElementById('modal-nf-titulo').textContent=id?'Editar faturamento':'Lançar faturamento';\n    var n=id?_nfs.filter(function(x){return String(x.id)===String(id);})[0]:null;\n    document.getElementById('n-comp').value=n?n.competencia:(document.getElementById('ff-comp').value||mesAtual());\n    document.getElementById('n-fonte').value=n?n.fonte:'';\n    document.getElementById('n-nf').value=n?n.nf:'';\n    document.getElementById('n-bruto').value=n?String(n.valor_bruto).replace('.',','):'';\n    document.getElementById('n-obs').value=n?n.obs:'';\n    onFonteChange();\n    if(n){ document.getElementById('n-emissao').value=n.emissao||''; document.getElementById('n-mespag').value=n.mes_pagamento||''; document.getElementById('n-diapag').value=(n.dia_pagamento===''||n.dia_pagamento==null)?'':n.dia_pagamento; }\n    abrir('modal-nf');\n  };\n\n  window.salvarNF = function(){\n    var dados={ competencia:document.getElementById('n-comp').value, fonte:document.getElementById('n-fonte').value,\n      nf:document.getElementById('n-nf').value, valor_bruto:document.getElementById('n-bruto').value,\n      emissao:document.getElementById('n-emissao').value, mes_pagamento:document.getElementById('n-mespag').value,\n      dia_pagamento:document.getElementById('n-diapag').value, obs:document.getElementById('n-obs').value };\n    if(!dados.fonte){ mostrarToast('Selecione a fonte.','aviso'); return; }\n    if(!dados.competencia){ mostrarToast('Informe a competência.','aviso'); return; }\n    var id=document.getElementById('n-id').value;\n    var btn=document.getElementById('btn-salvar-nf'); btn.disabled=true; btn.innerHTML='<span class=\"spinner-sm\"></span> Salvando…';\n    var ok=function(res){ btn.disabled=false; btn.textContent='Salvar'; if(res&&res.status==='sucesso'){ mostrarToast(res.mensagem,'sucesso'); fecharModal('modal-nf'); document.getElementById('ff-todos').checked=false; if(dados.competencia) document.getElementById('ff-comp').value=dados.competencia; carregarOpcoes(carregarNFs); } else mostrarToast((res&&res.mensagem)||'Erro','erro'); };\n    var fail=function(e){ btn.disabled=false; btn.textContent='Salvar'; mostrarToast('Erro: '+(e.message||e),'erro'); };\n    if(id) google.script.run.withSuccessHandler(ok).withFailureHandler(fail).atualizarFaturamento(id,dados);\n    else   google.script.run.withSuccessHandler(ok).withFailureHandler(fail).criarFaturamento(dados);\n  };\n\n  /* ---- Consolidado ---- */\n  function carregarConsolidado(){\n    document.getElementById('body-cons').innerHTML='<tr><td colspan=\"10\"><div class=\"loader\"></div></td></tr>';\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso'){ document.getElementById('body-cons').innerHTML='<tr><td colspan=\"10\"><div class=\"alerta alerta-erro\">'+((res&&res.mensagem)||'Erro')+'</div></td></tr>'; return; }\n      var L=res.dados.linhas;\n      if(!L.length){ document.getElementById('body-cons').innerHTML='<tr><td colspan=\"10\"><div class=\"alerta alerta-info\">Sem faturamento lançado ainda.</div></td></tr>'; return; }\n      document.getElementById('body-cons').innerHTML=L.map(function(m){\n        function c(o){ return '<td class=\"num\" style=\"border-left:1px solid var(--line)\">'+fmt(o.receita)+'</td><td class=\"num\">'+fmt(o.impostos)+'</td><td class=\"num\">'+fmt(o.liquido)+'</td>'; }\n        return '<tr><td class=\"mono\">'+esc(m.competencia)+'</td>'+c(m.Tuto)+c(m.Francesca)+c(m.total)+'</tr>';\n      }).join('');\n    }).obterConsolidado({});\n  }\n\n  /* ---- Fontes ---- */\n  function carregarFontes(){\n    document.getElementById('body-fontes').innerHTML='<tr><td colspan=\"7\"><div class=\"loader\"></div></td></tr>';\n    google.script.run.withSuccessHandler(function(res){\n      if(!res||res.status!=='sucesso') return;\n      _fontes=res.dados.fontes; _fontesMap={}; _fontes.forEach(function(f){_fontesMap[f.nome]=f;});\n      document.getElementById('body-fontes').innerHTML=_fontes.map(function(f){\n        var pj=isPJ(f);\n        var reg=pj?'<span class=\"badge low\">PJ</span>':'<span class=\"badge neutral\">'+esc(f.regime)+'</span>';\n        var ret=pj?(f.retem_fonte?'<span class=\"badge low\">Sim</span>':'<span class=\"badge\">Não</span>'):'—';\n        return '<tr><td class=\"veh\">'+esc(f.nome)+'</td><td>'+esc(f.dono)+'</td><td>'+reg+'</td><td>'+ret+'</td>'+\n          '<td class=\"num\">'+(pj?pct(f.aliquota_iss):'—')+'</td><td class=\"num\">'+(pj?pct(f.aliquota_federais):'—')+'</td>'+\n          '<td class=\"text-center\" style=\"white-space:nowrap\"><button class=\"btn ghost sm\" onclick=\"abrirModalFonte(\\''+esc(f.nome)+'\\')\"><i class=\"fas fa-pen\"></i></button> <button class=\"btn ghost sm\" onclick=\"pedirDel(\\'fonte\\',\\''+esc(f.nome)+'\\')\"><i class=\"fas fa-trash\"></i></button></td></tr>';\n      }).join('');\n    }).listarFontes();\n  }\n\n  window.onRegimeFonte = function(){\n    var pj=document.getElementById('fo-regime').value==='PJ';\n    document.getElementById('fo-bloco-pj').style.display=pj?'block':'none';\n    document.getElementById('fo-nota-pj').style.display=pj?'none':'block';\n  };\n\n  window.abrirModalFonte = function(nome){\n    var f=nome?_fontesMap[nome]:null;\n    document.getElementById('modal-fonte-titulo').textContent=nome?'Editar fonte':'Nova fonte';\n    document.getElementById('fo-original').value=nome||'';\n    document.getElementById('fo-nome').value=f?f.nome:'';\n    document.getElementById('fo-dono').value=f?f.dono:'Tuto';\n    document.getElementById('fo-regime').value=f?f.regime:'PJ';\n    document.getElementById('fo-retem').value=f&&f.retem_fonte?'true':'false';\n    document.getElementById('fo-iss').value=f?String(f.aliquota_iss).replace('.',','):'0,02';\n    document.getElementById('fo-fed').value=f?String(f.aliquota_federais).replace('.',','):'0,1133';\n    document.getElementById('fo-ret').value=f?String(f.aliquota_retencao).replace('.',','):'0,0615';\n    document.getElementById('fo-pc').value=f?String(f.aliquota_pis_cofins).replace('.',','):'0,0365';\n    document.getElementById('fo-diapag').value=f&&f.dia_pagamento!==''?f.dia_pagamento:'';\n    document.getElementById('fo-emiss-off').value=f?(f.emissao_offset==null?0:f.emissao_offset):0;\n    document.getElementById('fo-pag-off').v
